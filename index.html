// ─── HELPERS ─────────────────────────────────────────────────────────────────

var fmt = function(n) {
  return new Intl.NumberFormat("es-ES",{style:"currency",currency:"EUR"}).format(n||0);
};
var fmtD = function(iso) {
  return new Date(iso+"T12:00:00").toLocaleDateString("es-ES",{day:"2-digit",month:"short",year:"numeric"});
};
var fmtDT = function(iso) {
  return new Date(iso).toLocaleString("es-ES",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
};
var gid = function(p) {
  return (p||"id")+"_"+Date.now()+"_"+Math.random().toString(36).slice(2,5);
};

function calcTotals(items) {
  var byVat={}, tBase=0, tVat=0, total=0;
  for (var k=0; k<items.length; k++) {
    var item=items[k];
    var pct=IVA[item.vatType]||10;
    var lt=item.qty*item.unitPrice;
    var base=lt/(1+pct/100);
    var vat=lt-base;
    if (!byVat[item.vatType]) byVat[item.vatType]={base:0,vat:0,pct:pct};
    byVat[item.vatType].base+=base;
    byVat[item.vatType].vat+=vat;
    tBase+=base; tVat+=vat; total+=lt;
  }
  return {byVat:byVat, totalBase:tBase, totalVat:tVat, total:total};
}
function calcLoan(l) {
  var r=l.interestRate/100/12, n=l.termMonths;
  var monthly=r>0?l.principal*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1):l.principal/n;
  var k=Math.min(n,Math.max(0,Math.floor((Date.now()-new Date(l.startDate).getTime())/(1000*60*60*24*30.44))));
  var rem=r>0?l.principal*(Math.pow(1+r,n)-Math.pow(1+r,k))/(Math.pow(1+r,n)-1):Math.max(0,l.principal-(l.principal/n)*k);
  return {monthly:monthly, remaining:Math.max(0,rem), monthsLeft:n-k};
}
function calcAsset(a) {
  var age=(Date.now()-new Date(a.purchaseDate).getTime())/(1000*60*60*24*365.25);
  return {bookValue:a.purchasePrice*Math.max(0,1-age/a.depreciationYears), annualDep:a.purchasePrice/a.depreciationYears};
}

function applyAction(state, action) {
  if (!action||!action.type) return state;
  var s = Object.assign({}, state, {
    inventory:[].concat(state.inventory),
    transactions:[].concat(state.transactions),
    assets:[].concat(state.assets),
    loans:[].concat(state.loans),
    tickets:[].concat(state.tickets),
    transfers:[].concat(state.transfers||[]),
    roasts:[].concat(state.roasts||[]),
  });
  if (action.type==="UPSERT_INVENTORY"&&action.items) {
    action.items.forEach(function(item) {
      var idx=s.inventory.findIndex(function(x){return x.id===item.id;});
      if (idx>=0) s.inventory[idx]=Object.assign({},s.inventory[idx],item);
      else s.inventory.push(Object.assign({almacen:"tostador"},item,{id:item.id||gid("inv")}));
    });
  }
  if (action.type==="ADD_TRANSACTION"&&action.transaction) {
    s.transactions.push(Object.assign({},action.transaction,{id:action.transaction.id||gid("txn")}));
  }
  if (action.type==="UPSERT_ASSET"&&action.asset) {
    var ai=s.assets.findIndex(function(x){return x.id===action.asset.id;});
    if (ai>=0) s.assets[ai]=Object.assign({},s.assets[ai],action.asset);
    else s.assets.push(Object.assign({},action.asset,{id:action.asset.id||gid("asset")}));
  }
  if (action.type==="UPSERT_LOAN"&&action.loan) {
    var li=s.loans.findIndex(function(x){return x.id===action.loan.id;});
    if (li>=0) s.loans[li]=Object.assign({},s.loans[li],action.loan);
    else s.loans.push(Object.assign({},action.loan,{id:action.loan.id||gid("loan"),payments:[]}));
  }
  if (action.type==="ADJUST_STOCK"&&action.adjustments) {
    action.adjustments.forEach(function(adj) {
      var idx=s.inventory.findIndex(function(x){return x.id===adj.id;});
      if (idx>=0) s.inventory[idx]=Object.assign({},s.inventory[idx],{quantity:Math.max(0,(s.inventory[idx].quantity||0)+adj.delta)});
    });
  }
  if (action.type==="TRANSFER_STOCK"&&action.transfer) {
    var from=action.transfer.from, to=action.transfer.to;
    var itemId=action.transfer.itemId, qty=action.transfer.qty, reason=action.transfer.reason||"";
    var si=s.inventory.findIndex(function(x){return x.id===itemId&&x.almacen===from;});
    if (si>=0&&s.inventory[si].quantity>=qty) {
      var srcItem=s.inventory[si];
      s.inventory[si]=Object.assign({},srcItem,{quantity:srcItem.quantity-qty});
      var di=s.inventory.findIndex(function(x){return x.name===srcItem.name&&x.almacen===to;});
      if (di>=0) s.inventory[di]=Object.assign({},s.inventory[di],{quantity:(s.inventory[di].quantity||0)+qty});
      else s.inventory.push(Object.assign({},srcItem,{id:gid("inv"),almacen:to,quantity:qty}));
      s.transfers.push({id:gid("tr"),date:new Date().toISOString(),from:from,to:to,itemId:itemId,itemName:srcItem.name,qty:qty,unit:srcItem.unit,reason:reason});
    }
  }
  if (action.type==="REGISTER_ROAST"&&action.roast) {
    var roast=action.roast;
    var vi=s.inventory.findIndex(function(x){return x.id===roast.verdeId;});
    if (vi>=0&&s.inventory[vi].quantity>=roast.qtyVerde) {
      var verde=s.inventory[vi];
      s.inventory[vi]=Object.assign({},verde,{quantity:verde.quantity-roast.qtyVerde});
      var tId="tostado_"+roast.verdeId;
      var ti=s.inventory.findIndex(function(x){return x.id===tId;});
      var newCost=parseFloat(((verde.unitCost*roast.qtyVerde)/roast.qtyTostado).toFixed(2));
      if (ti>=0) s.inventory[ti]=Object.assign({},s.inventory[ti],{quantity:(s.inventory[ti].quantity||0)+roast.qtyTostado});
      else s.inventory.push({id:tId,name:verde.name.replace(/verde/i,"tostado"),quantity:roast.qtyTostado,unit:verde.unit,unitCost:newCost,category:"cafe_tostado",almacen:"tostador",minStock:verde.minStock||1});
      s.roasts.push({id:gid("r"),date:new Date().toISOString(),verdeId:roast.verdeId,verdeName:verde.name,qtyVerde:roast.qtyVerde,qtyTostado:roast.qtyTostado,merma:parseFloat(((roast.qtyVerde-roast.qtyTostado)/roast.qtyVerde*100).toFixed(1)),notes:roast.notes||""});
    }
  }
  return s;
}

function parseAction(text) {
  var m=text.match(/<GRANO_ACTION>([\s\S]*?)<\/GRANO_ACTION>/);
  var clean=text.replace(/<GRANO_ACTION>[\s\S]*?<\/GRANO_ACTION>/,"").trim();
  var action=null;
  if (m) { try { action=JSON.parse(m[1].trim()); } catch(e) {} }
  return {clean:clean, action:action};
}
function parseSale(text) {
  var m=text.match(/<TPV_SALE>([\s\S]*?)<\/TPV_SALE>/);
  if (m) { try { return JSON.parse(m[1].trim()); } catch(e) {} }
  return null;
}
async function callAPI(system, messages) {
  var res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:system,messages:messages}),
  });
  var data=await res.json();
  if (data.error) throw new Error(data.error.message);
  return (data.content&&data.content[0]&&data.content[0].text)||"";
}

}

function MsgBubble(props) {
  var text=props.text||"";
  var lines=text.split("\n");
  return (
    <div>
      {lines.map(function(l,i) {
        if (l.startsWith("### ")) return <div key={i} style={{color:"#C9A96E",fontWeight:"bold",margin:"6px 0 2px",fontSize:11,letterSpacing:1,textTransform:"uppercase"}}>{l.slice(4)}</div>;
        if (l.startsWith("## ")) return <div key={i} style={{color:"#E8DCC8",fontWeight:"bold",margin:"8px 0 3px",fontSize:13}}>{l.slice(3)}</div>;
        if (l.match(/^[-*] /)) {
          var parts=l.slice(2).split(/(\*\*[^*]+\*\*)/g);
          return (
            <div key={i} style={{display:"flex",gap:5,margin:"2px 0",fontSize:12,color:"#C4B49A"}}>
              <span style={{color:"#C9A96E",flexShrink:0}}>{">"}</span>
              <span>{parts.map(function(p,j){return p.startsWith("**")&&p.endsWith("**")?<strong key={j} style={{color:"#C9A96E"}}>{p.slice(2,-2)}</strong>:p;})}</span>
            </div>
          );
        }
        if (l.startsWith("---")) return <hr key={i} style={{border:"none",borderTop:"1px solid rgba(201,169,110,0.2)",margin:"6px 0"}} />;
        if (!l.trim()) return <div key={i} style={{height:4}} />;
        var ps=l.split(/(\*\*[^*]+\*\*)/g);
        return (
          <p key={i} style={{margin:"2px 0",fontSize:12,color:"#C4B49A",lineHeight:1.55}}>
            {ps.map(function(p,j){return p.startsWith("**")&&p.endsWith("**")?<strong key={j} style={{color:"#C9A96E"}}>{p.slice(2,-2)}</strong>:p;})}
          </p>
        );
      })}
    </div>
  );
}

        <div style={{fontSize:8,letterSpacing:1,color:"#6A5535",textTransform:"uppercase",marginBottom:3}}>{label}</div>

  var Btn = function(label,onClick,style) {
    return <button onClick={onClick} style={Object.assign({width:"100%",padding:"10px",fontSize:11,background:"linear-gradient(135deg,#C9A96E,#7A5530)",border:"none",borderRadius:8,color:"#1A0E04",cursor:"pointer",fontFamily:"Georgia,serif",fontWeight:"bold"},style||{})}>{label}</button>;
  };
  var netColor=fin.netIncome>=0?C.green:C.red;

  // ── RENDER: TPV ───────────────────────────────────────────────────────────
  var renderFastPOS = function() {
    var at=ADDONS.filter(function(a){return fAddons.includes(a.id);}).reduce(function(s,a){return s+a.extra;},0);
    return (
      <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#0E0903",overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",gap:5,padding:"6px 10px",borderBottom:"1px solid rgba(201,169,110,0.12)",flexShrink:0,flexWrap:"wrap"}}>
          <button onClick={function(){setTpvMode("main");}} style={{padding:"5px 9px",fontSize:9,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:6,color:"#6A5535",cursor:"pointer",fontFamily:"inherit"}}>Texto</button>
          <div style={{display:"flex",gap:3}}>
            {["normal","doble"].map(function(sz){
              return <button key={sz} onClick={function(){setFSize(sz);}} style={{padding:"6px 10px",borderRadius:7,border:"1px solid "+(fSize===sz?"#C9A96E":"rgba(201,169,110,0.15)"),background:fSize===sz?"rgba(201,169,110,0.18)":"transparent",cursor:"pointer",fontSize:11,color:fSize===sz?"#C9A96E":"#6A5535",fontFamily:"inherit"}}>{sz==="normal"?"Normal":"Doble"}</button>;
            })}
          </div>
          <div style={{display:"flex",gap:3}}>
            {ADDONS.map(function(a){
              var active=fAddons.includes(a.id);

            })}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:4,marginLeft:"auto"}}>
            <button onClick={function(){setFQty(function(q){return Math.max(1,q-1);});}} style={{width:28,height:28,borderRadius:"50%",border:"1px solid rgba(201,169,110,0.3)",background:"rgba(201,169,110,0.08)",color:"#C9A96E",fontSize:14,cursor:"pointer"}}>-</button>
            <span style={{fontSize:13,color:"#C9A96E",minWidth:16,textAlign:"center",fontWeight:"bold"}}>{fQty}</span>
            <button onClick={function(){setFQty(function(q){return q+1;});}} style={{width:28,height:28,borderRadius:"50%",border:"1px solid rgba(201,169,110,0.3)",background:"rgba(201,169,110,0.08)",color:"#C9A96E",fontSize:14,cursor:"pointer"}}>+</button>
          </div>
        </div>
        <div style={{flex:1,display:"flex",overflow:"hidden"}}>
          <div style={{flex:1,padding:"7px 8px",overflowY:"auto"}}>
            <div style={C.secT}>Con talla</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:8}}>
              {PRODUCTS.map(function(p){
                return (
                  <button key={p.id} onClick={function(){addToCart(p);}} style={{padding:"11px 6px",borderRadius:9,border:"1px solid rgba(201,169,110,0.15)",background:"rgba(255,255,255,0.03)",cursor:"pointer",textAlign:"center",fontFamily:"inherit"}}>
                    <div style={{fontSize:18,marginBottom:2}}>{p.emoji}</div>
                    <div style={{fontSize:10,color:"#C4B49A",lineHeight:1.2,marginBottom:2}}>{p.name}</div>
                    <div style={{fontSize:10,color:"#C9A96E"}}>{fmt(p.prices[fSize]+at)}</div>
                  </button>
                );
              })}
            </div>
            <div style={C.secT}>Precio fijo</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:4,marginBottom:8}}>
              {PRODUCTS_FIXED.map(function(p){
                var isTest=p.price===0;
                return (
                  <button key={p.id} onClick={function(){addFixed(p);}} style={{padding:"9px 4px",borderRadius:9,border:"1px solid "+(isTest?"rgba(255,150,0,0.2)":"rgba(201,169,110,0.15)"),background:isTest?"rgba(255,150,0,0.05)":"rgba(255,255,255,0.03)",cursor:"pointer",textAlign:"center",fontFamily:"inherit"}}>
                    <div style={{fontSize:16,marginBottom:2}}>{p.emoji}</div>
                    <div style={{fontSize:9,color:"#C4B49A",lineHeight:1.2,marginBottom:1}}>{p.name}</div>
                    <div style={{fontSize:9,color:isTest?"#FFA040":"#C9A96E"}}>{isTest?"GRATIS":fmt(p.price)}</div>
                  </button>
                );
              })}
            </div>
            <div onClick={function(){setFBolsa(function(b){return !b;});}} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:8,border:"1px solid "+(fBolsa?"#7A9E7E":"rgba(201,169,110,0.15)"),background:fBolsa?"rgba(122,158,126,0.1)":"rgba(255,255,255,0.02)",cursor:"pointer"}}>
              <span style={{fontSize:14}}>🛍</span>
              <div>
                <div style={{fontSize:9,color:"#C4B49A"}}>Bolsa papel</div>
                <div style={{fontSize:9,color:fBolsa?"#7A9E7E":"#5A4030"}}>{fmt(BOLSA_P)} {fBolsa?"incluida":"no"}</div>
              </div>
            </div>
          </div>
          <div style={{width:130,background:"rgba(0,0,0,0.3)",borderLeft:"1px solid rgba(201,169,110,0.1)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"5px 8px",fontSize:8,letterSpacing:2,color:"#5A4020",textTransform:"uppercase",borderBottom:"1px solid rgba(201,169,110,0.1)",flexShrink:0}}>Pedido</div>
            <div style={{flex:1,overflowY:"auto"}}>
              {fCart.length===0&&!fBolsa?(
                <div style={{padding:"12px 8px",textAlign:"center",color:"#3A2810",fontSize:10}}>Vacio</div>
              ):(
                <div>
                  {fCart.map(function(item){
                    return (
                      <div key={item.id} style={{padding:"5px 7px",borderBottom:"1px solid rgba(255,255,255,0.05)",fontSize:9}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                          <span style={{color:"#C4B49A",flex:1,lineHeight:1.3,paddingRight:3}}>{item.desc}</span>
                          <button onClick={function(){setFCart(function(p){return p.filter(function(i){return i.id!==item.id;});});}} style={{background:"none",border:"none",color:"#4A2020",cursor:"pointer",fontSize:11,padding:0}}>x</button>
                        </div>
                        <div style={{color:"#C9A96E"}}>{item.qty}x{fmt(item.unitPrice)}</div>
                      </div>
                    );
                  })}
                  {fBolsa&&<div style={{padding:"5px 7px",fontSize:9}}><div style={{color:"#C4B49A"}}>Bolsa</div><div style={{color:"#C9A96E"}}>{fmt(BOLSA_P)}</div></div>}
                </div>
              )}
            </div>
            {fastTotal>0&&<div style={{padding:"6px 8px",borderTop:"1px solid rgba(201,169,110,0.15)",flexShrink:0,display:"flex",justifyContent:"space-between",fontSize:12,fontWeight:"bold"}}><span style={{color:"#8A7060"}}>Total</span><span style={{color:"#C9A96E"}}>{fmt(fastTotal)}</span></div>}
          </div>
        </div>
        <div style={{padding:"7px 10px",borderTop:"1px solid rgba(201,169,110,0.15)",background:C.dark,flexShrink:0}}>
          <div style={{display:"flex",gap:3,marginBottom:5}}>
            {[["efectivo","💵 Ef."],["tarjeta","💳 Tarj."],["bizum","📱 Biz."]].map(function(pair){
              return <button key={pair[0]} onClick={function(){setFPay(pair[0]);}} style={{flex:1,padding:"6px 3px",fontSize:9,textTransform:"uppercase",textAlign:"center",border:"1px solid "+(fPay===pair[0]?"#C9A96E":"rgba(201,169,110,0.12)"),background:fPay===pair[0]?"rgba(201,169,110,0.15)":"transparent",color:fPay===pair[0]?"#C9A96E":"#5A4030",cursor:"pointer",fontFamily:"inherit",borderRadius:5}}>{pair[1]}</button>;
            })}
          </div>
          <div style={{display:"flex",gap:5}}>
            <button onClick={resetCart} style={{padding:"10px 11px",fontSize:10,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,color:"#6A5535",cursor:"pointer",fontFamily:"inherit"}}>🗑</button>
            <button onClick={checkoutFast} disabled={fastTotal===0} style={{flex:1,padding:"10px",fontSize:13,fontWeight:"bold",background:fastTotal===0?"rgba(201,169,110,0.15)":"linear-gradient(135deg,#C9A96E,#7A5530)",border:"none",borderRadius:8,color:"#1A0E04",cursor:fastTotal===0?"not-allowed":"pointer",fontFamily:"Georgia,serif",opacity:fastTotal===0?0.5:1}}>
              Cobrar {fmt(fastTotal)}
            </button>
          </div>
        </div>
      </div>
    );
  };

  var renderTPV = function() {
    if (tpvMode==="fast") return renderFastPOS();

    if (tpvMode==="print"&&lastTicket) {
      return (
        <div style={{padding:"10px",overflowY:"auto",flex:1}}>
          {fullscreen&&imgUrl&&(
            <div onClick={function(){setFullscreen(false);}} style={{position:"absolute",inset:0,zIndex:200,background:"#000",display:"flex",flexDirection:"column",alignItems:"center",overflowY:"auto",padding:"10px"}}>
              <div style={{padding:"8px",background:"rgba(201,169,110,0.15)",borderRadius:8,marginBottom:10,fontSize:11,color:"#C9A96E",textAlign:"center",width:"100%",maxWidth:400}}>Captura ahora - Toca para cerrar</div>
              <img src={imgUrl} alt="Ticket" style={{width:"100%",maxWidth:400,borderRadius:6}} />
            </div>
          )}
          <div style={{display:"flex",gap:5,marginBottom:8,flexWrap:"wrap"}}>
            <button onClick={function(){setTpvMode("main");setImgUrl(null);setFullscreen(false);}} style={{padding:"5px 9px",fontSize:9,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:5,color:"#C4B49A",cursor:"pointer",fontFamily:"inherit"}}>Nueva venta</button>
            <button onClick={generateImg} style={{padding:"5px 9px",fontSize:9,background:"rgba(201,169,110,0.08)",border:"1px solid rgba(201,169,110,0.2)",borderRadius:5,color:"#C9A96E",cursor:"pointer",fontFamily:"inherit"}}>🖼 Imagen</button>
            {imgUrl&&(
              <div style={{display:"flex",gap:4}}>
                <button onClick={copyClip} style={{padding:"5px 9px",fontSize:9,background:clipStatus==="ok"?"rgba(122,158,126,0.2)":"rgba(201,169,110,0.08)",border:"1px solid rgba(201,169,110,0.2)",borderRadius:5,color:clipStatus==="ok"?"#7A9E7E":"#C9A96E",cursor:"pointer",fontFamily:"inherit"}}>{clipStatus==="ok"?"Copiado":"Copiar"}</button>
                <button onClick={function(){setFullscreen(true);}} style={{padding:"5px 9px",fontSize:9,background:"linear-gradient(135deg,#C9A96E,#7A5530)",border:"none",borderRadius:5,color:"#1A0E04",cursor:"pointer",fontFamily:"inherit",fontWeight:"bold"}}>Pantalla</button>
              </div>
            )}
          </div>
          <div style={{background:"#fff",borderRadius:8,overflow:"hidden",marginBottom:8}}>
            <TicketPreview ticket={lastTicket.ticket} business={lastTicket.business} />
          </div>
          {imgUrl&&<img src={imgUrl} alt="Ticket" style={{width:"100%",borderRadius:7,display:"block",cursor:"pointer",marginBottom:8}} onClick={function(){setFullscreen(true);}} />}
          <div style={{padding:"7px 10px",background:"rgba(122,158,126,0.08)",border:"1px solid rgba(122,158,126,0.2)",borderRadius:7,fontSize:10,color:"#7A9E7E"}}>
            ✓ Ticket #{String(lastTicket.ticket.number||0).padStart(6,"0")} - {fmt(lastTicket.ticket.totals&&lastTicket.ticket.totals.total||0)} registrado
          </div>
        </div>
      );
    }

    if (tpvMode==="preview"&&pendingSale) {
      var rawT=calcTotals(pendingSale.items);
      var disc=calcDiscount(rawT.total,pendingSale.items);
      var finalAmt=parseFloat((rawT.total-disc.discAmt).toFixed(2));
      var cliMatches=tpvClientSearch.length>1?(state.clients||[]).filter(function(c){return c.name.toLowerCase().includes(tpvClientSearch.toLowerCase());}):[];
      return (
        <div style={{padding:"10px",overflowY:"auto",flex:1}}>
          <div style={{fontSize:9,color:"#C9A96E",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Vista previa</div>
          {pendingSale.items.map(function(item,i){
            return (
              <div key={i} style={{...C.card,display:"flex",justifyContent:"space-between"}}>
                <div><div style={{fontSize:11,color:"#E8DCC8"}}>{item.desc}</div><div style={{fontSize:9,color:"#5A4030"}}>{IVA_LABELS[item.vatType]} - {fmt(item.unitPrice)}/ud</div></div>
                <div style={{textAlign:"right"}}><div style={{fontSize:11,color:"#C9A96E",fontWeight:"bold"}}>{fmt(item.qty*item.unitPrice)}</div><div style={{fontSize:9,color:"#5A4030"}}>{item.qty}x</div></div>
              </div>
            );
          })}
          <div style={{padding:"9px 11px",background:"rgba(201,169,110,0.08)",borderRadius:7,border:"1px solid rgba(201,169,110,0.2)",marginBottom:8,marginTop:4}}>
            {disc.discAmt>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#7A9E7E",marginBottom:2}}><span>Descuento</span><span>-{fmt(disc.discAmt)}</span></div>}
            <div style={{display:"flex",justifyContent:"space-between",fontSize:15,fontWeight:"bold"}}><span>TOTAL</span><span style={{color:"#C9A96E"}}>{fmt(finalAmt)}</span></div>
            <div style={{fontSize:9,color:"#8A7060"}}>IVA incl.: {fmt(rawT.totalVat)}</div>
          </div>
          <div style={{marginBottom:8}}>
            {Fl("Cliente (opcional)",
              tpvClient?(
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 9px",background:"rgba(122,158,126,0.1)",border:"1px solid rgba(122,158,126,0.25)",borderRadius:7}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:11,color:"#E8DCC8"}}>{tpvClient.name}</div>
                    <div style={{fontSize:9,color:getTier(tpvClient.totalSpent||0,tpvClient.tierOverride).color}}>{getTier(tpvClient.totalSpent||0,tpvClient.tierOverride).label}</div>
                  </div>
                  <button onClick={function(){setTpvClient(null);setTpvClientSearch("");}} style={{background:"none",border:"none",color:"#6A4030",cursor:"pointer",fontSize:13}}>x</button>
                </div>
              ):(
                <div style={{position:"relative"}}>
                  <input value={tpvClientSearch} onChange={function(e){setTpvClientSearch(e.target.value);}} placeholder="Buscar cliente..." style={C.inp} />
                  {cliMatches.length>0&&(
                    <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#1A0E04",border:"1px solid rgba(201,169,110,0.2)",borderRadius:6,zIndex:50,maxHeight:120,overflowY:"auto"}}>
                      {cliMatches.slice(0,5).map(function(c){
                        var t=getTier(c.totalSpent||0,c.tierOverride);
                        return <div key={c.id} onClick={function(){setTpvClient(c);setTpvClientSearch("");}} style={{padding:"7px 10px",cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,0.05)",display:"flex",justifyContent:"space-between"}}><span style={{fontSize:11,color:"#E8DCC8"}}>{c.name}</span><span style={{fontSize:9,color:t.color}}>{t.label}</span></div>;
                      })}
                    </div>
                  )}
                </div>
              )
            )}
          </div>
          <div style={{marginBottom:8}}>
            {Fl("Cupon (opcional)",
              tpvCoupon?(
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 9px",background:"rgba(122,158,126,0.1)",border:"1px solid rgba(122,158,126,0.25)",borderRadius:7}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:11,color:"#C9A96E",fontWeight:"bold"}}>{tpvCoupon.code}</div>
                    <div style={{fontSize:9,color:"#7A9E7E"}}>{tpvCoupon.type==="percent"?"-"+tpvCoupon.value+"%":"-"+fmt(tpvCoupon.value)}{tpvCoupon.applyTo==="products"&&tpvCoupon.productNames&&tpvCoupon.productNames.length?" sobre: "+tpvCoupon.productNames.join(", "):" sobre ticket"}</div>
                  </div>
                  <button onClick={function(){setTpvCoupon(null);setTpvCouponInput("");}} style={{background:"none",border:"none",color:"#6A4030",cursor:"pointer",fontSize:13}}>x</button>
                </div>
              ):(
                <div style={{display:"flex",gap:5}}>
                  <input value={tpvCouponInput} onChange={function(e){setTpvCouponInput(e.target.value.toUpperCase());}} placeholder="CODIGO" style={{...C.inp,flex:1,letterSpacing:2}} />
                  <button onClick={function(){var c=(state.coupons||[]).find(function(x){return x.code===tpvCouponInput&&x.active;}); if(c) setTpvCoupon(c); else alert("Cupon no valido o expirado.");}} style={{padding:"7px 12px",background:"rgba(201,169,110,0.15)",border:"1px solid rgba(201,169,110,0.3)",borderRadius:7,color:"#C9A96E",cursor:"pointer",fontFamily:"inherit",fontSize:10}}>Aplicar</button>
                </div>
              )
            )}
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={function(){setPendingSale(null);setTpvMode("main");setTpvClient(null);setTpvCoupon(null);setTpvCouponInput("");setTpvClientSearch("");}} style={{flex:1,padding:"9px",fontSize:11,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:7,color:"#C4B49A",cursor:"pointer",fontFamily:"inherit"}}>Cancelar</button>
            <button onClick={confirmSale} style={{flex:2,padding:"9px",fontSize:13,fontWeight:"bold",background:"linear-gradient(135deg,#C9A96E,#7A5530)",border:"none",borderRadius:7,color:"#1A0E04",cursor:"pointer",fontFamily:"Georgia,serif"}}>Confirmar {fmt(finalAmt)}</button>
          </div>
        </div>
      );
    }

    // main mode
    return (
      <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
        <div style={{flex:1,padding:"10px",overflowY:"auto"}}>
          <button onClick={function(){setTpvMode("fast");}} style={{width:"100%",marginBottom:10,padding:"13px",background:"linear-gradient(135deg,rgba(201,169,110,0.12),rgba(201,169,110,0.06))",border:"1px solid rgba(201,169,110,0.3)",borderRadius:10,cursor:"pointer",fontFamily:"Georgia,serif",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{textAlign:"left"}}><div style={{fontSize:13,color:"#C9A96E",fontWeight:"bold",marginBottom:1}}>TPV Tactil</div><div style={{fontSize:9,color:"#6A5535"}}>Productos, tallas, anadidos</div></div>
            <span style={{fontSize:20,color:"#C9A96E"}}>{"→"}</span>
          </button>
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
            {["Un espresso","Cortado y croissant","2 flat white","250g cafe etiopia"].map(function(q){
              return <button key={q} onClick={function(){setTpvInput(q);}} style={{padding:"5px 9px",fontSize:10,background:"rgba(201,169,110,0.07)",border:"1px solid rgba(201,169,110,0.18)",borderRadius:14,color:"#C9A96E",cursor:"pointer",fontFamily:"inherit"}}>{q}</button>;
            })}
          </div>
          <div style={{...C.card,padding:"10px"}}>
            <div style={C.secT}>Hoy</div>

              <KPI label="Tickets" value={(state.tickets||[]).filter(function(t){return t.date&&t.date.slice(0,10)===new Date().toISOString().slice(0,10);}).length} />
              <KPI label="Ventas" value={fmt(fin.todaySales)} color={C.green} />
            </div>
          </div>
        </div>
        <div style={{padding:"8px 10px",borderTop:"1px solid rgba(201,169,110,0.1)",background:C.dark,display:"flex",gap:6,alignItems:"flex-end",flexShrink:0}}>
          <textarea value={tpvInput} onChange={function(e){setTpvInput(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();parseTpvInput();}}} placeholder="Ej: 2 cortados y un croissant, tarjeta..." style={{...C.ta,fontSize:12}} rows={2} disabled={tpvLoading} />
          <button onClick={parseTpvInput} disabled={tpvLoading||!tpvInput.trim()} style={{width:40,height:40,background:tpvLoading||!tpvInput.trim()?"rgba(201,169,110,0.1)":"linear-gradient(135deg,#C9A96E,#7A5530)",border:"none",borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>
            {tpvLoading?"...":"↑"}
          </button>
        </div>
      </div>
    );
  };

  // ── RENDER: CAJA ─────────────────────────────────────────────────────────
  var renderCaja = function() {
    var caja=state.caja||{abierta:false};
    var hoy=new Date().toISOString().slice(0,10);
    var tkH=(state.tickets||[]).filter(function(t){return t.date&&t.date.slice(0,10)===hoy;});
    var ef=tkH.filter(function(t){return t.paymentMethod==="efectivo";}).reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0);
    var ta=tkH.filter(function(t){return t.paymentMethod==="tarjeta";}).reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0);
    var bi=tkH.filter(function(t){return t.paymentMethod==="bizum";}).reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0);
    return (
      <div style={{flex:1,overflowY:"auto",padding:"10px"}}>
        <div style={{padding:"12px",background:caja.abierta?"rgba(122,158,126,0.1)":"rgba(255,100,60,0.08)",border:"1px solid "+(caja.abierta?"rgba(122,158,126,0.3)":"rgba(255,100,60,0.25)"),borderRadius:10,marginBottom:10,textAlign:"center"}}>
          <div style={{fontSize:20,marginBottom:3}}>{caja.abierta?"🟢":"🔴"}</div>
          <div style={{fontSize:13,fontWeight:"bold",color:caja.abierta?"#7A9E7E":"#FF8060"}}>{caja.abierta?"CAJA ABIERTA":"CAJA CERRADA"}</div>
          {caja.abierta&&<div style={{fontSize:9,color:"#6A5535",marginTop:2}}>Desde {fmtDT(caja.apertura)} - Fondo: {fmt(caja.fondoInicial)}</div>}
        </div>
        {!caja.abierta?(
          <div style={{padding:"12px",background:C.card,borderRadius:10,border:"1px solid rgba(255,255,255,0.07)"}}>
            {Fl("Fondo inicial (EUR)",<input style={{...C.inp,fontSize:18,textAlign:"center"}} type="number" value={fondoInput} onChange={function(e){setFondoInput(e.target.value);}} />)}
            <button onClick={abrirCaja} style={{width:"100%",padding:"11px",background:"linear-gradient(135deg,#7A9E7E,#4A6E4E)",border:"none",borderRadius:7,color:"#fff",fontFamily:"Georgia,serif",fontSize:12,fontWeight:"bold",cursor:"pointer"}}>Abrir con {fmt(parseFloat(fondoInput)||0)}</button>
          </div>
        ):(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:10}}>
              <KPI label="Total ventas" value={fmt(ef+ta+bi)} color={C.green} />
              <KPI label="Tickets hoy" value={tkH.length} />
              <KPI label="Efectivo" value={fmt(ef)} color={C.gold} />
              <KPI label="Tarj. + Bizum" value={fmt(ta+bi)} color={C.blue} />
            </div>
            <button onClick={cerrarCaja} style={{width:"100%",padding:"11px",background:"linear-gradient(135deg,#B07D62,#7A4530)",border:"none",borderRadius:7,color:"#fff",fontFamily:"Georgia,serif",fontSize:12,fontWeight:"bold",cursor:"pointer"}}>Cerrar caja y guardar backup</button>
          </div>
        )}
        {caja.cierre&&(
          <div style={{marginTop:10,...C.card,padding:"10px"}}>
            <div style={C.secT}>Ultimo cierre {fmtD(caja.cierre.fecha)}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
              <KPI label="Efectivo" value={fmt(caja.cierre.efectivo)} color={C.gold} />
              <KPI label="Tarjeta" value={fmt(caja.cierre.tarjeta)} color={C.blue} />
              <KPI label="Bizum" value={fmt(caja.cierre.bizum)} color={C.blue} />
              <KPI label="Total" value={fmt(caja.cierre.total)} color={C.green} />
            </div>
          </div>
        )}
      </div>
    );
  };

  // ── RENDER: HISTORIAL ─────────────────────────────────────────────────────
  var renderHistorial = function() {
    var hoyStr=new Date().toISOString().slice(0,10);
    var periodMs={hoy:0,semana:7*864e5,mes:30*864e5,anio:365*864e5,todo:9999*864e5};
    var desdeStr=histPeriod==="hoy"?hoyStr:new Date(Date.now()-(periodMs[histPeriod]||periodMs.mes)).toISOString().slice(0,10);
    var filtered=[].concat(state.tickets||[]).filter(function(t){
      if (!t.date) return false;
      if (histPeriod==="hoy") return t.date.slice(0,10)===hoyStr;
      return t.date.slice(0,10)>=desdeStr;
    }).filter(function(t){
      if (!histSearch.trim()) return true;
      var q=histSearch.toLowerCase();
      var num=String(t.number||"").padStart(6,"0");
      var desc=(t.items||[]).map(function(i){return i.desc;}).join(" ");
      return num.includes(q)||desc.toLowerCase().includes(q)||String(t.totals&&t.totals.total||0).includes(q);
    }).reverse();
    var totalV=filtered.reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0);
    if (histSel) {
      var t=histSel;
      return (
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{display:"flex",gap:6,padding:"8px 10px",borderBottom:"1px solid rgba(201,169,110,0.1)",flexShrink:0,alignItems:"center"}}>
            <button onClick={function(){setHistSel(null);}} style={{padding:"5px 10px",fontSize:10,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,color:"#C4B49A",cursor:"pointer",fontFamily:"inherit"}}>Volver</button>
            <span style={{fontSize:11,color:"#C9A96E",fontWeight:"bold",flex:1}}>Ticket #{String(t.number||0).padStart(6,"0")}</span>
            <button onClick={function(){setLastTicket({ticket:t,business:state.business||INIT_BIZ});setTab("tpv");setTpvMode("print");setImgUrl(null);}} style={{padding:"5px 12px",fontSize:10,background:"linear-gradient(135deg,#C9A96E,#7A5530)",border:"none",borderRadius:6,color:"#1A0E04",cursor:"pointer",fontFamily:"inherit",fontWeight:"bold"}}>Reimprimir</button>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"10px"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:8}}>
              <KPI label="Fecha" value={fmtDT(t.date)} color="#C4B49A" />
              <KPI label="Total" value={fmt(t.totals&&t.totals.total||0)} color={C.gold} />
              <KPI label="IVA" value={fmt(t.totals&&t.totals.totalVat||0)} color="#C4B49A" />
              <KPI label="Pago" value={(t.paymentMethod||"").toUpperCase()} />
            </div>
            {t.clientName&&<div style={{fontSize:10,color:"#C4B49A",marginBottom:4}}>Cliente: {t.clientName}</div>}
            {(t.totals&&t.totals.discount>0)&&<div style={{fontSize:10,color:"#7A9E7E",marginBottom:6}}>Descuento: -{fmt(t.totals.discount)} ({t.totals.discountDesc})</div>}
            <div style={C.secT}>Articulos</div>
            {(t.items||[]).map(function(item,idx){
              return (
                <div key={idx} style={{...C.card,display:"flex",justifyContent:"space-between"}}>
                  <div><div style={{fontSize:11,color:"#E8DCC8"}}>{item.qty>1?item.qty+"x ":""}{item.desc}</div><div style={{fontSize:9,color:"#5A4030"}}>{IVA_LABELS[item.vatType]} - {fmt(item.unitPrice)}/ud</div></div>
                  <div style={{fontSize:11,color:"#C9A96E",fontWeight:"bold"}}>{fmt(item.qty*item.unitPrice)}</div>
                </div>
              );
            })}
            <div style={{background:"#fff",borderRadius:8,overflow:"hidden",marginTop:8}}>
              <TicketPreview ticket={t} business={state.business||INIT_BIZ} />
            </div>
          </div>
        </div>
      );
    }
    return (
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"8px 10px",borderBottom:"1px solid rgba(201,169,110,0.1)",flexShrink:0}}>
          <div style={{display:"flex",marginBottom:6,borderRadius:6,overflow:"hidden",border:"1px solid rgba(201,169,110,0.15)"}}>
            {[["hoy","Hoy"],["semana","7d"],["mes","30d"],["anio","1a"],["todo","Todo"]].map(function(p){
              return <button key={p[0]} onClick={function(){setHistPeriod(p[0]);}} style={{flex:1,padding:"6px 0",fontSize:9,letterSpacing:1,textTransform:"uppercase",textAlign:"center",cursor:"pointer",color:histPeriod===p[0]?"#130E07":"#5A4020",background:histPeriod===p[0]?"#C9A96E":"transparent",border:"none",fontFamily:"inherit"}}>{p[1]}</button>;
            })}
          </div>
          <input value={histSearch} onChange={function(e){setHistSearch(e.target.value);}} placeholder="Buscar numero, articulo, importe..." style={C.inp} />
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5,padding:"7px 10px",flexShrink:0}}>
          <KPI label="Tickets" value={filtered.length} color={C.gold} />
          <KPI label="Ventas" value={fmt(totalV)} color={C.green} />
          <KPI label="Medio" value={fmt(filtered.length?totalV/filtered.length:0)} />
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"0 10px 10px"}}>
          {filtered.length===0?(
            <div style={{textAlign:"center",color:"#3A2810",padding:"30px 0",fontSize:11}}>{histSearch?"Sin resultados.":"Sin tickets en este periodo."}</div>
          ):filtered.map(function(t){
            var total=t.totals&&t.totals.total||0;
            return (
              <div key={t.id} onClick={function(){setHistSel(t);}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",marginBottom:3,background:C.card,borderRadius:7,border:"1px solid rgba(255,255,255,0.05)",borderLeft:"3px solid #C9A96E",cursor:"pointer"}}>
                <div><div style={{fontSize:11,color:"#C9A96E",fontWeight:"bold"}}>#{String(t.number||0).padStart(6,"0")}</div><div style={{fontSize:9,color:"#5A4030"}}>{fmtDT(t.date)}{t.clientName?" - "+t.clientName:""}</div></div>
                <div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:"bold",color:"#E8DCC8"}}>{fmt(total)}</div>{t.totals&&t.totals.discount>0&&<div style={{fontSize:8,color:"#7A9E7E"}}>-{fmt(t.totals.discount)}</div>}</div>
              </div>
            );
          })}
          <div style={{marginTop:6,padding:"7px 9px",background:"rgba(122,158,126,0.04)",border:"1px solid rgba(122,158,126,0.1)",borderRadius:6,fontSize:9,color:"#5A6050"}}>
            Retencion: {RETENTION_YEARS} años (art. 66-70 LGT) - Total almacenados: {(state.tickets||[]).length}
          </div>
        </div>
      </div>
    );
  };

  // ── RENDER: DASHBOARD ────────────────────────────────────────────────────
  var renderDash = function() {
    var hoy=new Date().toISOString().slice(0,10);
    var periodMs={semana:7*864e5,mes:30*864e5,total:9999*864e5};
    var desde=new Date(Date.now()-(periodMs[dashPeriod]||periodMs.semana)).toISOString().slice(0,10);
    var tks=(state.tickets||[]).filter(function(t){return t.date&&t.date.slice(0,10)>=desde;});
    var txns=state.transactions.filter(function(t){return t.date>=desde;});
    var ing=txns.filter(function(t){return t.type==="ingreso";}).reduce(function(s,t){return s+t.amount;},0);
    var gas=txns.filter(function(t){return t.type==="gasto";}).reduce(function(s,t){return s+t.amount;},0);
    var tkH=(state.tickets||[]).filter(function(t){return t.date&&t.date.slice(0,10)===hoy;});
    var ventaH=tkH.reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0);
    var ef=tks.filter(function(t){return t.paymentMethod==="efectivo";}).reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0);
    var ta=tks.filter(function(t){return t.paymentMethod==="tarjeta";}).reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0);
    var bi=tks.filter(function(t){return t.paymentMethod==="bizum";}).reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0);
    var payT=ef+ta+bi||1;
    var prodM={};
    tks.forEach(function(t){(t.items||[]).forEach(function(i){prodM[i.desc]=(prodM[i.desc]||0)+i.qty;});});
    var topProds=Object.keys(prodM).map(function(k){return {name:k,qty:prodM[k]};}).sort(function(a,b){return b.qty-a.qty;}).slice(0,5);
    var maxV=Math.max.apply(null,DEMO_VENTAS.concat(DEMO_GASTOS).concat([1])), barH=64;
    return (
      <div style={{flex:1,overflowY:"auto",padding:"10px"}}>
        <div style={{display:"flex",marginBottom:10,borderRadius:6,overflow:"hidden",border:"1px solid rgba(201,169,110,0.15)"}}>
          {[["semana","7 dias"],["mes","30 dias"],["total","Total"]].map(function(p){
            return <button key={p[0]} onClick={function(){setDashPeriod(p[0]);}} style={{flex:1,padding:"7px 0",fontSize:10,textTransform:"uppercase",textAlign:"center",cursor:"pointer",color:dashPeriod===p[0]?"#130E07":"#5A4020",background:dashPeriod===p[0]?"#C9A96E":"transparent",border:"none",fontFamily:"inherit"}}>{p[1]}</button>;
          })}
        </div>
        <div style={C.secT}>Hoy</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5,marginBottom:10}}>
          <KPI label="Ventas" value={fmt(ventaH)} color={C.green} />
          <KPI label="Tickets" value={tkH.length} />
          <KPI label="Ticket medio" value={fmt(tkH.length?ventaH/tkH.length:0)} />
        </div>
        <div style={C.secT}>Periodo</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:10}}>
          <KPI label="Ingresos" value={fmt(ing)} color={C.green} />
          <KPI label="Gastos" value={fmt(gas)} color={C.red} />
          <KPI label="Resultado" value={fmt(ing-gas)} color={ing-gas>=0?C.gold:C.red} alert={ing-gas<0} />
          <KPI label="Tickets" value={tks.length} />
        </div>
        <div style={{...C.card,padding:"10px",marginBottom:8}}>
          <div style={{fontSize:8,letterSpacing:2,color:"#6A5535",textTransform:"uppercase",marginBottom:8}}>Evolucion mensual (muestra)</div>
          <div style={{display:"flex",alignItems:"flex-end",gap:3,height:barH+14}}>
            {MESES.map(function(m,i){
              return (
                <div key={m} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                  <div style={{display:"flex",gap:1,alignItems:"flex-end",height:barH}}>
                    <div style={{width:"45%",height:(DEMO_VENTAS[i]/maxV*barH)+"px",background:"#7A9E7E",borderRadius:"2px 2px 0 0"}} />
                    <div style={{width:"45%",height:(DEMO_GASTOS[i]/maxV*barH)+"px",background:"#FF8060",borderRadius:"2px 2px 0 0"}} />
                  </div>
                  <div style={{fontSize:7,color:"#5A4030"}}>{m}</div>
                </div>
              );
            })}
          </div>
          <div style={{display:"flex",gap:10,marginTop:4,justifyContent:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:3,fontSize:8,color:"#7A9E7E"}}><div style={{width:7,height:7,background:"#7A9E7E",borderRadius:2}} />Ventas</div>
            <div style={{display:"flex",alignItems:"center",gap:3,fontSize:8,color:"#FF8060"}}><div style={{width:7,height:7,background:"#FF8060",borderRadius:2}} />Gastos</div>
          </div>
        </div>
        {tks.length>0&&(
          <div style={{...C.card,padding:"10px",marginBottom:8}}>
            <div style={{fontSize:8,letterSpacing:2,color:"#6A5535",textTransform:"uppercase",marginBottom:7}}>Metodos de pago</div>
            {[["Efectivo",ef,C.gold],["Tarjeta",ta,C.green],["Bizum",bi,C.blue]].map(function(row){
              return (
                <div key={row[0]} style={{marginBottom:5}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:2}}>
                    <span style={{color:"#C4B49A"}}>{row[0]}</span>
                    <span style={{color:row[2]}}>{fmt(row[1])} ({((row[1]/payT)*100).toFixed(0)}%)</span>
                  </div>
                  <Bar pct={(row[1]/payT)*100} color={row[2]} height={4} />
                </div>
              );
            })}
          </div>
        )}
        {topProds.length>0&&(
          <div style={{...C.card,padding:"10px"}}>
            <div style={{fontSize:8,letterSpacing:2,color:"#6A5535",textTransform:"uppercase",marginBottom:7}}>Top productos</div>
            {topProds.map(function(p,i){
              return (
                <div key={p.name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                  <span style={{fontSize:10,color:"#C4B49A"}}>{i+1}. {p.name}</span>
                  <span style={{fontSize:10,color:C.gold,fontWeight:"bold"}}>{p.qty} ud</span>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  };

  // ── RENDER: FACTURAS ──────────────────────────────────────────────────────
  var renderFacturas = function() {
    var valid=factForm.items.filter(function(i){return i.desc&&i.unitPrice>0;});
    var prevTot=valid.length?calcTotals(valid):null;
    return (
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{display:"flex",borderBottom:"1px solid rgba(201,169,110,0.1)",flexShrink:0}}>
          <button onClick={function(){setFactTab("nueva");}} style={{flex:1,padding:"9px 0",fontSize:10,textTransform:"uppercase",textAlign:"center",cursor:"pointer",color:factTab==="nueva"?"#C9A96E":"#5A4020",background:"none",border:"none",borderBottom:factTab==="nueva"?"2px solid #C9A96E":"2px solid transparent",fontFamily:"inherit"}}>+ Nueva</button>
          <button onClick={function(){setFactTab("lista");}} style={{flex:1,padding:"9px 0",fontSize:10,textTransform:"uppercase",textAlign:"center",cursor:"pointer",color:factTab==="lista"?"#C9A96E":"#5A4020",background:"none",border:"none",borderBottom:factTab==="lista"?"2px solid #C9A96E":"2px solid transparent",fontFamily:"inherit"}}>Emitidas ({(state.facturas||[]).length})</button>
        </div>
        {factTab==="nueva"?(
          <div style={{flex:1,overflowY:"auto",padding:"10px"}}>
            <div style={{display:"flex",gap:5,marginBottom:8}}>
              {[["simplificada","B2C"],["completa","B2B"]].map(function(p){
                return <button key={p[0]} onClick={function(){setFactForm(function(f){return Object.assign({},f,{tipo:p[0]});});}} style={{flex:1,padding:"7px",fontSize:10,borderRadius:6,border:"1px solid "+(factForm.tipo===p[0]?"#C9A96E":"rgba(201,169,110,0.2)"),background:factForm.tipo===p[0]?"rgba(201,169,110,0.15)":"transparent",color:factForm.tipo===p[0]?"#C9A96E":"#5A4030",cursor:"pointer",fontFamily:"inherit"}}>{p[1]}</button>;
              })}
            </div>
            {Fl("Fecha",<input style={C.inp} type="date" value={factForm.fecha} onChange={function(e){setFactForm(function(f){return Object.assign({},f,{fecha:e.target.value});});}} />)}
            {factForm.tipo==="completa"&&(
              <div style={{padding:"9px",background:"rgba(255,255,255,0.02)",borderRadius:7,marginBottom:8}}>
                <div style={{fontSize:8,color:"#C9A96E",textTransform:"uppercase",marginBottom:7}}>Datos cliente</div>
                {Fl("Nombre",<input style={C.inp} value={factForm.clienteNombre} onChange={function(e){setFactForm(function(f){return Object.assign({},f,{clienteNombre:e.target.value});});}} />)}
                {Fl("NIF",<input style={C.inp} value={factForm.clienteNif} onChange={function(e){setFactForm(function(f){return Object.assign({},f,{clienteNif:e.target.value});});}} />)}
                {Fl("Direccion",<input style={C.inp} value={factForm.clienteDireccion} onChange={function(e){setFactForm(function(f){return Object.assign({},f,{clienteDireccion:e.target.value});});}} />)}
              </div>
            )}
            <div style={C.secT}>Lineas</div>
            {factForm.items.map(function(item,i){
              var setItem=function(key,val){setFactForm(function(f){return Object.assign({},f,{items:f.items.map(function(x,j){return j===i?Object.assign({},x,{[key]:val}):x;})});});};
              return (
                <div key={i} style={{...C.card,padding:"8px",marginBottom:5}}>
                  <input value={item.desc} onChange={function(e){setItem("desc",e.target.value);}} placeholder="Descripcion" style={{...C.inp,marginBottom:5}} />
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4}}>
                    <div><div style={{fontSize:8,color:"#5A4030",marginBottom:2}}>Cantidad</div><input type="number" min="1" value={item.qty} onChange={function(e){setItem("qty",parseFloat(e.target.value)||1);}} style={C.inp} /></div>
                    <div><div style={{fontSize:8,color:"#5A4030",marginBottom:2}}>Precio EUR</div><input type="number" min="0" step="0.01" value={item.unitPrice} onChange={function(e){setItem("unitPrice",parseFloat(e.target.value)||0);}} style={C.inp} /></div>
                    <div><div style={{fontSize:8,color:"#5A4030",marginBottom:2}}>IVA</div>
                      <select value={item.vatType} onChange={function(e){setItem("vatType",e.target.value);}} style={C.sel}>
                        <option value="reducido">10%</option><option value="superreducido">4%</option><option value="general">21%</option>
                      </select>
                    </div>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginTop:4,alignItems:"center"}}>
                    <span style={{fontSize:10,color:"#C9A96E"}}>Subtotal: {fmt(item.qty*item.unitPrice)}</span>
                    {factForm.items.length>1&&<button onClick={function(){setFactForm(function(f){return Object.assign({},f,{items:f.items.filter(function(_,j){return j!==i;})});});}} style={{background:"none",border:"none",color:"#6A3020",cursor:"pointer",fontSize:13}}>x</button>}
                  </div>
                </div>
              );
            })}
            <button onClick={function(){setFactForm(function(f){return Object.assign({},f,{items:f.items.concat([{desc:"",qty:1,unitPrice:0,vatType:"reducido"}])});});}} style={{width:"100%",padding:"6px",fontSize:10,background:"rgba(201,169,110,0.07)",border:"1px dashed rgba(201,169,110,0.25)",borderRadius:6,color:"#C9A96E",cursor:"pointer",fontFamily:"inherit",marginBottom:8}}>+ Anadir linea</button>
            {prevTot&&prevTot.total>0&&(
              <div style={{padding:"9px 11px",background:"rgba(201,169,110,0.08)",borderRadius:7,border:"1px solid rgba(201,169,110,0.2)",marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:15,fontWeight:"bold"}}><span>TOTAL</span><span style={{color:"#C9A96E"}}>{fmt(prevTot.total)}</span></div>
                <div style={{fontSize:9,color:"#8A7060"}}>IVA: {fmt(prevTot.totalVat)}</div>
              </div>
            )}
            {Btn("Emitir factura #"+String((state.business&&state.business.facturaCounter)||1).padStart(6,"0"),emitirFactura)}
          </div>
        ):(
          <div style={{flex:1,overflowY:"auto",padding:"10px"}}>
            {!(state.facturas&&state.facturas.length)?(
              <div style={{textAlign:"center",color:"#3A2810",padding:"30px 0",fontSize:11}}>Sin facturas emitidas.</div>
            ):[].concat(state.facturas||[]).reverse().map(function(f){
              var t=f.totals||calcTotals(f.items||[]);
              return (
                <div key={f.id} style={{...C.card,padding:"9px 11px",borderLeft:"3px solid "+(f.tipo==="completa"?"#C9A96E":"#7A9E7E")}}>
                  <div style={{display:"flex",justifyContent:"space-between"}}>
                    <div><div style={{fontSize:11,color:"#E8DCC8",fontWeight:"bold"}}>Factura #{String(f.number||0).padStart(6,"0")}</div><div style={{fontSize:9,color:"#5A4030"}}>{fmtD(f.date)} - {f.tipo==="completa"?"B2B":"B2C"}</div>{f.cliente&&f.cliente.nombre&&<div style={{fontSize:9,color:"#8A7060"}}>{f.cliente.nombre}</div>}</div>
                    <div style={{textAlign:"right"}}><div style={{fontSize:13,color:"#C9A96E",fontWeight:"bold"}}>{fmt(t.total)}</div><div style={{fontSize:8,color:"#5A4030"}}>IVA: {fmt(t.totalVat)}</div></div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  };

          {(state.transfers||[]).length>0&&(

  var renderInformes = function() {
    var now=Date.now();
    var pmMap={hoy:0,semana:7*864e5,mes:30*864e5,"3m":90*864e5,"1a":365*864e5,todo:9999*864e5};
    var hoyStr=new Date().toISOString().slice(0,10);
    var desdeStr=infPeriod==="hoy"?hoyStr:new Date(now-(pmMap[infPeriod]||pmMap.mes)).toISOString().slice(0,10);
    var tkF=(state.tickets||[]).filter(function(t){if(!t.date)return false; if(infPeriod==="hoy")return t.date.slice(0,10)===hoyStr; return t.date.slice(0,10)>=desdeStr;});
    var txF=(state.transactions||[]).filter(function(t){if(!t.date)return false; if(infPeriod==="hoy")return t.date===hoyStr; return t.date>=desdeStr;});
    var revenue=txF.filter(function(t){return t.type==="ingreso";}).reduce(function(s,t){return s+t.amount;},0);
    var costs=txF.filter(function(t){return t.type==="gasto";}).reduce(function(s,t){return s+t.amount;},0);
    var cogs2=txF.filter(function(t){return t.category==="compra_insumos";}).reduce(function(s,t){return s+t.amount;},0);
    var opEx=costs-cogs2, gp=revenue-cogs2, resultado=revenue-costs;
    var gm=revenue>0?(gp/revenue)*100:0, ebitda=gp-opEx, ebitdaM=revenue>0?(ebitda/revenue)*100:0, nm=revenue>0?(resultado/revenue)*100:0;
    var tkTotal=tkF.length, tkMedio=tkTotal>0?tkF.reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0)/tkTotal:0;
    var prodMap={};
    tkF.forEach(function(t){(t.items||[]).forEach(function(i){if(!prodMap[i.desc])prodMap[i.desc]={qty:0,revenue:0}; prodMap[i.desc].qty+=i.qty||1; prodMap[i.desc].revenue+=(i.qty||1)*i.unitPrice;});});
    var prodList=Object.keys(prodMap).map(function(k){return Object.assign({name:k},prodMap[k]);}).sort(function(a,b){return b.revenue-a.revenue;});
    var totalRev=prodList.reduce(function(s,p){return s+p.revenue;},0)||1;
    var ingByCat={}, gastByCat={};
    txF.filter(function(t){return t.type==="ingreso";}).forEach(function(t){var c=ING_CATS[t.category]||t.category||"Otros"; ingByCat[c]=(ingByCat[c]||0)+t.amount;});
    txF.filter(function(t){return t.type==="gasto";}).forEach(function(t){var c=GASTO_CATS[t.category]||t.category||"Otros"; gastByCat[c]=(gastByCat[c]||0)+t.amount;});
    var totalIng=Object.values(ingByCat).reduce(function(s,v){return s+v;},0)||1;
    var totalGast=Object.values(gastByCat).reduce(function(s,v){return s+v;},0)||1;
    var mc=function(v){return v>=0?C.green:C.red;};

        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{display:"flex",gap:6,padding:"8px 10px",borderBottom:"1px solid rgba(201,169,110,0.1)",flexShrink:0,alignItems:"center"}}>
            <button onClick={function(){setCrmView("list");}} style={{padding:"5px 10px",fontSize:10,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,color:"#C4B49A",cursor:"pointer",fontFamily:"inherit"}}>Cancelar</button>
            <span style={{fontSize:12,color:"#C9A96E",fontWeight:"bold"}}>{isNewCup?"Nuevo cupon":"Editar cupon"}</span>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"10px"}}>
            <div style={{marginBottom:8}}><div style={{fontSize:8,letterSpacing:1,color:"#6A5535",textTransform:"uppercase",marginBottom:3}}>Codigo *</div><input style={{...C.inp,letterSpacing:2,textTransform:"uppercase"}} value={couponForm.code||""} onChange={function(e){setCF("code",e.target.value.toUpperCase().replace(/\s/g,""));}} placeholder="VERANO10" /></div>
            <div style={{marginBottom:8}}><div style={{fontSize:8,letterSpacing:1,color:"#6A5535",textTransform:"uppercase",marginBottom:3}}>Descripcion</div><input style={C.inp} value={couponForm.description||""} onChange={function(e){setCF("description",e.target.value);}} placeholder="Descuento verano" /></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <div><div style={{fontSize:8,color:"#5A4030",marginBottom:2}}>Tipo</div><select style={C.sel} value={couponForm.type||"percent"} onChange={function(e){setCF("type",e.target.value);}}><option value="percent">% porcentaje</option><option value="fixed">EUR fijo</option></select></div>
              <div><div style={{fontSize:8,color:"#5A4030",marginBottom:2}}>Valor</div><input style={C.inp} type="number" min="0" step="0.5" value={couponForm.value||""} onChange={function(e){setCF("value",parseFloat(e.target.value)||0);}} placeholder="10" /></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <div><div style={{fontSize:8,color:"#5A4030",marginBottom:2}}>Aplica sobre</div><select style={C.sel} value={couponForm.applyTo||"total"} onChange={function(e){setCF("applyTo",e.target.value); if(e.target.value==="total")setCF("productNames",[]);}}><option value="total">Total ticket</option><option value="products">Producto especifico</option></select></div>
              <div><div style={{fontSize:8,color:"#5A4030",marginBottom:2}}>Usos max (0=ilimitado)</div><input style={C.inp} type="number" min="0" value={couponForm.maxUses||""} onChange={function(e){setCF("maxUses",parseInt(e.target.value)||null);}} placeholder="0" /></div>
            </div>
            {couponForm.applyTo==="products"&&(
              <div style={{marginBottom:8}}>
                <div style={{fontSize:8,letterSpacing:1,color:"#6A5535",textTransform:"uppercase",marginBottom:3}}>Productos (busqueda parcial)</div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:5}}>
                  {(couponForm.productNames||[]).map(function(n){return <div key={n} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 8px",background:"rgba(201,169,110,0.15)",borderRadius:12,border:"1px solid rgba(201,169,110,0.3)"}}><span style={{fontSize:9,color:"#C9A96E"}}>{n}</span><button onClick={function(){setCF("productNames",(couponForm.productNames||[]).filter(function(x){return x!==n;}));}} style={{background:"none",border:"none",color:"#8A5030",cursor:"pointer",fontSize:11,padding:0}}>x</button></div>;})}
                </div>
                <div style={{marginBottom:5}}>
                  <div style={{fontSize:8,color:"#5A4030",marginBottom:4}}>Acceso rapido:</div>
                  <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                    {PROD_NAMES.map(function(pn){
                      var already=(couponForm.productNames||[]).includes(pn);
                      return <button key={pn} onClick={function(){if(!already)setCF("productNames",[].concat(couponForm.productNames||[],[pn]));}} style={{padding:"3px 7px",fontSize:8,borderRadius:10,border:"1px solid "+(already?"rgba(201,169,110,0.5)":"rgba(201,169,110,0.15)"),background:already?"rgba(201,169,110,0.15)":"transparent",color:already?"#C9A96E":"#5A4030",cursor:already?"default":"pointer",fontFamily:"inherit"}}>{pn}</button>;
                    })}
                  </div>
                </div>
              </div>
            )}
            <div style={{marginBottom:12}}><div style={{fontSize:8,color:"#5A4030",marginBottom:2}}>Caduca (vacio = no caduca)</div><input style={C.inp} type="date" value={couponForm.expiresAt||""} onChange={function(e){setCF("expiresAt",e.target.value||null);}} /></div>
            <button onClick={async function(){
              if (!couponForm.code) return alert("El codigo es obligatorio.");
              if (coupons.find(function(c){return c.code===couponForm.code&&c.id!==couponForm.id;})) return alert("Codigo ya en uso.");
              var cup=Object.assign({usedCount:0,active:true},couponForm,{id:couponForm.id||gid("cup")});
              await saveCoupon(cup); setCrmView("list"); setCouponForm({});
            }} style={{width:"100%",padding:"11px",background:"linear-gradient(135deg,#C9A96E,#7A5530)",border:"none",borderRadius:8,color:"#1A0E04",fontFamily:"Georgia,serif",fontSize:12,fontWeight:"bold",cursor:"pointer"}}>{isNewCup?"Crear cupon":"Guardar cupon"}</button>
            {!isNewCup&&<button onClick={async function(){if(window.confirm("Eliminar cupon?")){await delCoupon(couponForm.id);setCrmView("list");setCouponForm({});}}} style={{width:"100%",marginTop:8,padding:"9px",background:"rgba(200,40,20,0.08)",border:"1px solid rgba(200,40,20,0.2)",borderRadius:8,color:"#FF6050",cursor:"pointer",fontFamily:"inherit",fontSize:11}}>Eliminar cupon</button>}
          </div>
        </div>
      );
    }

    // List view
    var tierCounts={};
    TIERS.forEach(function(t){tierCounts[t.id]=clients.filter(function(c){return getTier(c.totalSpent||0,c.tierOverride).id===t.id;}).length;});
    return (
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{display:"flex",borderBottom:"1px solid rgba(201,169,110,0.1)",flexShrink:0}}>
          {[["clientes","Clientes ("+clients.length+")"],["cupones","Cupones ("+coupons.length+")"],["tiers","Tiers"]].map(function(t){
            return <button key={t[0]} onClick={function(){setCrmTab(t[0]);}} style={{flex:1,padding:"9px 0",fontSize:9,textTransform:"uppercase",textAlign:"center",cursor:"pointer",color:crmTab===t[0]?"#C9A96E":"#5A4020",background:"none",border:"none",borderBottom:crmTab===t[0]?"2px solid #C9A96E":"2px solid transparent",fontFamily:"inherit"}}>{t[1]}</button>;
          })}
        </div>
        {crmTab==="clientes"&&(
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"8px 10px",borderBottom:"1px solid rgba(201,169,110,0.08)",flexShrink:0,display:"flex",gap:6}}>
              <input value={crmSearch} onChange={function(e){setCrmSearch(e.target.value);}} placeholder="Buscar cliente..." style={{...C.inp,flex:1}} />
              <button onClick={function(){setCrmView("editclient");setCrmForm({});}} style={{padding:"7px 11px",background:"linear-gradient(135deg,#C9A96E,#7A5530)",border:"none",borderRadius:7,color:"#1A0E04",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:10,fontWeight:"bold"}}>+ Nuevo</button>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"8px 10px"}}>
              {!filtered.length?<div style={{textAlign:"center",color:"#3A2810",padding:"30px 0",fontSize:11}}>{crmSearch?"Sin resultados.":"Sin clientes. Crea el primero."}</div>:[].concat(filtered).sort(function(a,b){return (b.totalSpent||0)-(a.totalSpent||0);}).map(function(c){
                var t=getTier(c.totalSpent||0,c.tierOverride);
                return <div key={c.id} onClick={function(){setCrmSel(c);setCrmView("client");}} style={{...C.card,display:"flex",alignItems:"center",gap:8,borderLeft:"3px solid "+t.color,cursor:"pointer"}}><div style={{flex:1}}><div style={{fontSize:12,color:"#E8DCC8",fontWeight:"bold"}}>{c.name}</div><div style={{fontSize:9,color:"#5A4030"}}>{c.visits||0} visitas{c.lastVisit?" - "+c.lastVisit:""}</div>{c.category&&<div style={{fontSize:8,color:"#6A5535"}}>{c.category}</div>}</div><div style={{textAlign:"right"}}><div style={{fontSize:12,color:t.color,fontWeight:"bold"}}>{fmt(c.totalSpent||0)}</div><div style={{fontSize:8,color:t.color}}>{t.label}</div></div></div>;
              })}
            </div>
          </div>
        )}
        {crmTab==="cupones"&&(
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"8px 10px",flexShrink:0,textAlign:"right"}}>
              <button onClick={function(){setCrmView("editcoupon");setCouponForm({type:"percent",applyTo:"total"});}} style={{padding:"7px 11px",background:"linear-gradient(135deg,#C9A96E,#7A5530)",border:"none",borderRadius:7,color:"#1A0E04",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:10,fontWeight:"bold"}}>+ Nuevo cupon</button>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"0 10px 10px"}}>
              {!coupons.length?<div style={{textAlign:"center",color:"#3A2810",padding:"30px 0",fontSize:11}}>Sin cupones. Crea el primero.</div>:coupons.map(function(c){
                return <div key={c.id} onClick={function(){setCrmView("editcoupon");setCouponForm(Object.assign({},c));}} style={{...C.card,padding:"9px 11px",borderLeft:"3px solid "+(c.active?"#C9A96E":"#4A3820"),cursor:"pointer"}}><div style={{display:"flex",justifyContent:"space-between"}}><div><div style={{fontSize:12,color:c.active?"#C9A96E":"#5A4030",fontWeight:"bold",letterSpacing:1}}>{c.code}</div><div style={{fontSize:9,color:"#6A5535"}}>{c.description||""}{c.applyTo==="products"&&c.productNames&&c.productNames.length?" - Solo: "+c.productNames.join(", "):""}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:12,color:"#E8DCC8",fontWeight:"bold"}}>{c.type==="percent"?c.value+"%":fmt(c.value)}</div><div style={{fontSize:8,color:"#5A4030"}}>{c.usedCount||0}/{c.maxUses||"inf"} usos</div></div></div>{!c.active&&<div style={{fontSize:8,color:"#FF8060",marginTop:3}}>Agotado</div>}{c.expiresAt&&<div style={{fontSize:8,color:"#6A5535"}}>Caduca: {c.expiresAt}</div>}</div>;
              })}
            </div>
          </div>
        )}
        {crmTab==="tiers"&&(
          <div style={{flex:1,overflowY:"auto",padding:"10px"}}>
            {TIERS.map(function(t){
              return <div key={t.id} style={{...C.card,padding:"12px",marginBottom:8,borderLeft:"4px solid "+t.color}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}><span style={{fontSize:13,color:t.color,fontWeight:"bold"}}>{t.label}</span><span style={{fontSize:20,padding:"4px 12px",background:"rgba(255,255,255,0.05)",borderRadius:16,color:t.color,fontWeight:"bold"}}>{tierCounts[t.id]||0}</span></div><div style={{fontSize:10,color:"#8A7060",marginBottom:2}}>{t.minSpend===0?"Desde 0":fmt(t.minSpend)+" - "+fmt(t.maxSpend>=9e8?"sin limite":t.maxSpend)}</div><div style={{fontSize:11,color:"#C4B49A"}}>Descuento: <strong style={{color:t.color}}>{t.discount}%</strong></div></div>;
            })}
          </div>
        )}
      </div>
    );
  };

  // ── RENDER: CHAT ──────────────────────────────────────────────────────────
  var renderChat = function() {
    return (
      <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
        <div style={{flex:1,overflowY:"auto",padding:"12px",display:"flex",flexDirection:"column",gap:10}}>
          {msgs.map(function(m,i){
            return (
              <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",gap:7}}>
                {m.role==="assistant"&&<div style={{width:24,height:24,background:"linear-gradient(135deg,#C9A96E,#6B4E2A)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0,marginTop:3}}>☕</div>}
                <div style={C.bubble(m.role)}>
                  {m.role==="assistant"?<MsgBubble text={m.text} />:<span style={{color:"#E8DCC8"}}>{m.text}</span>}
                  {m.action&&<div style={{marginTop:5,padding:"2px 8px",fontSize:9,background:"rgba(122,158,126,0.12)",border:"1px solid rgba(122,158,126,0.25)",borderRadius:4,color:"#7A9E7E",display:"inline-block"}}>Guardado</div>}
                </div>
              </div>
            );
          })}
          {loading&&(
            <div style={{display:"flex",gap:7}}>
              <div style={{width:24,height:24,background:"linear-gradient(135deg,#C9A96E,#6B4E2A)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>☕</div>
              <div style={{...C.bubble("assistant"),display:"flex",gap:4,alignItems:"center"}}>
                {[0,1,2].map(function(j){return <div key={j} style={{width:5,height:5,borderRadius:"50%",background:"#C9A96E",animation:"dot 1.2s ease-in-out infinite",animationDelay:(j*0.2)+"s"}} />;}) }
              </div>
            </div>
          )}
          <div ref={endRef} />
        </div>
        <div style={{padding:"8px 10px",borderTop:"1px solid rgba(201,169,110,0.1)",background:C.dark,display:"flex",gap:6,alignItems:"flex-end",flexShrink:0}}>
          <textarea value={input} onChange={function(e){setInput(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}}} placeholder="Registra compras, activos, prestamos, pide analisis..." style={C.ta} rows={1} disabled={loading} />
          <button onClick={sendMsg} disabled={loading||!input.trim()} style={{width:40,height:40,background:loading||!input.trim()?"rgba(201,169,110,0.1)":"linear-gradient(135deg,#C9A96E,#7A5530)",border:"none",borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>
            {loading?"...":"↑"}
          </button>
        </div>
      </div>
    );
  };

  // ── RENDER: CONFIG ────────────────────────────────────────────────────────
  var renderConfig = function() {
    var fields=[["name","Nombre comercial"],["legalName","Razon social"],["nif","NIF/CIF"],["address","Direccion"],["cp","CP"],["city","Ciudad"],["phone","Telefono"],["email","Email"],["web","Web"],["ticketFooter","Pie de ticket"]];
    return (
      <div>
        <div style={C.secT}>Datos del comercio</div>
        {fields.map(function(f){
          return <div key={f[0]} style={{marginBottom:7}}><div style={{fontSize:8,letterSpacing:1,color:"#6A5535",textTransform:"uppercase",marginBottom:2}}>{f[1]}</div><input value={(state.business||INIT_BIZ)[f[0]]||""} onChange={function(e){var nb=Object.assign({},state.business||INIT_BIZ,{[f[0]]:e.target.value});var ns=Object.assign({},state,{business:nb});setState(ns);save(ns);}} style={C.inp} /></div>;
        })}
        <div style={C.secT}>Copia de seguridad</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
          <button onClick={exportData} style={{padding:"9px",fontSize:10,background:"rgba(201,169,110,0.08)",border:"1px solid rgba(201,169,110,0.2)",borderRadius:7,color:"#C9A96E",cursor:"pointer",fontFamily:"inherit"}}>Exportar JSON</button>
          <button onClick={function(){importRef.current&&importRef.current.click();}} style={{padding:"9px",fontSize:10,background:"rgba(122,158,126,0.08)",border:"1px solid rgba(122,158,126,0.2)",borderRadius:7,color:"#7A9E7E",cursor:"pointer",fontFamily:"inherit"}}>Importar JSON</button>
        </div>
        <input ref={importRef} type="file" accept=".json" onChange={importData} style={{display:"none"}} />
        <div style={C.secT}>Zona peligrosa</div>
        <button onClick={resetGrano} style={{width:"100%",padding:"10px",fontSize:11,background:"rgba(200,40,20,0.08)",border:"1px solid rgba(200,40,20,0.25)",borderRadius:7,color:"#FF6050",cursor:"pointer",fontFamily:"inherit"}}>Resetear GRANO a cero</button>
      </div>
    );
  };

  // ── MAIN RETURN ───────────────────────────────────────────────────────────
  var TABS = [
    ["tpv","🧾","TPV"], ["caja","💵","Caja"], ["hist","📜","Hist"],
    ["dash","📈","Dash"], ["fact","📋","Fact"], ["stock","📦","Stock"],
    ["fin","📊","P&L"], ["crm","👥","CRM"], ["chat","💬","Chat"],
    ["config","⚙","Cfg"],
  ];

  return (
    <div style={{fontFamily:"'Georgia','Times New Roman',serif",background:"#130E07",height:"100dvh",display:"flex",flexDirection:"column",color:"#E8DCC8",overflow:"hidden"}}>
      <style>{"@keyframes dot{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}} ::-webkit-scrollbar{width:2px} ::-webkit-scrollbar-thumb{background:rgba(201,169,110,0.2);border-radius:3px} *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}"}</style>
      <div style={{background:"linear-gradient(135deg,#251608,#130E07)",borderBottom:"1px solid rgba(201,169,110,0.18)",padding:"8px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:26,height:26,background:"linear-gradient(135deg,#C9A96E,#7A5530)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>☕</div>
          <div style={{fontSize:15,letterSpacing:3,color:"#C9A96E",fontStyle:"italic"}}>GRANO</div>
        </div>
        <div style={{display:"flex",gap:5,alignItems:"center"}}>
          {saveStatus==="saved"&&<span style={{fontSize:8,color:"#7A9E7E"}}>✓</span>}
          <button onClick={exportData} title="Exportar backup JSON" style={{width:28,height:28,background:"rgba(201,169,110,0.08)",border:"1px solid rgba(201,169,110,0.2)",borderRadius:6,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",color:"#C9A96E"}}>💾</button>
          <div style={{padding:"2px 8px",background:"rgba(201,169,110,0.07)",border:"1px solid rgba(201,169,110,0.15)",borderRadius:10,textAlign:"center"}}>
            <div style={{fontSize:11,color:netColor,fontWeight:"bold"}}>{fmt(fin.netIncome)}</div>
            <div style={{fontSize:7,color:"#5A4030",letterSpacing:1,textTransform:"uppercase"}}>Neto</div>
          </div>
          <div style={{padding:"2px 8px",background:"rgba(201,169,110,0.07)",border:"1px solid rgba(201,169,110,0.15)",borderRadius:10,textAlign:"center"}}>
            <div style={{fontSize:11,color:"#7A9E7E",fontWeight:"bold"}}>{fmt(fin.todaySales)}</div>
            <div style={{fontSize:7,color:"#5A4030",letterSpacing:1,textTransform:"uppercase"}}>Hoy</div>
          </div>
        </div>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minHeight:0}}>
        <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",minHeight:0}}>
          {tab==="tpv"&&renderTPV()}
          {tab==="caja"&&<div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>{renderCaja()}</div>}
          {tab==="hist"&&<div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>{renderHistorial()}</div>}
          {tab==="dash"&&<div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>{renderDash()}</div>}
          {tab==="fact"&&<div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>{renderFacturas()}</div>}
          {tab==="stock"&&<div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>{renderStock()}</div>}
          {tab==="fin"&&renderFin()}
          {tab==="crm"&&<div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>{renderCRM()}</div>}
          {tab==="chat"&&renderChat()}
          {tab==="config"&&<div style={{flex:1,overflowY:"auto",padding:"10px"}}>{renderConfig()}</div>}
        </div>
        <div style={{height:56,background:"#0A0600",borderTop:"1px solid rgba(201,169,110,0.15)",display:"flex",alignItems:"stretch",flexShrink:0}}>
          {TABS.map(function(t){
            var active=tab===t[0];
            return (
              <button key={t[0]} onClick={function(){setTab(t[0]);}} style={{flex:1,background:active?"rgba(201,169,110,0.1)":"transparent",border:"none",borderTop:active?"2px solid #C9A96E":"2px solid transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,minWidth:0,padding:"3px 0"}}>
                <span style={{fontSize:15,lineHeight:1,opacity:active?1:0.35}}>{t[1]}</span>
                <span style={{fontSize:7,color:active?"#C9A96E":"#4A3820",letterSpacing:0.5,textTransform:"uppercase"}}>{t[2]}</span>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(GranoApp));
  </script>
  <script>
    if ("serviceWorker" in navigator && location.hostname === "cery17.github.io") {
      window.addEventListener("load", function() {
        navigator.serviceWorker.register("/Grano/sw.js")
          .then(function(r){ console.log("SW:", r.scope); })
          .catch(function(e){ console.log("SW error:", e); });
      });
    }
  </script>
</body>
</html>
