      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{display:"flex",borderBottom:"1px solid rgba(201,169,110,0.1)",flexShrink:0}}>
          <button onClick={function(){setCrmTab("clientes");}} style={{flex:1,padding:"9px 0",fontSize:10,textTransform:"uppercase",textAlign:"center",cursor:"pointer",color:crmTab==="clientes"?"#C9A96E":"#5A4020",background:"none",border:"none",borderBottom:crmTab==="clientes"?"2px solid #C9A96E":"2px solid transparent",fontFamily:"inherit"}}>Clientes ({clients.length})</button>
          <button onClick={function(){setCrmTab("cupones");}} style={{flex:1,padding:"9px 0",fontSize:10,textTransform:"uppercase",textAlign:"center",cursor:"pointer",color:crmTab==="cupones"?"#C9A96E":"#5A4020",background:"none",border:"none",borderBottom:crmTab==="cupones"?"2px solid #C9A96E":"2px solid transparent",fontFamily:"inherit"}}>Cupones ({coupons.length})</button>
          <button onClick={function(){setCrmTab("tiers");}} style={{flex:1,padding:"9px 0",fontSize:10,textTransform:"uppercase",textAlign:"center",cursor:"pointer",color:crmTab==="tiers"?"#C9A96E":"#5A4020",background:"none",border:"none",borderBottom:crmTab==="tiers"?"2px solid #C9A96E":"2px solid transparent",fontFamily:"inherit"}}>Tiers</button>
        </div>
        {crmTab==="clientes"&&(
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"8px 10px",borderBottom:"1px solid rgba(201,169,110,0.08)",flexShrink:0,display:"flex",gap:6}}>
              <input value={crmSearch} onChange={function(e){setCrmSearch(e.target.value);}} placeholder="Buscar cliente..." style={{...ST.inp,flex:1}} />
              <button onClick={function(){setCrmView("editclient");setCrmForm({});}} style={{padding:"7px 11px",background:"linear-gradient(135deg,#C9A96E,#7A5530)",border:"none",borderRadius:7,color:"#1A0E04",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:10,fontWeight:"bold"}}>+ Nuevo</button>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"8px 10px"}}>
              {filtered.length===0?(
                <div style={{textAlign:"center",color:"#3A2810",padding:"30px 0",fontSize:11}}>{crmSearch?"Sin resultados.":"Sin clientes aun. Crea el primero."}</div>
              ):filtered.sort(function(a,b){return (b.totalSpent||0)-(a.totalSpent||0);}).map(function(c){
                var tier=getTier(c.totalSpent||0,c.tierOverride);
                return (
                  <div key={c.id} onClick={function(){setCrmSel(c);setCrmView("client");}} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",marginBottom:4,background:"rgba(255,255,255,0.025)",borderRadius:8,border:"1px solid rgba(255,255,255,0.05)",borderLeft:"3px solid "+tier.color,cursor:"pointer"}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,color:"#E8DCC8",fontWeight:"bold"}}>{c.name}</div>
                      <div style={{fontSize:9,color:"#5A4030"}}>{c.visits||0} visitas{c.lastVisit?" - ultima: "+c.lastVisit:""}</div>
                      {c.category&&<div style={{fontSize:8,color:"#6A5535",fontStyle:"italic"}}>{c.category}</div>}
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{fontSize:12,color:tier.color,fontWeight:"bold"}}>{fmt(c.totalSpent||0)}</div>
                      <div style={{fontSize:8,color:tier.color}}>{tier.label}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        {crmTab==="cupones"&&(
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"8px 10px",borderBottom:"1px solid rgba(201,169,110,0.08)",flexShrink:0,textAlign:"right"}}>
              <button onClick={function(){setCrmView("coupon");setCouponForm({type:"percent",applyTo:"total"});}} style={{padding:"7px 11px",background:"linear-gradient(135deg,#C9A96E,#7A5530)",border:"none",borderRadius:7,color:"#1A0E04",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:10,fontWeight:"bold"}}>+ Nuevo cupon</button>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"8px 10px"}}>
              {coupons.length===0?(
                <div style={{textAlign:"center",color:"#3A2810",padding:"30px 0",fontSize:11}}>Sin cupones. Crea el primero.</div>
              ):coupons.map(function(c){
                return (
                  <div key={c.id} onClick={function(){setCrmView("editcoupon");setCouponForm({...c});}} style={{padding:"9px 11px",marginBottom:5,background:"rgba(255,255,255,0.025)",borderRadius:8,border:"1px solid rgba(255,255,255,0.05)",borderLeft:"3px solid "+(c.active?"#C9A96E":"#4A3820"),cursor:"pointer"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{fontSize:12,color:c.active?"#C9A96E":"#5A4030",fontWeight:"bold",letterSpacing:1}}>{c.code}</div>
                        <div style={{fontSize:9,color:"#6A5535",marginTop:1}}>{c.description||""}{c.applyTo==="products"&&c.productNames&&c.productNames.length>0?" - Solo: "+c.productNames.join(", "):""}</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:12,color:"#E8DCC8",fontWeight:"bold"}}>{c.type==="percent"?c.value+"%":fmt(c.value)}</div>
                        <div style={{fontSize:8,color:"#5A4030"}}>{c.usedCount||0}/{c.maxUses||"inf"} usos</div>
                      </div>
                    </div>
                    {!c.active&&<div style={{fontSize:8,color:"#FF8060",marginTop:3}}>Agotado o inactivo</div>}
                    {c.expiresAt&&<div style={{fontSize:8,color:"#6A5535",marginTop:2}}>Caduca: {c.expiresAt}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        )}
        {crmTab==="tiers"&&(
          <div style={{flex:1,overflowY:"auto",padding:"10px"}}>
            {TIERS.map(function(t){
              return (
                <div key={t.id} style={{padding:"12px",marginBottom:8,background:"rgba(255,255,255,0.025)",borderRadius:9,border:"1px solid rgba(255,255,255,0.06)",borderLeft:"4px solid "+t.color}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                    <span style={{fontSize:13,color:t.color,fontWeight:"bold"}}>{t.label}</span>
                    <span style={{fontSize:20,padding:"4px 10px",background:"rgba(255,255,255,0.05)",borderRadius:16,color:t.color,fontWeight:"bold"}}>{tierCounts[t.id]||0}</span>
                  </div>
                  <div style={{fontSize:10,color:"#8A7060",marginBottom:3}}>{t.minSpend===0?"Desde 0":fmt(t.minSpend)+" - "+fmt(t.maxSpend>=9e8?"sin limite":t.maxSpend)}</div>
                  <div style={{fontSize:11,color:"#C4B49A"}}>Descuento: <strong style={{color:t.color}}>{t.discount}%</strong></div>
                  <div style={{fontSize:9,color:"#5A4030",marginTop:4}}>Ascenso automatico por gasto acumulado. Override manual disponible en ficha de cliente.</div>
                </div>
              );
            })}
            <div style={{padding:"9px",background:"rgba(255,255,255,0.02)",borderRadius:8,border:"1px solid rgba(255,255,255,0.05)",fontSize:9,color:"#5A4030"}}>
              Para modificar los tiers y sus descuentos, edita las constantes TIERS en el codigo de GRANO.
            </div>
          </div>
        )}
      </div>
    );
  };

  const renderConfig=function(){
    const fields=[["name","Nombre comercial"],["legalName","Razón social"],["nif","NIF/CIF"],["address","Dirección"],["cp","CP"],["city","Ciudad"],["phone","Teléfono"],["email","Email"],["web","Web"],["ticketFooter","Pie de ticket"]];
    return (
      <div>
        <div style={ST.secT}>Datos del comercio</div>
        {fields.map(function(entry){
          const k=entry[0], label=entry[1];
          return (
            <div key={k} style={{marginBottom:7}}>
              <div style={{fontSize:8,letterSpacing:1,color:"#6A5535",textTransform:"uppercase",marginBottom:2}}>{label}</div>
              <input value={(state.business||INIT_BIZ)[k]||""} onChange={function(e){const nb={...(state.business||INIT_BIZ),[k]:e.target.value};const ns={...state,business:nb};setState(ns);save(ns);}} style={ST.inp} />
            </div>
          );
        })}
        <div style={ST.secT}>Copia de seguridad</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
          <button onClick={exportData} style={{padding:"9px",fontSize:10,background:"rgba(201,169,110,0.08)",border:"1px solid rgba(201,169,110,0.2)",borderRadius:7,color:"#C9A96E",cursor:"pointer",fontFamily:"inherit"}}>Exportar JSON</button>
          <button onClick={function(){importRef.current&&importRef.current.click();}} style={{padding:"9px",fontSize:10,background:"rgba(122,158,126,0.08)",border:"1px solid rgba(122,158,126,0.2)",borderRadius:7,color:"#7A9E7E",cursor:"pointer",fontFamily:"inherit"}}>Importar JSON</button>
        </div>
        <input ref={importRef} type="file" accept=".json" onChange={importData} style={{display:"none"}} />
        <div style={ST.secT}>Zona peligrosa</div>
        <button onClick={resetGrano} style={{width:"100%",padding:"10px",fontSize:11,background:"rgba(200,40,20,0.1)",border:"1px solid rgba(200,40,20,0.3)",borderRadius:7,color:"#FF6050",cursor:"pointer",fontFamily:"inherit"}}>
          Resetear GRANO a cero
        </button>
      </div>
    );
  };

  const TABS=[["tpv","🧾","TPV"],["caja","💵","Caja"],["hist","📜","Hist"],["dash","📈","Dash"],["fact","📋","Fact"],["stock","📦","Stock"],["fin","📊","P&L"],["crm","👥","CRM"],["chat","💬","Chat"],["config","[Cfg]","Cfg"]];
  const finTabList=[["pl","P&L"],["activos","Activos"],["prestamos","Deuda"],["valor","Valor"],["informes","Informes"]];

  return (
    <div style={ST.root}>
      <style>{"@keyframes dot{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}} ::-webkit-scrollbar{width:2px} ::-webkit-scrollbar-thumb{background:rgba(201,169,110,0.2);border-radius:3px}"}</style>
      <div style={ST.hdr}>
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          <div style={{width:26,height:26,background:"linear-gradient(135deg,#C9A96E,#7A5530)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>☕</div>
          <div style={{fontSize:15,letterSpacing:3,color:"#C9A96E",fontStyle:"italic"}}>GRANO</div>
        </div>
        <div style={{display:"flex",gap:5,alignItems:"center"}}>
          {saveStatus==="saved"&&<span style={{fontSize:8,color:"#7A9E7E"}}>v</span>}
          <button onClick={exportData} title="Exportar JSON" style={{width:28,height:28,background:"rgba(201,169,110,0.08)",border:"1px solid rgba(201,169,110,0.2)",borderRadius:6,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>💾</button>
          <div style={{padding:"2px 8px",background:"rgba(201,169,110,0.07)",border:"1px solid rgba(201,169,110,0.15)",borderRadius:12,textAlign:"center"}}>
            <div style={{fontSize:11,color:netColor,fontWeight:"bold"}}>{fmt(fin.netIncome)}</div>
            <div style={{fontSize:7,color:"#5A4030",letterSpacing:1,textTransform:"uppercase"}}>Neto</div>
          </div>
          <div style={{padding:"2px 8px",background:"rgba(201,169,110,0.07)",border:"1px solid rgba(201,169,110,0.15)",borderRadius:12,textAlign:"center"}}>
            <div style={{fontSize:11,color:"#7A9E7E",fontWeight:"bold"}}>{fmt(fin.todaySales)}</div>
            <div style={{fontSize:7,color:"#5A4030",letterSpacing:1,textTransform:"uppercase"}}>Hoy</div>
          </div>
        </div>
      </div>
      <div style={ST.main}>
        <div style={ST.cont}>
          {tab==="tpv"&&renderTPV()}
          {tab==="caja"&&<div style={ST.cont}>{renderCaja()}</div>}
          {tab==="hist"&&<div style={ST.cont}>{renderHistorial()}</div>}
          {tab==="dash"&&<div style={ST.cont}>{renderDash()}</div>}
          {tab==="fact"&&<div style={ST.cont}>{renderFacturas()}</div>}
          {tab==="stock"&&<div style={ST.cont}>{renderStock()}</div>}
          {tab==="crm"&&<div style={ST.cont}>{renderCRM()}</div>}
          {tab==="fin"&&(
            <div style={ST.panel}>
              <div style={{display:"flex",marginBottom:8,borderRadius:6,overflow:"hidden",border:"1px solid rgba(201,169,110,0.15)"}}>
                {finTabList.map(function(entry){
                  return <button key={entry[0]} style={{flex:1,padding:"7px 0",fontSize:9,letterSpacing:1,textTransform:"uppercase",textAlign:"center",cursor:"pointer",color:finTab===entry[0]?"#130E07":"#5A4020",background:finTab===entry[0]?"#C9A96E":"transparent",border:"none",fontFamily:"inherit"}} onClick={function(){setFinTab(entry[0]);}}>{entry[1]}</button>;
                })}
              </div>
              {renderFin()}
            </div>
          )}
          {tab==="chat"&&renderChat()}
          {tab==="config"&&<div style={ST.panel}>{renderConfig()}</div>}
        </div>
        <div style={ST.bnav}>
          {TABS.map(function(entry){
            const k=entry[0], icon=entry[1], label=entry[2];
            return (
              <button key={k} style={ST.nb(tab===k)} onClick={function(){setTab(k);}}>
                <span style={{fontSize:16,lineHeight:1,opacity:tab===k?1:0.35}}>{icon}</span>
                <span style={{fontSize:7,color:tab===k?"#C9A96E":"#4A3820",letterSpacing:0.5,textTransform:"uppercase",marginTop:1}}>{label}</span>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(GranoApp));
  </script>
</body>
</html>
