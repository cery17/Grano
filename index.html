const fmt = (n) => new Intl.NumberFormat("es-ES",{style:"currency",currency:"EUR"}).format(n||0);

function calcTotals(items) {
  const byVat = {}; let tBase=0, tVat=0, total=0;
  for (const item of items) {
    const pct=IVA[item.vatType]||10, lt=item.qty*item.unitPrice;
    const base=lt/(1+pct/100), vat=lt-base;
    if (!byVat[item.vatType]) byVat[item.vatType]={base:0,vat:0,pct};
    byVat[item.vatType].base+=base; byVat[item.vatType].vat+=vat;
    tBase+=base; tVat+=vat; total+=lt;
  }
  return {byVat, totalBase:tBase, totalVat:tVat, total};
}
function calcLoan(l) {
  const r=l.interestRate/100/12, n=l.termMonths;
  const monthly=r>0?l.principal*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1):l.principal/n;
  const k=Math.min(n,Math.max(0,Math.floor((Date.now()-new Date(l.startDate).getTime())/(1000*60*60*24*30.44))));
  const rem=r>0?l.principal*(Math.pow(1+r,n)-Math.pow(1+r,k))/(Math.pow(1+r,n)-1):Math.max(0,l.principal-(l.principal/n)*k);
  return {monthly, remaining:Math.max(0,rem), monthsLeft:n-k};
}
function calcAsset(a) {
  const age=(Date.now()-new Date(a.purchaseDate).getTime())/(1000*60*60*24*365.25);
  return {bookValue:a.purchasePrice*Math.max(0,1-age/a.depreciationYears), annualDep:a.purchasePrice/a.depreciationYears};
}
function applyAction(state, action) {
  if (!action || !action.type) return state;
  const s = {
    ...state, inventory:[...state.inventory], transactions:[...state.transactions],
    assets:[...state.assets], loans:[...state.loans], tickets:[...state.tickets],
    transfers:[...(state.transfers||[])], roasts:[...(state.roasts||[])],
  };
  if (action.type==="UPSERT_INVENTORY" && action.items) {
    for (const item of action.items) {
      const idx=s.inventory.findIndex(x=>x.id===item.id);
      if (idx>=0) s.inventory[idx]={...s.inventory[idx],...item};
      else s.inventory.push({almacen:"tostador",...item,id:item.id||gid("inv")});
    }
  }
  if (action.type==="ADD_TRANSACTION" && action.transaction) {
    s.transactions.push({...action.transaction, id:action.transaction.id||gid("txn")});
  }
  if (action.type==="UPSERT_ASSET" && action.asset) {
    const idx=s.assets.findIndex(x=>x.id===action.asset.id);
    if (idx>=0) s.assets[idx]={...s.assets[idx],...action.asset};
    else s.assets.push({...action.asset, id:action.asset.id||gid("asset")});
  }
  if (action.type==="UPSERT_LOAN" && action.loan) {
    const idx=s.loans.findIndex(x=>x.id===action.loan.id);
    if (idx>=0) s.loans[idx]={...s.loans[idx],...action.loan};
    else s.loans.push({...action.loan, id:action.loan.id||gid("loan"), payments:[]});
  }
  if (action.type==="ADJUST_STOCK" && action.adjustments) {
    for (const adj of action.adjustments) {
      const idx=s.inventory.findIndex(x=>x.id===adj.id);
      if (idx>=0) s.inventory[idx]={...s.inventory[idx], quantity:Math.max(0,(s.inventory[idx].quantity||0)+adj.delta)};
    }
  }
  if (action.type==="TRANSFER_STOCK" && action.transfer) {
    const {from,to,itemId,qty,reason}=action.transfer;
    const si=s.inventory.findIndex(x=>x.id===itemId&&x.almacen===from);
    if (si>=0 && s.inventory[si].quantity>=qty) {
      const item=s.inventory[si];
      s.inventory[si]={...item, quantity:item.quantity-qty};
      const di=s.inventory.findIndex(x=>x.name===item.name&&x.almacen===to);
      if (di>=0) s.inventory[di]={...s.inventory[di], quantity:(s.inventory[di].quantity||0)+qty};
      else s.inventory.push({...item, id:gid("inv"), almacen:to, quantity:qty});
      s.transfers.push({id:gid("tr"), date:new Date().toISOString(), from, to, itemId, itemName:item.name, qty, unit:item.unit, reason:reason||""});
    }
  }
  if (action.type==="REGISTER_ROAST" && action.roast) {
    const {verdeId,qtyVerde,qtyTostado,notes}=action.roast;
    const vi=s.inventory.findIndex(x=>x.id===verdeId);
    if (vi>=0 && s.inventory[vi].quantity>=qtyVerde) {
      const verde=s.inventory[vi];
      s.inventory[vi]={...verde, quantity:verde.quantity-qtyVerde};
      const tId="tostado_"+verdeId;
      const ti=s.inventory.findIndex(x=>x.id===tId);
      const cost=parseFloat(((verde.unitCost*qtyVerde)/qtyTostado).toFixed(2));
      if (ti>=0) s.inventory[ti]={...s.inventory[ti], quantity:(s.inventory[ti].quantity||0)+qtyTostado};
      else s.inventory.push({id:tId, name:verde.name.replace(/verde/i,"tostado"), quantity:qtyTostado, unit:verde.unit, unitCost:cost, category:"cafe_tostado", almacen:"tostador", minStock:verde.minStock||1});
      s.roasts.push({id:gid("r"), date:new Date().toISOString(), verdeId, verdeName:verde.name, qtyVerde, qtyTostado, merma:parseFloat(((qtyVerde-qtyTostado)/qtyVerde*100).toFixed(1)), notes:notes||""});
    }
  }
  return s;
}
function parseAction(text) {
  const m=text.match(/<GRANO_ACTION>([\s\S]*?)<\/GRANO_ACTION>/);
  const clean=text.replace(/<GRANO_ACTION>[\s\S]*?<\/GRANO_ACTION>/,"").trim();
  let action=null;
  if (m) { try { action=JSON.parse(m[1].trim()); } catch(e) {} }
  return {clean, action};
}
function parseSale(text) {
  const m=text.match(/<TPV_SALE>([\s\S]*?)<\/TPV_SALE>/);
  if (m) { try { return JSON.parse(m[1].trim()); } catch(e) {} }
  return null;
}
async function callAPI(system, messages) {
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system,messages}),
  });
  const data=await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content?.[0]?.text||"";
}

function getTier(spent, override) {
  if (override) return TIERS.find(function(t){return t.id===override;})||TIERS[0];
  return TIERS.slice().reverse().find(function(t){return spent>=t.minSpend;})||TIERS[0];
}

function MsgBubble({ text }) {
  if (!text) return null;
  const lines=text.split("\n");
  return (
    <div>
      {lines.map(function(l,i) {
        if (l.startsWith("## ")) return <div key={i} style={{color:"#E8DCC8",fontWeight:"bold",margin:"8px 0 3px",fontSize:13}}>{l.slice(3)}</div>;
        if (l.startsWith("### ")) return <div key={i} style={{color:"#C9A96E",fontWeight:"bold",margin:"6px 0 2px",fontSize:11,letterSpacing:1,textTransform:"uppercase"}}>{l.slice(4)}</div>;
        if (l.match(/^[-*] /)) return <div key={i} style={{display:"flex",gap:5,margin:"2px 0",fontSize:12,color:"#C4B49A"}}><span style={{color:"#C9A96E",flexShrink:0}}>›</span><span>{l.slice(2)}</span></div>;
        if (l.startsWith("---")) return <hr key={i} style={{border:"none",borderTop:"1px solid rgba(201,169,110,0.2)",margin:"8px 0"}} />;
        if (l.trim()==="") return <div key={i} style={{height:5}} />;
        const parts=l.split(/(\*\*[^*]+\*\*)/g);
        return (
          <p key={i} style={{margin:"2px 0",fontSize:12,color:"#C4B49A",lineHeight:1.55}}>
            {parts.map(function(p,j) {
              if (p.startsWith("**")&&p.endsWith("**")) return <strong key={j} style={{color:"#C9A96E"}}>{p.slice(2,-2)}</strong>;
              return p;
            })}
          </p>
        );
      })}
    </div>
  );
}

  const confirmSale=async function(){
    if (!pendingSale) return;
    var rawTotals=calcTotals(pendingSale.items);
    var discountAmt=0;
    var discountDesc="";
    // Apply tier discount
    if (tpvClient) {
      var tier=getTier(tpvClient.totalSpent||0, tpvClient.tierOverride);
      if (tier.discount>0) {
        discountAmt+=parseFloat((rawTotals.total*tier.discount/100).toFixed(2));
        discountDesc+="Descuento "+tier.label+" ("+tier.discount+"%) ";
      }
    }
    // Apply coupon discount
    if (tpvCoupon&&tpvCoupon.active) {
      var coup=tpvCoupon;
      var base=rawTotals.total;
      // If product-specific, calculate only on matching items
      if (coup.applyTo==="products"&&coup.productNames&&coup.productNames.length>0) {
        base=pendingSale.items.reduce(function(s,item){
          var matches=coup.productNames.some(function(n){return item.desc.toLowerCase().includes(n.toLowerCase());});
          return s+(matches?(item.qty||1)*item.unitPrice:0);
        },0);
      }
      if (coup.type==="percent") {
        discountAmt+=parseFloat((base*coup.value/100).toFixed(2));
        discountDesc+="Cupon "+coup.code+" (-"+coup.value+"% sobre "+(coup.applyTo==="products"?(coup.productNames||[]).join(", "):"ticket")+") ";
      } else {
        discountAmt+=Math.min(coup.value, base);
        discountDesc+="Cupon "+coup.code+" (-"+fmt(Math.min(coup.value,base))+") ";
      }
    }
    discountAmt=Math.min(discountAmt, rawTotals.total);
    var finalTotal=parseFloat((rawTotals.total-discountAmt).toFixed(2));
    var totals={...rawTotals, total:finalTotal, discount:discountAmt, discountDesc:discountDesc.trim()};
    var num=state.ticketCounter||1;
    var ticket={id:gid("tkt"),number:num,date:new Date().toISOString(),items:pendingSale.items,paymentMethod:pendingSale.paymentMethod||"efectivo",totals,clientId:tpvClient?tpvClient.id:null,clientName:tpvClient?tpvClient.name:"",couponCode:tpvCoupon?tpvCoupon.code:""};
    var txn={id:gid("txn"),date:new Date().toISOString().slice(0,10),type:"ingreso",category:"venta_take_away",amount:finalTotal,description:"Ticket #"+String(num).padStart(6,"0")+(tpvClient?" - "+tpvClient.name:"")};
    var ns={...state,tickets:[...(state.tickets||[]),ticket],ticketCounter:num+1,transactions:[...state.transactions,txn]};
    // Update client history
    if (tpvClient) {
      var clients=(ns.clients||[]).map(function(c){
        if (c.id!==tpvClient.id) return c;
        return {...c, totalSpent:(c.totalSpent||0)+finalTotal, visits:(c.visits||0)+1, lastVisit:new Date().toISOString().slice(0,10)};
      });
      ns={...ns,clients:clients};

    // Update coupon usage
    if (tpvCoupon) {
      var coupons=(ns.coupons||[]).map(function(c){
        if (c.id!==tpvCoupon.id) return c;
        var newCount=(c.usedCount||0)+1;
        return {...c, usedCount:newCount, active:c.maxUses?newCount<c.maxUses:true};

  const fin=useMemo(function(){
    const txns=state.transactions||[], assets=state.assets||[], loans=state.loans||[], inv=state.inventory||[];
    const ingresos=txns.filter(function(t){return t.type==="ingreso";}).reduce(function(s,t){return s+t.amount;},0);
    const gastos=txns.filter(function(t){return t.type==="gasto";}).reduce(function(s,t){return s+t.amount;},0);
    const now=Date.now(), threeM=now-90*24*60*60*1000;
    const rG=txns.filter(function(t){return t.type==="gasto"&&new Date(t.date).getTime()>threeM;}).reduce(function(s,t){return s+t.amount;},0);
    const rI=txns.filter(function(t){return t.type==="ingreso"&&new Date(t.date).getTime()>threeM;}).reduce(function(s,t){return s+t.amount;},0);
    const burnRate=rG/3, monthlyRev=rI/3;

              {PRODUCTS_FIXED.map(function(p){
                const isTest=p.price===0;

                  <button key={p.id} onClick={function(){addFixedToCart(p);}} style={{padding:"10px 4px",borderRadius:9,border:"1px solid "+(isTest?"rgba(255,150,0,0.2)":"rgba(201,169,110,0.15)"),background:isTest?"rgba(255,150,0,0.05)":"rgba(255,255,255,0.03)",cursor:"pointer",textAlign:"center",fontFamily:"inherit"}}>
                    <div style={{fontSize:16,marginBottom:2}}>{p.emoji}</div>
                    <div style={{fontSize:9,color:"#C4B49A",lineHeight:1.2,marginBottom:2}}>{p.name}</div>
                    <div style={{fontSize:10,color:isTest?"#FFA040":"#C9A96E"}}>{isTest?"GRATIS":fmt(p.price)}</div>

            <div style={{marginTop:8,display:"flex",alignItems:"center",gap:8}}>
              <div onClick={function(){setFBolsa(function(b){return !b;});}} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 10px",borderRadius:8,border:"1px solid "+(fBolsa?"#7A9E7E":"rgba(201,169,110,0.15)"),background:fBolsa?"rgba(122,158,126,0.12)":"rgba(255,255,255,0.02)",cursor:"pointer"}}>
                <span style={{fontSize:14}}>🛍</span>
                <div>
                  <div style={{fontSize:9,color:"#C4B49A"}}>Bolsa papel</div>
                  <div style={{fontSize:9,color:fBolsa?"#7A9E7E":"#5A4030"}}>{fmt(BOLSA_P)} {fBolsa?"incluida":"no"}</div>

              </div>
            </div>
          </div>
          <div style={{width:130,background:"rgba(0,0,0,0.3)",borderLeft:"1px solid rgba(201,169,110,0.1)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"5px 8px",borderBottom:"1px solid rgba(201,169,110,0.1)",fontSize:8,letterSpacing:2,color:"#5A4020",textTransform:"uppercase",flexShrink:0}}>Pedido</div>
            <div style={{flex:1,overflowY:"auto"}}>
              {fCart.length===0&&!fBolsa?(
                <div style={{padding:"12px 8px",textAlign:"center",color:"#3A2810",fontSize:10}}>Vacio</div>
              ):(
                <div>
                  {fCart.map(function(item){

                      <div key={item.id} style={{padding:"5px 7px",borderBottom:"1px solid rgba(255,255,255,0.05)",fontSize:9}}>

                          <span style={{color:"#C4B49A",flex:1,lineHeight:1.3,paddingRight:3,fontSize:9}}>{item.desc}</span>
                          <button onClick={function(){setFCart(function(p){return p.filter(function(i){return i.id!==item.id;});});}} style={{background:"none",border:"none",color:"#4A2020",cursor:"pointer",fontSize:11,padding:0}}>x</button>
                        </div>
                        <div style={{color:"#C9A96E",marginTop:1}}>{item.qty}x{fmt(item.unitPrice)}</div>
                      </div>
                    );
                  })}
                  {fBolsa&&<div style={{padding:"5px 7px",fontSize:9}}><div style={{color:"#C4B49A"}}>🛍 Bolsa</div><div style={{color:"#C9A96E"}}>{fmt(BOLSA_P)}</div></div>}
                </div>
              )}
            </div>
            {fastTotal>0&&(
              <div style={{padding:"6px 8px",borderTop:"1px solid rgba(201,169,110,0.15)",flexShrink:0}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,fontWeight:"bold"}}>
                  <span style={{color:"#8A7060"}}>Total</span>
                  <span style={{color:"#C9A96E"}}>{fmt(fastTotal)}</span>
                </div>
              </div>
            )}
          </div>
        </div>
        <div style={{padding:"7px 10px",borderTop:"1px solid rgba(201,169,110,0.15)",background:"#0A0600",flexShrink:0}}>
          <div style={{display:"flex",gap:3,marginBottom:5}}>
            <button onClick={function(){setFPay("efectivo");}} style={{flex:1,padding:"6px 3px",fontSize:9,textTransform:"uppercase",textAlign:"center",border:"1px solid "+(fPay==="efectivo"?"#C9A96E":"rgba(201,169,110,0.12)"),background:fPay==="efectivo"?"rgba(201,169,110,0.15)":"transparent",color:fPay==="efectivo"?"#C9A96E":"#5A4030",cursor:"pointer",fontFamily:"inherit",borderRadius:5}}>💵 Ef.</button>
            <button onClick={function(){setFPay("tarjeta");}} style={{flex:1,padding:"6px 3px",fontSize:9,textTransform:"uppercase",textAlign:"center",border:"1px solid "+(fPay==="tarjeta"?"#C9A96E":"rgba(201,169,110,0.12)"),background:fPay==="tarjeta"?"rgba(201,169,110,0.15)":"transparent",color:fPay==="tarjeta"?"#C9A96E":"#5A4030",cursor:"pointer",fontFamily:"inherit",borderRadius:5}}>💳 Tarj.</button>
            <button onClick={function(){setFPay("bizum");}} style={{flex:1,padding:"6px 3px",fontSize:9,textTransform:"uppercase",textAlign:"center",border:"1px solid "+(fPay==="bizum"?"#C9A96E":"rgba(201,169,110,0.12)"),background:fPay==="bizum"?"rgba(201,169,110,0.15)":"transparent",color:fPay==="bizum"?"#C9A96E":"#5A4030",cursor:"pointer",fontFamily:"inherit",borderRadius:5}}>📱 Biz.</button>

            <button onClick={resetCart} style={{padding:"10px 11px",fontSize:10,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,color:"#6A5535",cursor:"pointer",fontFamily:"inherit"}}>🗑</button>
            <button onClick={checkoutFast} disabled={fastTotal===0} style={{flex:1,padding:"10px",fontSize:13,fontWeight:"bold",background:fastTotal===0?"rgba(201,169,110,0.15)":"linear-gradient(135deg,#C9A96E,#7A5530)",border:"none",borderRadius:8,color:"#1A0E04",cursor:fastTotal===0?"not-allowed":"pointer",fontFamily:"Georgia,serif",opacity:fastTotal===0?0.5:1}}>

  const renderTPV=function(){
    if (tpvMode==="fast") return renderFastPOS();
    if (tpvMode==="print"&&lastTicket) return (
      <div style={{padding:"10px",overflowY:"auto",flex:1}}>
        {fullscreen&&imgUrl&&(
          <div onClick={function(){setFullscreen(false);}} style={{position:"absolute",inset:0,zIndex:200,background:"#000",display:"flex",flexDirection:"column",alignItems:"center",overflowY:"auto",padding:"10px"}}>
            <div style={{padding:"8px",background:"rgba(201,169,110,0.15)",borderRadius:8,marginBottom:10,fontSize:11,color:"#C9A96E",textAlign:"center",width:"100%",maxWidth:400}}>Captura ahora - Toca para cerrar</div>
            <img src={imgUrl} alt="Ticket" style={{width:"100%",maxWidth:400,borderRadius:6}} />
          </div>
        )}
        <div style={{display:"flex",gap:5,marginBottom:8,flexWrap:"wrap"}}>
          <button onClick={function(){setTpvMode("input");setImgUrl(null);setFullscreen(false);}} style={{padding:"5px 9px",fontSize:9,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:5,color:"#C4B49A",cursor:"pointer",fontFamily:"inherit"}}>Nueva</button>
          <button onClick={generateImg} style={{padding:"5px 9px",fontSize:9,background:"rgba(201,169,110,0.08)",border:"1px solid rgba(201,169,110,0.2)",borderRadius:5,color:"#C9A96E",cursor:"pointer",fontFamily:"inherit"}}>🖼 Imagen</button>
          {imgUrl&&(
            <div style={{display:"flex",gap:4}}>
              <button onClick={copyClip} style={{padding:"5px 9px",fontSize:9,background:clipStatus==="ok"?"rgba(122,158,126,0.2)":"rgba(201,169,110,0.08)",border:"1px solid rgba(201,169,110,0.2)",borderRadius:5,color:clipStatus==="ok"?"#7A9E7E":"#C9A96E",cursor:"pointer",fontFamily:"inherit"}}>{clipStatus==="ok"?"Copiado":"Copiar"}</button>
              <button onClick={function(){setFullscreen(true);}} style={{padding:"5px 9px",fontSize:9,background:"linear-gradient(135deg,#C9A96E,#7A5530)",border:"none",borderRadius:5,color:"#1A0E04",cursor:"pointer",fontFamily:"inherit",fontWeight:"bold"}}>Pantalla</button>
            </div>
          )}
        </div>
        <div style={{background:"#fff",borderRadius:8,overflow:"hidden",marginBottom:8}}>
          <TicketPreview ticket={lastTicket.ticket} business={lastTicket.business} />
        </div>
        {imgUrl&&<img src={imgUrl} alt="Ticket" style={{width:"100%",borderRadius:7,display:"block",cursor:"pointer",marginBottom:8}} onClick={function(){setFullscreen(true);}} />}
        <div style={{padding:"7px 10px",background:"rgba(122,158,126,0.08)",border:"1px solid rgba(122,158,126,0.2)",borderRadius:7,fontSize:10,color:"#7A9E7E"}}>
          Ticket #{String(lastTicket.ticket.number||0).padStart(6,"0")} - {fmt(lastTicket.ticket.totals&&lastTicket.ticket.totals.total||0)} registrados
        </div>
      </div>
    );
    if (tpvMode==="preview"&&pendingSale) {
      var rawTotals=calcTotals(pendingSale.items);
      var tierDisc=tpvClient?getTier(tpvClient.totalSpent||0,tpvClient.tierOverride):null;
      var tierDiscAmt=tierDisc&&tierDisc.discount>0?parseFloat((rawTotals.total*tierDisc.discount/100).toFixed(2)):0;
      var couponBase=rawTotals.total;
      if (tpvCoupon&&tpvCoupon.active&&tpvCoupon.applyTo==="products"&&tpvCoupon.productNames&&tpvCoupon.productNames.length>0) {
        couponBase=pendingSale.items.reduce(function(s,item){
          var matches=tpvCoupon.productNames.some(function(n){return item.desc.toLowerCase().includes(n.toLowerCase());});
          return s+(matches?(item.qty||1)*item.unitPrice:0);
        },0);
      }
      var couponDiscAmt=tpvCoupon&&tpvCoupon.active?(tpvCoupon.type==="percent"?parseFloat((couponBase*tpvCoupon.value/100).toFixed(2)):Math.min(tpvCoupon.value,couponBase)):0;
      var totalDisc=Math.min(tierDiscAmt+couponDiscAmt,rawTotals.total);
      var finalAmt=parseFloat((rawTotals.total-totalDisc).toFixed(2));
      var clientMatches=tpvClientSearch.length>1?(state.clients||[]).filter(function(c){return c.name.toLowerCase().includes(tpvClientSearch.toLowerCase());}):[];
      return (
        <div style={{padding:"10px",overflowY:"auto",flex:1}}>
          <div style={{fontSize:10,color:"#C9A96E",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Vista previa</div>
          {pendingSale.items.map(function(item,i){
            return (
              <div key={i} style={{...ST.card,display:"flex",justifyContent:"space-between"}}>
                <div><div style={{fontSize:11,color:"#E8DCC8"}}>{item.desc}</div><div style={{fontSize:9,color:"#5A4030"}}>{IVA_LABELS[item.vatType]} - {fmt(item.unitPrice)}/ud</div></div>
                <div style={{textAlign:"right"}}><div style={{fontSize:11,color:"#C9A96E",fontWeight:"bold"}}>{fmt(item.qty*item.unitPrice)}</div><div style={{fontSize:9,color:"#5A4030"}}>{item.qty}x</div></div>
              </div>
            );
          })}
          <div style={{padding:"9px 11px",background:"rgba(201,169,110,0.08)",borderRadius:7,border:"1px solid rgba(201,169,110,0.2)",marginBottom:8,marginTop:4}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}><span style={{color:"#8A7060"}}>Subtotal</span><span>{fmt(rawTotals.total)}</span></div>
            {totalDisc>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#7A9E7E"}}><span>Descuento</span><span>-{fmt(totalDisc)}</span></div>}
            <div style={{display:"flex",justifyContent:"space-between",fontSize:15,fontWeight:"bold",marginTop:3}}><span>TOTAL</span><span style={{color:"#C9A96E"}}>{fmt(finalAmt)}</span></div>
            <div style={{fontSize:9,color:"#8A7060"}}>IVA incl.: {fmt(rawTotals.totalVat)}</div>
          </div>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:8,letterSpacing:1,color:"#6A5535",textTransform:"uppercase",marginBottom:3}}>Cliente (opcional)</div>
            {tpvClient?(
              <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 9px",background:"rgba(122,158,126,0.1)",border:"1px solid rgba(122,158,126,0.25)",borderRadius:7}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:"#E8DCC8"}}>{tpvClient.name}</div>
                  <div style={{fontSize:9,color:tierDisc?tierDisc.color:"#5A4030"}}>{tierDisc?tierDisc.label+" - "+tierDisc.discount+"% dto":""}</div>
                </div>
                <button onClick={function(){setTpvClient(null);setTpvClientSearch("");}} style={{background:"none",border:"none",color:"#6A4030",cursor:"pointer",fontSize:13}}>x</button>
              </div>
            ):(
              <div style={{position:"relative"}}>
                <input value={tpvClientSearch} onChange={function(e){setTpvClientSearch(e.target.value);}} placeholder="Buscar cliente..." style={{...ST.inp}} />
                {clientMatches.length>0&&(
                  <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#1A0E04",border:"1px solid rgba(201,169,110,0.2)",borderRadius:6,zIndex:50,maxHeight:120,overflowY:"auto"}}>
                    {clientMatches.slice(0,5).map(function(c){
                      var ct=getTier(c.totalSpent||0,c.tierOverride);
                      return (
                        <div key={c.id} onClick={function(){setTpvClient(c);setTpvClientSearch("");}} style={{padding:"7px 10px",cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,0.05)",display:"flex",justifyContent:"space-between"}}>
                          <span style={{fontSize:11,color:"#E8DCC8"}}>{c.name}</span>
                          <span style={{fontSize:9,color:ct.color}}>{ct.label}</span>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}
          </div>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:8,letterSpacing:1,color:"#6A5535",textTransform:"uppercase",marginBottom:3}}>Cupon (opcional)</div>
            {tpvCoupon?(
              <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 9px",background:"rgba(122,158,126,0.1)",border:"1px solid rgba(122,158,126,0.25)",borderRadius:7}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:"#C9A96E",fontWeight:"bold"}}>{tpvCoupon.code}</div>
                  <div style={{fontSize:9,color:"#7A9E7E"}}>{tpvCoupon.type==="percent"?"-"+tpvCoupon.value+"%":"-"+fmt(tpvCoupon.value)}{tpvCoupon.applyTo==="products"&&tpvCoupon.productNames&&tpvCoupon.productNames.length>0?" sobre: "+tpvCoupon.productNames.join(", "):" sobre ticket"}</div>
                </div>
                <button onClick={function(){setTpvCoupon(null);setTpvCouponInput("");}} style={{background:"none",border:"none",color:"#6A4030",cursor:"pointer",fontSize:13}}>x</button>
              </div>
            ):(
              <div style={{display:"flex",gap:5}}>
                <input value={tpvCouponInput} onChange={function(e){setTpvCouponInput(e.target.value.toUpperCase());}} placeholder="CODIGO" style={{...ST.inp,flex:1,letterSpacing:2}} />
                <button onClick={function(){
                  var c=(state.coupons||[]).find(function(c){return c.code===tpvCouponInput&&c.active;});
                  if (c) setTpvCoupon(c);
                  else alert("Cupon no valido o expirado.");
                }} style={{padding:"7px 12px",background:"rgba(201,169,110,0.15)",border:"1px solid rgba(201,169,110,0.3)",borderRadius:7,color:"#C9A96E",cursor:"pointer",fontFamily:"inherit",fontSize:10}}>Aplicar</button>
              </div>
            )}
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={function(){setPendingSale(null);setTpvMode("input");setTpvClient(null);setTpvCoupon(null);setTpvCouponInput("");setTpvClientSearch("");}} style={{flex:1,padding:"9px",fontSize:11,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:7,color:"#C4B49A",cursor:"pointer",fontFamily:"inherit"}}>Cancelar</button>
            <button onClick={confirmSale} style={{flex:2,padding:"9px",fontSize:13,fontWeight:"bold",background:"linear-gradient(135deg,#C9A96E,#7A5530)",border:"none",borderRadius:7,color:"#1A0E04",cursor:"pointer",fontFamily:"Georgia,serif"}}>Confirmar {fmt(finalAmt)}</button>
          </div>
        </div>
      );
    }
    return (
      <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
        <div style={{flex:1,padding:"10px",overflowY:"auto"}}>
          <button onClick={function(){setTpvMode("fast");}} style={{width:"100%",marginBottom:10,padding:"13px",background:"linear-gradient(135deg,rgba(201,169,110,0.12),rgba(201,169,110,0.06))",border:"1px solid rgba(201,169,110,0.3)",borderRadius:10,cursor:"pointer",fontFamily:"Georgia,serif",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{textAlign:"left"}}><div style={{fontSize:13,color:"#C9A96E",fontWeight:"bold",marginBottom:1}}>TPV Tactil</div><div style={{fontSize:9,color:"#6A5535"}}>Productos, tallas, anadidos</div></div>
            <span style={{fontSize:20,color:"#C9A96E"}}>{"->"}</span>
          </button>
          <div style={{...ST.card,padding:"10px"}}>
            <div style={ST.secT}>Resumen hoy</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
              <KPI label="Tickets" value={(state.tickets||[]).filter(function(t){return t.date&&t.date.slice(0,10)===new Date().toISOString().slice(0,10);}).length} />
              <KPI label="Ventas hoy" value={fmt(fin.todaySales)} color="#7A9E7E" />
            </div>
          </div>
        </div>
        <div style={{padding:"8px 10px",borderTop:"1px solid rgba(201,169,110,0.1)",background:"#0A0600",display:"flex",gap:6,alignItems:"flex-end",flexShrink:0}}>
          <textarea value={tpvInput} onChange={function(e){setTpvInput(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();parseTpv();}}} placeholder="Ej: 2 cortados y un croissant, tarjeta" style={{...ST.ta,fontSize:12}} rows={2} disabled={tpvLoading} />
          <button onClick={parseTpv} disabled={tpvLoading||!tpvInput.trim()} style={{width:40,height:40,background:tpvLoading||!tpvInput.trim()?"rgba(201,169,110,0.1)":"linear-gradient(135deg,#C9A96E,#7A5530)",border:"none",borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>
            {tpvLoading?"...":"->"}
          </button>
        </div>
      </div>
    );
  };

  const renderCaja=function(){
    const caja=state.caja||{abierta:false};
    const hoy=new Date().toISOString().slice(0,10);
    const tkHoy=(state.tickets||[]).filter(function(t){return t.date&&t.date.slice(0,10)===hoy;});
    const ef=tkHoy.filter(function(t){return t.paymentMethod==="efectivo";}).reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0);
    const ta=tkHoy.filter(function(t){return t.paymentMethod==="tarjeta";}).reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0);
    const bi=tkHoy.filter(function(t){return t.paymentMethod==="bizum";}).reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0);
    return (
      <div style={{flex:1,overflowY:"auto",padding:"10px"}}>
        <div style={{padding:"12px",background:caja.abierta?"rgba(122,158,126,0.1)":"rgba(255,100,60,0.08)",border:"1px solid "+(caja.abierta?"rgba(122,158,126,0.3)":"rgba(255,100,60,0.25)"),borderRadius:10,marginBottom:10,textAlign:"center"}}>
          <div style={{fontSize:20,marginBottom:3}}>{caja.abierta?"🟢":"🔴"}</div>
          <div style={{fontSize:13,fontWeight:"bold",color:caja.abierta?"#7A9E7E":"#FF8060"}}>{caja.abierta?"CAJA ABIERTA":"CAJA CERRADA"}</div>
          {caja.abierta&&<div style={{fontSize:9,color:"#6A5535",marginTop:2}}>Apertura: {fmtDT(caja.apertura)} - Fondo: {fmt(caja.fondoInicial)}</div>}
        </div>
        {!caja.abierta?(
          <div style={{padding:"12px",background:"rgba(255,255,255,0.025)",borderRadius:10,border:"1px solid rgba(255,255,255,0.07)"}}>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:8,letterSpacing:1,color:"#6A5535",textTransform:"uppercase",marginBottom:3}}>Fondo inicial (EUR)</div>
              <input style={{...ST.inp,fontSize:18,textAlign:"center"}} type="number" value={fondoInput} onChange={function(e){setFondoInput(e.target.value);}} />
</div>
            <button onClick={abrirCaja} style={{width:"100%",padding:"11px",background:"linear-gradient(135deg,#7A9E7E,#4A6E4E)",border:"none",borderRadius:7,color:"#fff",fontFamily:"Georgia,serif",fontSize:12,fontWeight:"bold",cursor:"pointer"}}>Abrir con {fmt(parseFloat(fondoInput)||0)}</button>
          </div>
        ):(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:10}}>
              <KPI label="Total ventas" value={fmt(ef+ta+bi)} color="#7A9E7E" />
              <KPI label="Tickets hoy" value={tkHoy.length} />
              <KPI label="Efectivo" value={fmt(ef)} color="#C9A96E" />
              <KPI label="Tarjeta+Bizum" value={fmt(ta+bi)} color="#8A9EAE" />
            </div>
            <button onClick={cerrarCaja} style={{width:"100%",padding:"11px",background:"linear-gradient(135deg,#B07D62,#7A4530)",border:"none",borderRadius:7,color:"#fff",fontFamily:"Georgia,serif",fontSize:12,fontWeight:"bold",cursor:"pointer"}}>Cerrar caja y registrar ventas</button>
          </div>
        )}
        {caja.cierre&&(
          <div style={{marginTop:10,padding:"10px",background:"rgba(255,255,255,0.02)",borderRadius:9,border:"1px solid rgba(255,255,255,0.05)"}}>
            <div style={ST.secT}>Ultimo cierre</div>

              <div style={{fontSize:10}}><span style={{color:"#6A5535"}}>Tarjeta: </span><span style={{color:"#C9A96E"}}>{fmt(caja.cierre.tarjeta)}</span></div>
              <div style={{fontSize:10}}><span style={{color:"#6A5535"}}>Bizum: </span><span style={{color:"#C9A96E"}}>{fmt(caja.cierre.bizum)}</span></div>
              <div style={{fontSize:10}}><span style={{color:"#6A5535"}}>Total: </span><span style={{color:"#C9A96E",fontWeight:"bold"}}>{fmt(caja.cierre.total)}</span></div>
            </div>

  const renderHistorial=function(){
    const now=Date.now();
    const periodMs={hoy:0,semana:7*24*60*60*1000,mes:30*24*60*60*1000,anio:365*24*60*60*1000,todo:RETENTION*365.25*24*60*60*1000};
    const desde=histFilter==="hoy"?new Date().toISOString().slice(0,10):new Date(now-(periodMs[histFilter==='ano'?'anio':histFilter]||0)).toISOString().slice(0,10);
    const filtered=[...(state.tickets||[])].filter(function(t){
      const d=t.date&&t.date.slice(0,10)||"";
      return histFilter==="hoy"?d===desde:d>=desde;
    }).filter(function(t){
      if(!histSearch.trim()) return true;
      const q=histSearch.toLowerCase();
      const num=String(t.number||"").padStart(6,"0");
      const summary=t.itemsSummary||(t.items||[]).map(function(i){return i.desc;}).join(" ");
      return num.includes(q)||summary.toLowerCase().includes(q);
    }).reverse();
    const totalV=filtered.reduce(function(s,t){return s+(t.total||t.totals&&t.totals.total||0);},0);
    const totalIVA=filtered.reduce(function(s,t){return s+(t.totalVat||t.totals&&t.totals.totalVat||0);},0);
    if (histView==="detail"&&histSel) {
      const t=histSel, isC=t._compressed;
      const total=t.total||t.totals&&t.totals.total||0;
      return (
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{display:"flex",gap:6,padding:"8px 10px",borderBottom:"1px solid rgba(201,169,110,0.1)",flexShrink:0,alignItems:"center"}}>
            <button onClick={function(){setHistView("list");}} style={{padding:"5px 10px",fontSize:10,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,color:"#C4B49A",cursor:"pointer",fontFamily:"inherit"}}>Volver</button>
            <span style={{fontSize:11,color:"#C9A96E",fontWeight:"bold"}}>Ticket #{String(t.number||0).padStart(6,"0")}</span>
            {!isC&&(
              <button onClick={function(){setLastTicket({ticket:t,business:state.business||INIT_BIZ});setTab("tpv");setTpvMode("print");setImgUrl(null);}} style={{marginLeft:"auto",padding:"5px 12px",fontSize:10,background:"linear-gradient(135deg,#C9A96E,#7A5530)",border:"none",borderRadius:6,color:"#1A0E04",cursor:"pointer",fontFamily:"inherit",fontWeight:"bold"}}>Reimprimir</button>
            )}
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"10px"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:8}}>
              <KPI label="Fecha" value={fmtDT(t.date)} color="#C4B49A" />
              <KPI label="Total" value={fmt(total)} color="#C9A96E" />
              <KPI label="IVA" value={fmt(t.totalVat||t.totals&&t.totals.totalVat||0)} color="#C4B49A" />
              <KPI label="Pago" value={(t.paymentMethod||"").toUpperCase()} />
            </div>
            {isC?(
              <div style={{padding:"10px",background:"rgba(255,255,255,0.02)",borderRadius:8,border:"1px solid rgba(255,255,255,0.06)",marginBottom:8}}>
                <div style={{fontSize:8,color:"#5A4030",textTransform:"uppercase",marginBottom:5}}>Artículos (archivo comprimido)</div>
                <div style={{fontSize:11,color:"#C4B49A",lineHeight:1.7}}>{t.itemsSummary||"-"}</div>
              </div>
            ):(
              <div style={{marginBottom:8}}>
                <div style={ST.secT}>Artículos</div>
                {(t.items||[]).map(function(item,idx){
                  return (
                    <div key={idx} style={{display:"flex",justifyContent:"space-between",padding:"6px 9px",marginBottom:3,background:"rgba(255,255,255,0.025)",borderRadius:6}}>
                      <div><div style={{fontSize:11,color:"#E8DCC8"}}>{item.qty>1?item.qty+"x ":""}{item.desc}</div><div style={{fontSize:9,color:"#5A4030"}}>{IVA_LABELS[item.vatType]} - {fmt(item.unitPrice)}/ud</div></div>
                      <div style={{fontSize:11,color:"#C9A96E",fontWeight:"bold"}}>{fmt(item.qty*item.unitPrice)}</div>
                    </div>
                  );
                })}
                <div style={{background:"#fff",borderRadius:8,overflow:"hidden",marginTop:8}}>
                  <TicketPreview ticket={t} business={state.business||INIT_BIZ} />
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }
    return (
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"8px 10px",borderBottom:"1px solid rgba(201,169,110,0.1)",flexShrink:0}}>
          <div style={{display:"flex",marginBottom:6,borderRadius:6,overflow:"hidden",border:"1px solid rgba(201,169,110,0.15)"}}>
            {["hoy","semana","mes","año","todo"].map(function(k){
              return <button key={k} onClick={function(){setHistFilter(k);}} style={{flex:1,padding:"6px 0",fontSize:9,letterSpacing:1,textTransform:"uppercase",textAlign:"center",cursor:"pointer",color:histFilter===k?"#130E07":"#5A4020",background:histFilter===k?"#C9A96E":"transparent",border:"none",fontFamily:"inherit"}}>{k==="hoy"?"Hoy":k==="semana"?"7d":k==="mes"?"30d":k==="año"?"1a":"Todo"}</button>;
            })}
          </div>
          <input value={histSearch} onChange={function(e){setHistSearch(e.target.value);}} placeholder="Buscar número, articulo o importe..." style={ST.inp} />
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5,padding:"7px 10px",flexShrink:0}}>
          <KPI label="Tickets" value={filtered.length} color="#C9A96E" />
          <KPI label="Ventas" value={fmt(totalV)} color="#7A9E7E" />
          <KPI label="IVA" value={fmt(totalIVA)} color="#C4B49A" />
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"0 10px 10px"}}>
          {filtered.length===0?(
            <div style={{textAlign:"center",color:"#3A2810",padding:"30px 0",fontSize:11}}>{histSearch?"Sin resultados.":"Sin tickets en este periodo."}</div>
          ):filtered.map(function(t){
            const total=t.total||t.totals&&t.totals.total||0;
            const isC=t._compressed;
            return (
              <div key={t.id} onClick={function(){setHistSel(t);setHistView("detail");}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",marginBottom:3,background:"rgba(255,255,255,0.025)",borderRadius:7,border:"1px solid rgba(255,255,255,0.05)",borderLeft:"3px solid "+(isC?"#5A4030":"#C9A96E"),cursor:"pointer"}}>
                <div style={{flex:1,minWidth:0}}>
                  <span style={{fontSize:11,color:isC?"#6A5535":"#C9A96E",fontWeight:"bold"}}>#{String(t.number||0).padStart(6,"0")}</span>
                  <div style={{fontSize:9,color:"#5A4030",marginTop:1}}>{fmtDT(t.date)}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0,marginLeft:8}}>
                  <div style={{fontSize:13,fontWeight:"bold",color:"#E8DCC8"}}>{fmt(total)}</div>
                </div>
              </div>
            );
          })}
          <div style={{marginTop:6,padding:"7px 9px",background:"rgba(122,158,126,0.05)",border:"1px solid rgba(122,158,126,0.12)",borderRadius:6,fontSize:9,color:"#5A6050",lineHeight:1.6}}>
            Retencion: {RETENTION} años (art. 66-70 LGT) - Total: {state.tickets&&state.tickets.length||0} tickets
          </div>
        </div>
      </div>
    );
  };

  const renderDash=function(){
    const hoy=new Date().toISOString().slice(0,10);
    const desde=dashPeriod==="semana"?new Date(Date.now()-7*24*60*60*1000).toISOString().slice(0,10):dashPeriod==="mes"?new Date(Date.now()-30*24*60*60*1000).toISOString().slice(0,10):"2000-01-01";
    const tks=(state.tickets||[]).filter(function(t){return t.date&&t.date.slice(0,10)>=desde;});
    const txns=state.transactions.filter(function(t){return t.date>=desde;});
    const ing=txns.filter(function(t){return t.type==="ingreso";}).reduce(function(s,t){return s+t.amount;},0);
    const gas=txns.filter(function(t){return t.type==="gasto";}).reduce(function(s,t){return s+t.amount;},0);
    const tkHoy=(state.tickets||[]).filter(function(t){return t.date&&t.date.slice(0,10)===hoy;});
    const ventaHoy=tkHoy.reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0);
    const maxV=Math.max.apply(null,S_VENTAS.concat(S_GASTOS).concat([1])), barH=70;
    const ef=tks.filter(function(t){return t.paymentMethod==="efectivo";}).reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0);
    const ta=tks.filter(function(t){return t.paymentMethod==="tarjeta";}).reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0);
    const bi=tks.filter(function(t){return t.paymentMethod==="bizum";}).reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0);
    const payTotal=ef+ta+bi||1;
    return (
      <div style={{flex:1,overflowY:"auto",padding:"10px"}}>
        <div style={{display:"flex",marginBottom:10,borderRadius:6,overflow:"hidden",border:"1px solid rgba(201,169,110,0.15)"}}>
          <button onClick={function(){setDashPeriod("semana");}} style={{flex:1,padding:"7px 0",fontSize:10,textTransform:"uppercase",textAlign:"center",cursor:"pointer",color:dashPeriod==="semana"?"#130E07":"#5A4020",background:dashPeriod==="semana"?"#C9A96E":"transparent",border:"none",fontFamily:"inherit"}}>7 dias</button>
          <button onClick={function(){setDashPeriod("mes");}} style={{flex:1,padding:"7px 0",fontSize:10,textTransform:"uppercase",textAlign:"center",cursor:"pointer",color:dashPeriod==="mes"?"#130E07":"#5A4020",background:dashPeriod==="mes"?"#C9A96E":"transparent",border:"none",fontFamily:"inherit"}}>30 dias</button>
          <button onClick={function(){setDashPeriod("total");}} style={{flex:1,padding:"7px 0",fontSize:10,textTransform:"uppercase",textAlign:"center",cursor:"pointer",color:dashPeriod==="total"?"#130E07":"#5A4020",background:dashPeriod==="total"?"#C9A96E":"transparent",border:"none",fontFamily:"inherit"}}>Total</button>
        </div>
        <div style={ST.secT}>Hoy</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5,marginBottom:10}}>
          <KPI label="Ventas" value={fmt(ventaHoy)} color="#7A9E7E" />
          <KPI label="Tickets" value={tkHoy.length} />
          <KPI label="Medio" value={fmt(tkHoy.length?ventaHoy/tkHoy.length:0)} />
        </div>
        <div style={ST.secT}>Período</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:10}}>
          <KPI label="Ingresos" value={fmt(ing)} color="#7A9E7E" />
          <KPI label="Gastos" value={fmt(gas)} color="#FF8060" />
          <KPI label="Resultado" value={fmt(ing-gas)} color={ing-gas>=0?"#C9A96E":"#FF8060"} alert={ing-gas<0} />
          <KPI label="Tickets" value={tks.length} />
        </div>
        <div style={{padding:"10px",background:"rgba(255,255,255,0.02)",borderRadius:9,border:"1px solid rgba(255,255,255,0.06)",marginBottom:10}}>
          <div style={{fontSize:8,letterSpacing:2,color:"#6A5535",textTransform:"uppercase",marginBottom:8}}>Evolución mensual (datos de ejemplo)</div>
          <div style={{display:"flex",alignItems:"flex-end",gap:3,height:barH+16}}>
            {MONTHS.map(function(m,i){
              return (
                <div key={m} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                  <div style={{display:"flex",gap:1,alignItems:"flex-end",height:barH}}>
                    <div style={{width:"45%",height:(S_VENTAS[i]/maxV*barH)+"px",background:"#7A9E7E",borderRadius:"2px 2px 0 0"}} />
                    <div style={{width:"45%",height:(S_GASTOS[i]/maxV*barH)+"px",background:"#FF8060",borderRadius:"2px 2px 0 0"}} />
                  </div>
                  <div style={{fontSize:7,color:"#5A4030"}}>{m}</div>
                </div>
              );
            })}
          </div>
        </div>
        <div style={{padding:"10px",background:"rgba(255,255,255,0.02)",borderRadius:9,border:"1px solid rgba(255,255,255,0.06)",marginBottom:10}}>
          <div style={{fontSize:8,letterSpacing:2,color:"#6A5535",textTransform:"uppercase",marginBottom:7}}>Métodos de pago</div>
          {tks.length===0?(
            <div style={{fontSize:10,color:"#3A2810",textAlign:"center"}}>Sin datos</div>
          ):(
            <div>
              {[["Efectivo",ef,"#C9A96E"],["Tarjeta",ta,"#7A9E7E"],["Bizum",bi,"#8A9EAE"]].map(function(item){
                return (
                  <div key={item[0]} style={{marginBottom:5}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:2}}>
                      <span style={{color:"#C4B49A"}}>{item[0]}</span>
                      <span style={{color:item[2]}}>{fmt(item[1])} ({((item[1]/payTotal)*100).toFixed(0)}%)</span>
                    </div>
                    <Bar pct={(item[1]/payTotal)*100} color={item[2]} height={4} />
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    );
  };

  const renderFacturas=function(){

    const previewTotals=validItems.length>0?calcTotals(validItems):null;

                  <div style={{fontSize:8,letterSpacing:1,color:"#6A5535",textTransform:"uppercase",marginBottom:3}}>NIF</div>
                  <input style={ST.inp} value={factForm.clienteNif} onChange={function(e){setFactForm(function(f){return {...f,clienteNif:e.target.value};});}} />
</div>
              </div>

  const resetGrano = function() {
    if (!window.confirm("Esto borrara TODOS los datos. Los datos del negocio se conservan. Continuar?")) return;
    const biz = state.business;
    const ns = Object.assign({}, INIT_STATE, {business:biz});
    setState(ns); save(ns);
  };

  const renderInformes=function(){
    const now=Date.now();
    const msMap={hoy:0,semana:7*864e5,mes:30*864e5,"3m":90*864e5,"1a":365*864e5,todo:9999*864e5};
    const hoyStr=new Date().toISOString().slice(0,10);
    const desdeTs=informePeriod==="hoy"?new Date(hoyStr).getTime():now-(msMap[informePeriod]||msMap["30d"]);
    const desdeStr=new Date(desdeTs).toISOString().slice(0,10);
    const tkFilt=(state.tickets||[]).filter(function(t){
      if (!t.date) return false;
      if (informePeriod==="hoy") return t.date.slice(0,10)===hoyStr;
      return t.date.slice(0,10)>=desdeStr;
    });
    const txFilt=(state.transactions||[]).filter(function(t){
      if (!t.date) return false;
      if (informePeriod==="hoy") return t.date===hoyStr;
      return t.date>=desdeStr;
    });
    // Revenue & costs
    const revenue=txFilt.filter(function(t){return t.type==="ingreso";}).reduce(function(s,t){return s+t.amount;},0);
    const costos=txFilt.filter(function(t){return t.type==="gasto";}).reduce(function(s,t){return s+t.amount;},0);
    const cogs=txFilt.filter(function(t){return t.category==="compra_insumos";}).reduce(function(s,t){return s+t.amount;},0);
    const opEx=costos-cogs;
    const grossProfit=revenue-cogs;
    const grossMargin=revenue>0?(grossProfit/revenue)*100:0;
    const ebitda=grossProfit-opEx;
    const ebitdaMargin=revenue>0?(ebitda/revenue)*100:0;
    const resultado=revenue-costos;
    const netMargin=revenue>0?(resultado/revenue)*100:0;
    const tkTotal=tkFilt.length;
    const tkMedio=tkTotal>0?tkFilt.reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0)/tkTotal:0;
    // Product breakdown
    const prodMap={};
    tkFilt.forEach(function(t){
      (t.items||[]).forEach(function(item){
        const k=item.desc||"?";
        if (!prodMap[k]) prodMap[k]={qty:0,revenue:0,vatType:item.vatType};
        prodMap[k].qty+=item.qty||1;
        prodMap[k].revenue+=((item.qty||1)*item.unitPrice);
      });
    });
    const prodList=Object.keys(prodMap).map(function(k){return {name:k,qty:prodMap[k].qty,revenue:prodMap[k].revenue};}).sort(function(a,b){return b.revenue-a.revenue;});
    const totalRevTk=prodList.reduce(function(s,p){return s+p.revenue;},0)||1;
    // Category breakdown
    const catMap={};
    txFilt.filter(function(t){return t.type==="ingreso";}).forEach(function(t){
      const c=t.category||"otros";
      catMap[c]=(catMap[c]||0)+t.amount;
    });
    // Costs breakdown
    const costCatMap={};
    txFilt.filter(function(t){return t.type==="gasto";}).forEach(function(t){
      const c=t.category||"otros";
      costCatMap[c]=(costCatMap[c]||0)+t.amount;
    });
    // CSV export
    const exportCSV=function(){
      var rows=["Informe GRANO - "+informePeriod+" - "+new Date().toLocaleDateString("es-ES")];
      rows.push("");
      rows.push("RESUMEN");
      rows.push("Ingresos;"+revenue.toFixed(2));
      rows.push("COGS;"+cogs.toFixed(2));
      rows.push("Margen bruto;"+grossProfit.toFixed(2)+";"+grossMargin.toFixed(1)+"%");
      rows.push("Gastos operativos;"+opEx.toFixed(2));
      rows.push("EBITDA;"+ebitda.toFixed(2)+";"+ebitdaMargin.toFixed(1)+"%");
      rows.push("Resultado;"+resultado.toFixed(2)+";"+netMargin.toFixed(1)+"%");
      rows.push("Tickets;"+tkTotal);
      rows.push("Ticket medio;"+tkMedio.toFixed(2));
      rows.push("");
      rows.push("VENTAS POR PRODUCTO");
      rows.push("Producto;Unidades;Ingresos;% total");
      prodList.forEach(function(p){
        rows.push(p.name+";"+p.qty+";"+p.revenue.toFixed(2)+";"+(p.revenue/totalRevTk*100).toFixed(1)+"%");
      });
      var csv=rows.join("\n");
      var blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
      var url=URL.createObjectURL(blob);
      var a=document.createElement("a"); a.href=url; a.download="grano_informe_"+new Date().toISOString().slice(0,10)+".csv";
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    };
    // PDF export
    const exportPDF=function(){
      var html="<!DOCTYPE html><html><head><meta charset='utf-8'><title>Informe GRANO</title>";
      html+="<style>body{font-family:Georgia,serif;max-width:700px;margin:40px auto;color:#1a0e04;font-size:13px}";
      html+="h1{color:#7A5530;border-bottom:2px solid #C9A96E;padding-bottom:8px}";
      html+="h2{color:#5A3520;font-size:14px;margin-top:24px;border-bottom:1px solid #e0c080;padding-bottom:4px}";
      html+="table{width:100%;border-collapse:collapse;margin:10px 0}";
      html+="th{background:#f5e8c8;text-align:left;padding:6px 10px;font-size:11px;text-transform:uppercase;letter-spacing:1px}";
      html+="td{padding:6px 10px;border-bottom:1px solid #ede0c0;font-size:12px}";
      html+=".num{text-align:right}.bold{font-weight:bold}.sub{color:#8A6030;font-size:11px}";
      html+="@media print{body{margin:20px}}</style></head><body>";
      html+="<h1>Informe GRANO</h1>";
      html+="<p class='sub'>Periodo: <strong>"+informePeriod+"</strong> &nbsp; Generado: "+new Date().toLocaleString("es-ES")+"</p>";
      html+="<h2>Resumen financiero</h2><table>";
      html+="<tr><th>Concepto</th><th class='num'>Importe</th><th class='num'>Margen</th></tr>";
      html+="<tr><td>Ingresos</td><td class='num bold'>"+fmt(revenue)+"</td><td></td></tr>";
      html+="<tr><td>COGS (coste ventas)</td><td class='num'>-"+fmt(cogs)+"</td><td></td></tr>";
      html+="<tr><td class='bold'>Margen bruto</td><td class='num bold'>"+fmt(grossProfit)+"</td><td class='num'>"+grossMargin.toFixed(1)+"%</td></tr>";
      html+="<tr><td>Gastos operativos</td><td class='num'>-"+fmt(opEx)+"</td><td></td></tr>";
      html+="<tr><td class='bold'>EBITDA</td><td class='num bold'>"+fmt(ebitda)+"</td><td class='num'>"+ebitdaMargin.toFixed(1)+"%</td></tr>";
      html+="<tr><td class='bold'>Resultado neto</td><td class='num bold'>"+fmt(resultado)+"</td><td class='num'>"+netMargin.toFixed(1)+"%</td></tr>";
      html+="<tr><td>Tickets emitidos</td><td class='num'>"+tkTotal+"</td><td class='num sub'>Medio: "+fmt(tkMedio)+"</td></tr>";
      html+="</table>";
      if (prodList.length > 0) {
        html+="<h2>Ventas por producto</h2><table>";
        html+="<tr><th>Producto</th><th class='num'>Uds</th><th class='num'>Ingresos</th><th class='num'>% total</th></tr>";
        prodList.forEach(function(p){
          html+="<tr><td>"+p.name+"</td><td class='num'>"+p.qty+"</td><td class='num'>"+fmt(p.revenue)+"</td><td class='num'>"+(p.revenue/totalRevTk*100).toFixed(1)+"%</td></tr>";
        });
        html+="</table>";
      }
      html+="</body></html>";
      var w=window.open("","_blank");
      w.document.write(html);
      w.document.close();
      w.print();
    };
    const PERIODS=[["hoy","Hoy"],["semana","7d"],["mes","30d"],["3m","3m"],["1a","1a"],["todo","Todo"]];
    const mColor=function(v){return v>=0?"#7A9E7E":"#FF8060";};

    // Category labels
    const ING_CATS={venta_take_away:"Take Away",venta_tienda:"Cafe en Grano",venta_cafe_grano:"Cafe en Grano",otros_ingresos:"Otros ingresos"};
    const GASTO_CATS={compra_insumos:"Compra mercancias",alquiler:"Alquiler",nominas:"Nominas",suministros:"Suministros",marketing:"Marketing",otros_gastos:"Otros gastos"};

    // Snapshot data
    const ingByCat={};
    txFilt.filter(function(t){return t.type==="ingreso";}).forEach(function(t){
      var c=ING_CATS[t.category]||t.category||"Otros";
      ingByCat[c]=(ingByCat[c]||0)+t.amount;
    });
    // Add ticket-level breakdown for take away
    var tkAwayTotal=tkFilt.reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0);
    // Product sub-breakdown inside Take Away
    var taCats={};
    tkFilt.forEach(function(t){
      (t.items||[]).forEach(function(item){
        var vatT=item.vatType||"reducido";
        var grp=vatT==="superreducido"?"Cafe en grano":"Cafes y bebidas";
        taCats[grp]=(taCats[grp]||0)+(item.qty||1)*item.unitPrice;
      });
    });
    var gastoByCat={};
    txFilt.filter(function(t){return t.type==="gasto";}).forEach(function(t){
      var c=GASTO_CATS[t.category]||t.category||"Otros gastos";
      gastoByCat[c]=(gastoByCat[c]||0)+t.amount;
    });
    var totalIng=Object.values(ingByCat).reduce(function(s,v){return s+v;},0)||1;
    var totalGasto=Object.values(gastoByCat).reduce(function(s,v){return s+v;},0)||1;

    var renderSnapshot=function(){
      var maxBar=Math.max(revenue,costos,1);
      var ingColors=["#7A9E7E","#5A8E6E","#3A7E5E","#9ABE9E"];
      var gastoColors=["#C9A96E","#B08050","#A07040","#D0B080","#906030","#806020"];
      return (
        <div>
          <div style={{padding:"12px",background:"rgba(255,255,255,0.02)",borderRadius:10,border:"1px solid rgba(255,255,255,0.06)",marginBottom:10}}>
            <div style={{fontSize:8,letterSpacing:2,color:"#6A5535",textTransform:"uppercase",marginBottom:10}}>Flujo del periodo</div>
            <div style={{display:"flex",gap:8,alignItems:"flex-end",marginBottom:8,height:60}}>
              <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                <div style={{width:"100%",height:(revenue/maxBar*56)+"px",background:"linear-gradient(180deg,#7A9E7E,#4A6E4E)",borderRadius:"4px 4px 0 0",minHeight:4}} />
                <div style={{fontSize:8,color:"#7A9E7E"}}>Ingresos</div>
                <div style={{fontSize:10,fontWeight:"bold",color:"#7A9E7E"}}>{fmt(revenue)}</div>
              </div>
              <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                <div style={{width:"100%",height:(costos/maxBar*56)+"px",background:"linear-gradient(180deg,#C9A96E,#7A5530)",borderRadius:"4px 4px 0 0",minHeight:4}} />
                <div style={{fontSize:8,color:"#C9A96E"}}>Gastos</div>
                <div style={{fontSize:10,fontWeight:"bold",color:"#C9A96E"}}>{fmt(costos)}</div>
              </div>
              <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                <div style={{width:"100%",height:(Math.abs(resultado)/maxBar*56)+"px",background:"linear-gradient(180deg,"+(resultado>=0?"#7A9E7E,#4A6E4E":"#FF8060,#C04030")+")",borderRadius:"4px 4px 0 0",minHeight:4}} />
                <div style={{fontSize:8,color:resultado>=0?"#7A9E7E":"#FF8060"}}>Resultado</div>
                <div style={{fontSize:10,fontWeight:"bold",color:resultado>=0?"#7A9E7E":"#FF8060"}}>{fmt(resultado)}</div>
              </div>
            </div>
            <div style={{display:"flex",gap:6}}>
              <div style={{flex:1,padding:"6px",background:"rgba(122,158,126,0.08)",borderRadius:6,textAlign:"center"}}>
                <div style={{fontSize:8,color:"#5A4030",marginBottom:1}}>Margen bruto</div>
                <div style={{fontSize:11,fontWeight:"bold",color:grossMargin>=40?"#7A9E7E":"#FF8060"}}>{grossMargin.toFixed(1)}%</div>
              </div>
              <div style={{flex:1,padding:"6px",background:"rgba(201,169,110,0.08)",borderRadius:6,textAlign:"center"}}>
                <div style={{fontSize:8,color:"#5A4030",marginBottom:1}}>EBITDA</div>
                <div style={{fontSize:11,fontWeight:"bold",color:mColor(ebitdaMargin)}}>{ebitdaMargin.toFixed(1)}%</div>
              </div>
              <div style={{flex:1,padding:"6px",background:"rgba(255,255,255,0.03)",borderRadius:6,textAlign:"center"}}>
                <div style={{fontSize:8,color:"#5A4030",marginBottom:1}}>Margen neto</div>
                <div style={{fontSize:11,fontWeight:"bold",color:mColor(netMargin)}}>{netMargin.toFixed(1)}%</div>
              </div>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
            <div style={{padding:"10px",background:"rgba(122,158,126,0.05)",borderRadius:9,border:"1px solid rgba(122,158,126,0.15)"}}>
              <div style={{fontSize:8,letterSpacing:2,color:"#4A7E5E",textTransform:"uppercase",marginBottom:8}}>Ingresos {fmt(revenue)}</div>
              {Object.keys(ingByCat).sort(function(a,b){return ingByCat[b]-ingByCat[a];}).map(function(cat,ci){
                var pct=ingByCat[cat]/totalIng*100;
                var isTA=cat==="Take Away"||cat==="venta_take_away";
                return (
                  <div key={cat} style={{marginBottom:6}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:9,marginBottom:2}}>
                      <span style={{color:"#C4B49A",flex:1}}>{cat}</span>
                      <span style={{color:ingColors[ci%ingColors.length],flexShrink:0}}>{pct.toFixed(0)}%</span>
                    </div>
                    <div style={{background:"rgba(255,255,255,0.05)",borderRadius:2,height:4,overflow:"hidden"}}>
                      <div style={{height:"100%",width:pct+"%",background:ingColors[ci%ingColors.length],borderRadius:2}} />
                    </div>
                    <div style={{fontSize:9,color:"#5A4030",marginTop:1}}>{fmt(ingByCat[cat])}</div>
                    {isTA&&Object.keys(taCats).length>0&&(
                      <div style={{marginLeft:8,marginTop:3}}>
                        {Object.keys(taCats).map(function(sub){
                          var subPct=taCats[sub]/(tkAwayTotal||1)*100;
                          return (

            </div>
            <div style={{padding:"10px",background:"rgba(201,169,110,0.04)",borderRadius:9,border:"1px solid rgba(201,169,110,0.12)"}}>
              <div style={{fontSize:8,letterSpacing:2,color:"#7A5530",textTransform:"uppercase",marginBottom:8}}>Gastos {fmt(costos)}</div>
              {Object.keys(gastoByCat).sort(function(a,b){return gastoByCat[b]-gastoByCat[a];}).map(function(cat,ci){

                      <span style={{color:gastoColors[ci%gastoColors.length],flexShrink:0}}>{pct.toFixed(0)}%</span>

                ["- COGS",-cogs,null,null],

                      <span style={{fontSize:11,fontWeight:isTotal?"bold":"normal",color:row[3]||(row[1]>=0?"#E8DCC8":"#FF8060")}}>{row[1]>=0?"+":""}{fmt(row[1])}</span>

  const renderCRM=function(){
    var clients=state.clients||[];
    var coupons=state.coupons||[];

    var saveClient=async function(c){

      var ns={...state,clients:updated}; setState(ns); await save(ns);
    };
    var deleteClient=async function(id){
      var ns={...state,clients:clients.filter(function(c){return c.id!==id;})}; setState(ns); await save(ns);
    };
    var saveCoupon=async function(c){
      var exists=coupons.findIndex(function(x){return x.id===c.id;});
      var updated=exists>=0?coupons.map(function(x){return x.id===c.id?c:x;}):[...coupons,c];
      var ns={...state,coupons:updated}; setState(ns); await save(ns);

    var deleteCoupon=async function(id){

            <span style={{padding:"3px 8px",borderRadius:10,background:"rgba("+( tier.id==="vip"?"122,158,126":tier.id==="regular"?"201,169,110":"138,158,174")+",0.2)",fontSize:9,color:tier.color,fontWeight:"bold"}}>{tier.label}</span>
            <button onClick={function(){setCrmView("editclient");setCrmForm({...c});}} style={{padding:"5px 10px",fontSize:10,background:"rgba(201,169,110,0.1)",border:"1px solid rgba(201,169,110,0.2)",borderRadius:6,color:"#C9A96E",cursor:"pointer",fontFamily:"inherit"}}>Editar</button>

              <KPI label="Visitas" value={c.visits||0} />
              <KPI label="Ultima visita" value={c.lastVisit||"-"} color="#C4B49A" />
            </div>
            {c.phone&&<div style={{fontSize:10,color:"#C4B49A",marginBottom:4}}>Tel: {c.phone}</div>}
            {c.email&&<div style={{fontSize:10,color:"#C4B49A",marginBottom:4}}>Email: {c.email}</div>}
            {c.category&&<div style={{fontSize:9,padding:"2px 8px",background:"rgba(201,169,110,0.1)",borderRadius:8,display:"inline-block",color:"#C9A96E",marginBottom:6}}>{c.category}</div>}
            {c.notes&&<div style={{fontSize:10,color:"#8A7060",fontStyle:"italic",marginBottom:8,padding:"7px",background:"rgba(255,255,255,0.02)",borderRadius:6,border:"1px solid rgba(255,255,255,0.05)"}}>{c.notes}</div>}
            <div style={{marginBottom:5}}>
              <div style={{fontSize:8,letterSpacing:1,color:"#6A5535",textTransform:"uppercase",marginBottom:3}}>Tier override</div>

                <button onClick={async function(){await saveClient({...c,tierOverride:null});setCrmSel({...c,tierOverride:null});}} style={{flex:1,padding:"5px",fontSize:9,border:"1px solid "+(c.tierOverride===null?"#C9A96E":"rgba(201,169,110,0.15)"),background:c.tierOverride===null?"rgba(201,169,110,0.15)":"transparent",color:c.tierOverride===null?"#C9A96E":"#5A4030",cursor:"pointer",borderRadius:5,fontFamily:"inherit"}}>Auto</button>
                {TIERS.map(function(t){
                  return <button key={t.id} onClick={async function(){await saveClient({...c,tierOverride:t.id});setCrmSel({...c,tierOverride:t.id});}} style={{flex:1,padding:"5px",fontSize:9,border:"1px solid "+(c.tierOverride===t.id?t.color:"rgba(201,169,110,0.15)"),background:c.tierOverride===t.id?"rgba(201,169,110,0.1)":"transparent",color:c.tierOverride===t.id?t.color:"#5A4030",cursor:"pointer",borderRadius:5,fontFamily:"inherit"}}>{t.label}</button>;

                      <div style={{fontSize:9,color:"#C4B49A"}}>#{String(t.number||0).padStart(6,"0")} <span style={{color:"#5A4030"}}>{t.date&&t.date.slice(0,10)}</span></div>

        </div>

    if (crmView==="editclient") {

                <div key={f[0]} style={{marginBottom:8}}>
                  <div style={{fontSize:8,letterSpacing:1,color:"#6A5535",textTransform:"uppercase",marginBottom:3}}>{f[1]}</div>
                  <input style={ST.inp} value={crmForm[f[0]]||""} onChange={function(e){var v=e.target.value; setCrmForm(function(prev){var n={}; Object.keys(prev).forEach(function(k){n[k]=prev[k];}); n[f[0]]=v; return n;});}} />

          </div>

              <div style={{fontSize:8,letterSpacing:1,color:"#6A5535",textTransform:"uppercase",marginBottom:3}}>Codigo *</div>
              <input style={{...ST.inp,letterSpacing:2,textTransform:"uppercase"}} value={couponForm.code||""} onChange={function(e){var v=e.target.value.toUpperCase().replace(/\s/g,""); setCouponForm(function(p){return {...p,code:v};});}} placeholder="VERANO10" />

            <div style={{marginBottom:8}}>
              <div style={{fontSize:8,letterSpacing:1,color:"#6A5535",textTransform:"uppercase",marginBottom:3}}>Descripcion</div>

            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>

                <div style={{fontSize:8,letterSpacing:1,color:"#6A5535",textTransform:"uppercase",marginBottom:3}}>Aplica sobre</div>

            {couponForm.applyTo==="products"&&(

                        <span style={{fontSize:10,color:"#C9A96E"}}>{n}</span>
                        <button onClick={function(){setCouponForm(function(p){return {...p,productNames:(p.productNames||[]).filter(function(x){return x!==n;})};});}} style={{background:"none",border:"none",color:"#8A5030",cursor:"pointer",fontSize:11,padding:0,lineHeight:1}}>x</button>
                      </div>
                    );

                </div>
                <div style={{display:"flex",gap:5}}>

                      var v=e.target.value.trim();
                      if (v) { setCouponForm(function(p){return {...p,productNames:[...(p.productNames||[]),v]};}); e.target.value=""; }

                  <button onClick={function(){

                <div style={{fontSize:9,color:"#5A4030",marginTop:4}}>El descuento aplica solo a los items del ticket que contengan este texto. Pulsa Enter o + para anadir.</div>
                <div style={{marginTop:6}}>
                  <div style={{fontSize:8,color:"#5A4030",marginBottom:4}}>Acceso rapido:</div>
                  <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                    {["Espresso especialidad","Cafe de la casa","Americano","Capucino","Capu-Thai","Red Espresso","Filtro Manual","Aeropress","Cookie","Bolsa cafe"].map(function(prod){
                      var already=(couponForm.productNames||[]).includes(prod);

                          if (!already) setCouponForm(function(p){return {...p,productNames:[...(p.productNames||[]),prod]};});

            </div>
            <button onClick={async function(){
              if (!couponForm.code) return alert("El codigo es obligatorio.");
              var dup=(state.coupons||[]).find(function(c){return c.code===couponForm.code&&c.id!==couponForm.id;});
              if (dup) return alert("Ya existe un cupon con ese codigo.");
              var cup={...couponForm, id:couponForm.id||gid("cup"), usedCount:couponForm.usedCount||0, active:true};
              await saveCoupon(cup); setCrmView("list"); setCouponForm({});
            }} style={{width:"100%",padding:"11px",background:"linear-gradient(135deg,#C9A96E,#7A5530)",border:"none",borderRadius:8,color:"#1A0E04",fontFamily:"Georgia,serif",fontSize:12,fontWeight:"bold",cursor:"pointer"}}>
              {isNewC?"Crear cupon":"Guardar cupon"}
