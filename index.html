<script>
// localStorage storage shim matching window.storage API
window.storage = {
  get: async function(key) {
    var v = localStorage.getItem(key);
    if (v == null) throw new Error("Key not found: " + key);
    return { key: key, value: v, shared: false };
  },
  set: async function(key, value) {
    localStorage.setItem(key, value);
    return { key: key, value: value, shared: false };
  },
  delete: async function(key) {
    localStorage.removeItem(key);
    return { key: key, deleted: true, shared: false };
  },
  list: async function(prefix) {
    var keys = [];
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (!prefix || k.startsWith(prefix)) keys.push(k);
    }
    return { keys: keys, prefix: prefix || null, shared: false };
  }
};
</script>

// --- HELPERS ---

var fmt = function(n) {
  return new Intl.NumberFormat("es-ES",{style:"currency",currency:"EUR"}).format(n||0);
};
var fmtD = function(iso) {
  if (!iso) return "-";
  return new Date(iso.slice(0,10)+"T12:00:00").toLocaleDateString("es-ES",{day:"2-digit",month:"short",year:"numeric"});
};
var fmtDT = function(iso) {
  if (!iso) return "-";
  return new Date(iso).toLocaleString("es-ES",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
};
var gid = function(p) {
  return (p||"x")+"_"+Date.now()+"_"+Math.random().toString(36).slice(2,5);
};

function getTier(spent, override) {
  if (override) return TIERS.find(function(t){ return t.id===override; })||TIERS[0];
  return TIERS.slice().reverse().find(function(t){ return spent>=t.minSpend; })||TIERS[0];
}

function calcTotals(items) {
  var byVat={}, tBase=0, tVat=0, total=0;
  (items||[]).forEach(function(item) {
    var pct=IVA[item.vatType]||10;
    var lt=(item.qty||1)*item.unitPrice;
    var base=lt/(1+pct/100);
    var vat=lt-base;
    if (!byVat[item.vatType]) byVat[item.vatType]={base:0,vat:0,pct:pct};
    byVat[item.vatType].base+=base;
    byVat[item.vatType].vat+=vat;
    tBase+=base; tVat+=vat; total+=lt;
  });
  return {byVat:byVat,totalBase:tBase,totalVat:tVat,total:total};
}

function calcLoan(l) {
  var r=l.interestRate/100/12, n=l.termMonths;
  var monthly=r>0?l.principal*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1):l.principal/n;
  var k=Math.min(n,Math.max(0,Math.floor((Date.now()-new Date(l.startDate).getTime())/(1000*60*60*24*30.44))));
  var rem=r>0?l.principal*(Math.pow(1+r,n)-Math.pow(1+r,k))/(Math.pow(1+r,n)-1):Math.max(0,l.principal-(l.principal/n)*k);
  return {monthly:monthly,remaining:Math.max(0,rem),monthsLeft:n-k};
}

function calcAsset(a) {
  var age=(Date.now()-new Date(a.purchaseDate).getTime())/(1000*60*60*24*365.25);
  return {bookValue:a.purchasePrice*Math.max(0,1-age/a.depreciationYears),annualDep:a.purchasePrice/a.depreciationYears};
}

function applyAction(state, action) {
  if (!action||!action.type) return state;
  var s=Object.assign({},state,{
    inventory:[].concat(state.inventory||[]),
    transactions:[].concat(state.transactions||[]),
    assets:[].concat(state.assets||[]),
    loans:[].concat(state.loans||[]),
    tickets:[].concat(state.tickets||[]),
    transfers:[].concat(state.transfers||[]),
    roasts:[].concat(state.roasts||[]),
  });
  if (action.type==="UPSERT_INVENTORY"&&action.items) {
    action.items.forEach(function(item) {
      var idx=s.inventory.findIndex(function(x){return x.id===item.id;});
      if (idx>=0) s.inventory[idx]=Object.assign({},s.inventory[idx],item);
      else s.inventory.push(Object.assign({almacen:"tostador"},item,{id:item.id||gid("inv")}));
    });
  }
  if (action.type==="ADD_TRANSACTION"&&action.transaction) {
    s.transactions.push(Object.assign({},action.transaction,{id:action.transaction.id||gid("txn")}));
  }
  if (action.type==="UPSERT_ASSET"&&action.asset) {
    var ai=s.assets.findIndex(function(x){return x.id===action.asset.id;});
    if (ai>=0) s.assets[ai]=Object.assign({},s.assets[ai],action.asset);
    else s.assets.push(Object.assign({},action.asset,{id:action.asset.id||gid("asset")}));
  }
  if (action.type==="UPSERT_LOAN"&&action.loan) {
    var li=s.loans.findIndex(function(x){return x.id===action.loan.id;});
    if (li>=0) s.loans[li]=Object.assign({},s.loans[li],action.loan);
    else s.loans.push(Object.assign({},action.loan,{id:action.loan.id||gid("loan"),payments:[]}));
  }
  if (action.type==="ADJUST_STOCK"&&action.adjustments) {
    action.adjustments.forEach(function(adj) {
      var idx=s.inventory.findIndex(function(x){return x.id===adj.id;});
      if (idx>=0) {
        var nq=Object.assign({},s.inventory[idx]);
        nq.quantity=Math.max(0,(nq.quantity||0)+adj.delta);
        s.inventory[idx]=nq;
      }
    });
  }
  if (action.type==="TRANSFER_STOCK"&&action.transfer) {
    var tr=action.transfer;
    var si=s.inventory.findIndex(function(x){return x.id===tr.itemId&&x.almacen===tr.from;});
    if (si>=0&&s.inventory[si].quantity>=tr.qty) {
      var src=s.inventory[si];
      var updSrc=Object.assign({},src,{quantity:src.quantity-tr.qty});
      s.inventory[si]=updSrc;
      var di=s.inventory.findIndex(function(x){return x.name===src.name&&x.almacen===tr.to;});
      if (di>=0) {
        var updDst=Object.assign({},s.inventory[di],{quantity:(s.inventory[di].quantity||0)+tr.qty});
        s.inventory[di]=updDst;
      } else {
        s.inventory.push(Object.assign({},src,{id:gid("inv"),almacen:tr.to,quantity:tr.qty}));
      }
      s.transfers.push({id:gid("tr"),date:new Date().toISOString(),from:tr.from,to:tr.to,itemId:tr.itemId,itemName:src.name,qty:tr.qty,unit:src.unit,reason:tr.reason||""});
    }
  }
  if (action.type==="REGISTER_ROAST"&&action.roast) {
    var ro=action.roast;
    var vi=s.inventory.findIndex(function(x){return x.id===ro.verdeId;});
    if (vi>=0&&s.inventory[vi].quantity>=ro.qtyVerde) {
      var verde=s.inventory[vi];
      s.inventory[vi]=Object.assign({},verde,{quantity:verde.quantity-ro.qtyVerde});
      var tId="tostado_"+ro.verdeId;
      var ti=s.inventory.findIndex(function(x){return x.id===tId;});
      var newCost=parseFloat(((verde.unitCost*ro.qtyVerde)/ro.qtyTostado).toFixed(2));
      if (ti>=0) {
        s.inventory[ti]=Object.assign({},s.inventory[ti],{quantity:(s.inventory[ti].quantity||0)+ro.qtyTostado});
      } else {
        s.inventory.push({id:tId,name:verde.name.replace(/verde/i,"tostado"),quantity:ro.qtyTostado,unit:verde.unit,unitCost:newCost,category:"cafe_tostado",almacen:"tostador",minStock:verde.minStock||1});
      }
      s.roasts.push({id:gid("r"),batchNumber:s.batchCounter||1,date:new Date().toISOString(),verdeId:ro.verdeId,verdeName:verde.name,qtyVerde:ro.qtyVerde,qtyTostado:ro.qtyTostado,merma:parseFloat(((ro.qtyVerde-ro.qtyTostado)/ro.qtyVerde*100).toFixed(1)),notes:ro.notes||"",params:ro.params||{}});
      s.batchCounter=(s.batchCounter||1)+1;
    }
  }
  return s;
}

function parseAction(text) {
  var m=text.match(/<GRANO_ACTION>([\s\S]*?)<\/GRANO_ACTION>/);
  var clean=text.replace(/<GRANO_ACTION>[\s\S]*?<\/GRANO_ACTION>/g,"").trim();
  var action=null;
  if (m) { try { action=JSON.parse(m[1].trim()); } catch(e) {} }
  return {clean:clean,action:action};
}

function parseSale(text) {
  var m=text.match(/<TPV_SALE>([\s\S]*?)<\/TPV_SALE>/);
  if (m) { try { return JSON.parse(m[1].trim()); } catch(e) {} }
  return null;
}

async function callAPI(system, messages) {
  var res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:system,messages:messages}),
  });
  var data=await res.json();
  if (data.error) throw new Error(data.error.message);
  return (data.content&&data.content[0]&&data.content[0].text)||"";
}

function MsgBubble(props) {
  var lines=(props.text||"").split("\n");
  return (
    <div>
      {lines.map(function(l,i) {
        if (l.startsWith("### ")) return <div key={i} style={{color:"#C9A96E",fontWeight:"bold",margin:"6px 0 2px",fontSize:11,letterSpacing:1,textTransform:"uppercase"}}>{l.slice(4)}</div>;
        if (l.startsWith("## ")) return <div key={i} style={{color:"#E8DCC8",fontWeight:"bold",margin:"8px 0 3px",fontSize:13}}>{l.slice(3)}</div>;
        if (l.match(/^[-*] /)) {
          var parts=l.slice(2).split(/(\*\*[^*]+\*\*)/g);
          return <div key={i} style={{display:"flex",gap:5,margin:"2px 0",fontSize:12,color:"#C4B49A"}}><span style={{color:"#C9A96E",flexShrink:0}}>{">"}</span><span>{parts.map(function(p,j){return p.startsWith("**")&&p.endsWith("**")?<strong key={j} style={{color:"#C9A96E"}}>{p.slice(2,-2)}</strong>:p;})}</span></div>;
        }
        if (l.startsWith("---")) return <hr key={i} style={{border:"none",borderTop:"1px solid rgba(201,169,110,0.2)",margin:"6px 0"}} />;
        if (!l.trim()) return <div key={i} style={{height:4}} />;
        var ps=l.split(/(\*\*[^*]+\*\*)/g);
        return <p key={i} style={{margin:"2px 0",fontSize:12,color:"#C4B49A",lineHeight:1.55}}>{ps.map(function(p,j){return p.startsWith("**")&&p.endsWith("**")?<strong key={j} style={{color:"#C9A96E"}}>{p.slice(2,-2)}</strong>:p;})}</p>;
      })}
    </div>
  );
}

  var calcDiscount = function(rawTotal, items) {
    var discAmt=0, discDesc="";
    if (tpvClient) {
      var tier=getTier(tpvClient.totalSpent||0,tpvClient.tierOverride);
      if (tier.discount>0) {
        discAmt+=parseFloat((rawTotal*tier.discount/100).toFixed(2));
        discDesc+=tier.label+" -"+tier.discount+"% ";
      }
    }
    if (tpvCoupon&&tpvCoupon.active) {
      var coup=tpvCoupon;
      var base=rawTotal;
      if (coup.applyTo==="products"&&coup.productNames&&coup.productNames.length) {
        base=(items||[]).reduce(function(s,item){
          var match=coup.productNames.some(function(n){return item.desc.toLowerCase().includes(n.toLowerCase());});
          return s+(match?(item.qty||1)*item.unitPrice:0);
        },0);
      }
      var cDisc=coup.type==="percent"?parseFloat((base*coup.value/100).toFixed(2)):Math.min(coup.value,base);
      discAmt+=cDisc;
      discDesc+=coup.code+" "+(coup.type==="percent"?"-"+coup.value+"%":"-"+fmt(cDisc));
    }
    return {discAmt:Math.min(discAmt,rawTotal),discDesc:discDesc.trim()};
  };

  var confirmSale = async function() {
    if (!pendingSale) return;
    var rawTotals=calcTotals(pendingSale.items);
    var disc=calcDiscount(rawTotals.total,pendingSale.items);
    var finalTotal=parseFloat((rawTotals.total-disc.discAmt).toFixed(2));
    var totals=Object.assign({},rawTotals,{total:finalTotal,discount:disc.discAmt,discountDesc:disc.discDesc});
    var num=state.ticketCounter||1;
    var ticket={id:gid("tkt"),number:num,date:new Date().toISOString(),items:pendingSale.items,paymentMethod:pendingSale.paymentMethod||"efectivo",totals:totals,clientId:tpvClient?tpvClient.id:null,clientName:tpvClient?tpvClient.name:"",couponCode:tpvCoupon?tpvCoupon.code:""};
    var txn={id:gid("txn"),date:new Date().toISOString().slice(0,10),type:"ingreso",category:"venta_take_away",amount:finalTotal,description:"Ticket #"+String(num).padStart(6,"0")+(tpvClient?" - "+tpvClient.name:"")};
    var ns=Object.assign({},state,{tickets:(state.tickets||[]).concat([ticket]),ticketCounter:num+1,transactions:state.transactions.concat([txn])});
    // Update client spend
    if (tpvClient) {
      ns=Object.assign({},ns,{clients:(ns.clients||[]).map(function(c){
        if (c.id!==tpvClient.id) return c;
        return Object.assign({},c,{totalSpent:(c.totalSpent||0)+finalTotal,visits:(c.visits||0)+1,lastVisit:new Date().toISOString().slice(0,10)});
      })});
    }
    // Update coupon usage
    if (tpvCoupon) {
      ns=Object.assign({},ns,{coupons:(ns.coupons||[]).map(function(c){
        if (c.id!==tpvCoupon.id) return c;
        var nc=(c.usedCount||0)+1;
        return Object.assign({},c,{usedCount:nc,active:c.maxUses?nc<c.maxUses:true});
      })});
    }
    // Deduct inventory via recetas
    var recetas=ns.recetas||{};
    var inv=[].concat(ns.inventory||[]);
    pendingSale.items.forEach(function(item) {
      var receta=recetas[item.id]||recetas[item.desc];
      if (!receta||!receta.ingredientes) return;
      receta.ingredientes.forEach(function(ing) {
        var qty=ing.cantidad*(item.qty||1);
        var idx=inv.findIndex(function(x){return x.id===ing.itemId;});
        if (idx>=0) {
          var updated=Object.assign({},inv[idx],{quantity:Math.max(0,parseFloat(((inv[idx].quantity||0)-qty).toFixed(4)))});
          inv[idx]=updated;
        }
      });
    });
    ns=Object.assign({},ns,{inventory:inv});
    setState(ns); await save(ns);
    setLastTicket({ticket:ticket,business:ns.business});
    setPendingSale(null); setTpvInput(""); resetCart(); setImgUrl(null);
    setTpvClient(null); setTpvCoupon(null); setTpvCouponInput(""); setTpvClientSearch("");
    setTpvMode("print");
  };

  var doCierreJornada = async function() {

    var tickets=(state.tickets||[]).filter(function(t){return t.date&&t.date.slice(0,10)===hoy;});
    var consumoTeorico={};
    tickets.forEach(function(t){
      (t.items||[]).forEach(function(item){
        var receta=recetas[item.id]||recetas[item.desc];
        if (!receta||!receta.ingredientes) return;
        receta.ingredientes.forEach(function(ing){
          var k=ing.itemId;
          consumoTeorico[k]=(consumoTeorico[k]||0)+ing.cantidad*(item.qty||1);
        });
      });
    });
    var mermasCalc={};
    Object.keys(jornadaPesajes).forEach(function(itemId){
      var pesaje=parseFloat(jornadaPesajes[itemId]);
      if (isNaN(pesaje)) return;
      var item=(state.inventory||[]).find(function(i){return i.id===itemId;});
      if (!item) return;
      var teo=consumoTeorico[itemId]||0;
      mermasCalc[itemId]={nombre:item.name,consumoTeorico:parseFloat(teo.toFixed(4)),consumoReal:parseFloat(((item.quantity||0)-pesaje).toFixed(4)),merma:parseFloat(Math.max(0,((item.quantity||0)-pesaje)-teo).toFixed(4))};
    });
    var inv=(state.inventory||[]).map(function(i){
      var p=jornadaPesajes[i.id];
      if (p===undefined||p==="") return i;
      return Object.assign({},i,{quantity:Math.max(0,parseFloat(p))});
    });
    var jornada={id:gid("jor"),fecha:hoy,tickets:tickets.length,consumoTeorico:consumoTeorico,mermas:mermasCalc,pesajes:Object.assign({},jornadaPesajes)};

  // CALCULATIONS
  var fin = useMemo(function() {
    var txns=state.transactions||[], assets=state.assets||[], loans=state.loans||[], inv=state.inventory||[];
    var ingresos=txns.filter(function(t){return t.type==="ingreso";}).reduce(function(s,t){return s+t.amount;},0);
    var gastos=txns.filter(function(t){return t.type==="gasto";}).reduce(function(s,t){return s+t.amount;},0);
    var cogs=txns.filter(function(t){return t.category==="compra_insumos";}).reduce(function(s,t){return s+t.amount;},0);
    var threeM=Date.now()-90*864e5;
    var rI=txns.filter(function(t){return t.type==="ingreso"&&new Date(t.date).getTime()>threeM;}).reduce(function(s,t){return s+t.amount;},0);
    var rG=txns.filter(function(t){return t.type==="gasto"&&new Date(t.date).getTime()>threeM;}).reduce(function(s,t){return s+t.amount;},0);
    var monthlyRev=rI/3, burnRate=rG/3;
    var assetData=assets.map(function(a){return Object.assign({},a,calcAsset(a));});
    var totalBook=assetData.reduce(function(s,a){return s+a.bookValue;},0);
    var annualDep=assetData.reduce(function(s,a){return s+a.annualDep;},0);
    var loanData=loans.map(function(l){return Object.assign({},l,calcLoan(l));});
    var totalDebt=loanData.reduce(function(s,l){return s+l.remaining;},0);
    var stockValue=inv.reduce(function(s,i){return s+(i.quantity||0)*(i.unitCost||0);},0);
    var netAssets=stockValue+totalBook-totalDebt;
    var grossProfit=ingresos-cogs;
    var netIncome=ingresos-gastos;
    var opEx=gastos-cogs;
    var grossMargin=ingresos>0?(grossProfit/ingresos)*100:0;
    var ebitdaM=monthlyRev-burnRate+annualDep/12;
    var ebitdaA=ebitdaM*12;
    var ebitdaMargin=monthlyRev>0?(ebitdaM/monthlyRev)*100:0;
    var annualRev=monthlyRev*12;
    var vals=[netIncome>0?netIncome*2.5:0,Math.max(0,netAssets),Math.max(0,annualRev*0.8),ebitdaA>0?ebitdaA*4:0].filter(function(v){return v>0;});
    var valuation=vals.length?vals.reduce(function(s,v){return s+v;},0)/vals.length:0;
    var todaySales=(state.tickets||[]).filter(function(t){return t.date&&t.date.slice(0,10)===new Date().toISOString().slice(0,10);}).reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0);
    return {ingresos:ingresos,gastos:gastos,netIncome:netIncome,grossProfit:grossProfit,grossMargin:grossMargin,cogs:cogs,opEx:opEx,ebitdaM:ebitdaM,ebitdaA:ebitdaA,ebitdaMargin:ebitdaMargin,monthlyRev:monthlyRev,burnRate:burnRate,annualRev:annualRev,assetData:assetData,totalBook:totalBook,annualDep:annualDep,loanData:loanData,totalDebt:totalDebt,netAssets:netAssets,stockValue:stockValue,valuation:valuation,todaySales:todaySales};
  }, [state]);

  var stockByAlm = useMemo(function(){
    var out={tostador:[],tienda:[],takeaway:[]};
    (state.inventory||[]).forEach(function(i){var a=i.almacen||"tostador"; if(out[a]) out[a].push(i);});

  var stockValByAlm = useMemo(function(){
    var out={tostador:0,tienda:0,takeaway:0};
    (state.inventory||[]).forEach(function(i){var a=i.almacen||"tostador"; if(out[a]!==undefined) out[a]+=(i.quantity||0)*(i.unitCost||0);});
    return out;
  },[state.inventory]);

  var calcValoracion = useMemo(function(){
    var roasts=state.roasts||[];
    var tickets=state.tickets||[];
    var mermaReal=roasts.length>0?roasts.reduce(function(s,r){return s+r.merma;},0)/roasts.length:18;
    var lossTotal=(valLoss.molinillo+valLoss.accidental+valLoss.batch)/100;
    var verdes=(state.inventory||[]).filter(function(i){return i.category==="cafe_verde";});
    var cafes=verdes.map(function(verde){
      var cv=verde.unitCost||0;
      var rendTueste=1-mermaReal/100;
      var costeTostBruto=cv/rendTueste;
      var costeTostReal=costeTostBruto/(1-lossTotal);
      var grServ=valGrServ;
      var costeServ=(costeTostReal*grServ)/1000;
      var canales={
        tienda:    {nombre:"Tienda",       icon:"\uD83C\uDFEA",price:valPrecios.tienda,  coste:costeTostReal,margenBruto:valPrecios.tienda-costeTostReal,   margenKgEq:valPrecios.tienda-costeTostReal,   unidad:"EUR/kg"},
        takeaway:  {nombre:"Take Away",    icon:"\u2615",price:valPrecios.takeaway,coste:costeServ,    margenBruto:valPrecios.takeaway-costeServ,      margenKgEq:(valPrecios.takeaway-costeServ)*(1000/grServ),unidad:"EUR/srv ("+grServ+"g)"},
        b2b:       {nombre:"B2B",          icon:"\uD83C\uDFE2",price:valPrecios.b2b,    coste:costeTostReal,margenBruto:valPrecios.b2b-costeTostReal,       margenKgEq:valPrecios.b2b-costeTostReal,      unidad:"EUR/kg"},
        online:    {nombre:"Online/Vault", icon:"\uD83C\uDF10",price:valPrecios.online,  coste:costeTostReal,margenBruto:valPrecios.online-costeTostReal,    margenKgEq:valPrecios.online-costeTostReal,   unidad:"EUR/kg"},
        verde_dir: {nombre:"Verde Directo",icon:"\uD83C\uDF31",price:cv*1.35,           coste:cv,           margenBruto:cv*0.35,                            margenKgEq:cv*0.35,                           unidad:"EUR/kg (est.)"},
      };
      var canalesArr=Object.keys(canales).map(function(k){
        var c=canales[k];
        var margen=c.price>0?((c.margenBruto/c.price)*100):0;
        return Object.assign({id:k},c,{margen:margen});
      }).sort(function(a,b){return b.margenKgEq-a.margenKgEq;});
      var kgTostado=(state.inventory||[]).filter(function(i){return i.id==="tostado_"+verde.id;}).reduce(function(s,i){return s+(i.quantity||0);},0);
      var obj=valObjeto;
      var rec={};
      if (kgTostado>0) {
        var total=kgTostado;
        if (obj==="margen_unitario"||obj==="margen_total") {
          var best=canalesArr.filter(function(c){return c.id!=="verde_dir";})[0];
          if (best) rec[best.id]=total;
        } else if (obj==="rotacion") {
          rec.takeaway=parseFloat((total*0.6).toFixed(2));
          rec.tienda=parseFloat((total*0.3).toFixed(2));
          rec.online=parseFloat((total*0.1).toFixed(2));
        } else if (obj==="mermas") {
          rec.takeaway=parseFloat((total*0.7).toFixed(2));
          rec.tienda=parseFloat((total*0.2).toFixed(2));
          rec.b2b=parseFloat((total*0.1).toFixed(2));
        } else if (obj==="takeaway") {
          rec.takeaway=total;
        } else {
          rec.tienda=parseFloat((total*0.35).toFixed(2));
          rec.takeaway=parseFloat((total*0.40).toFixed(2));
          rec.b2b=parseFloat((total*0.15).toFixed(2));
          rec.online=parseFloat((total*0.10).toFixed(2));
        }
      }
      return {id:verde.id,nombre:verde.name,kgVerde:verde.quantity||0,kgTostado:kgTostado,costeVerde:cv,costeTostReal:costeTostReal,lossTotal:lossTotal*100,canales:canales,canalesArr:canalesArr,recomendacion:kgTostado>0?rec:null,valorStockVerde:(verde.quantity||0)*cv,valorStockTostado:kgTostado*costeTostReal};
    });
    var totalV=cafes.reduce(function(s,c){return s+c.valorStockVerde;},0);
    var totalT=cafes.reduce(function(s,c){return s+c.valorStockTostado;},0);
    return {cafes:cafes,mermaReal:mermaReal,totalStockVerde:totalV,totalStockTostado:totalT};
  },[state.inventory,state.roasts,state.tickets,valObjeto,valPrecios,valGrServ,valLoss]);

  var renderCaja = function() {

    var tkH=(state.tickets||[]).filter(function(t){return t.date&&t.date.slice(0,10)===hoy;});
    var ef=tkH.filter(function(t){return t.paymentMethod==="efectivo";}).reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0);
    var ta=tkH.filter(function(t){return t.paymentMethod==="tarjeta";}).reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0);
    var bi=tkH.filter(function(t){return t.paymentMethod==="bizum";}).reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0);
    return (
      <div style={{flex:1,overflowY:"auto",padding:"10px",position:"relative"}}>
        {jornadaModal&&(
          <div style={{position:"fixed",inset:0,zIndex:300,background:"rgba(0,0,0,0.9)",display:"flex",alignItems:"flex-end"}}>

              <div style={{fontSize:9,color:"#5A4030",marginBottom:10}}>Introduce el peso real sobrante de cada articulo para ajustar el inventario y calcular mermas reales.</div>
              {(state.inventory||[]).filter(function(i){return i.quantity>0;}).map(function(item){
                return (
                  <div key={item.id} style={Object.assign({},C.card,{padding:"7px 10px",marginBottom:4})}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:11,color:"#E8DCC8"}}>{item.name}</div>
                        <div style={{fontSize:9,color:"#5A4030"}}>{ALMACEN[item.almacen||"tostador"].icon} Actual: {item.quantity} {item.unit}</div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:5}}>
                        <input type="number" min="0" step="0.001" placeholder="resta" value={jornadaPesajes[item.id]||""} onChange={function(e){var iid=item.id; var v=e.target.value; setJornadaPesajes(function(p){var n=Object.assign({},p); n[iid]=v; return n;});}} style={{width:70,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(106,176,160,0.3)",borderRadius:5,padding:"5px 7px",color:"#6AB0A0",fontSize:11,fontFamily:"Georgia,serif",outline:"none",textAlign:"center"}} />
                        <span style={{fontSize:9,color:"#5A4030"}}>{item.unit}</span>
                      </div>
                    </div>
                    {jornadaPesajes[item.id]!==undefined&&jornadaPesajes[item.id]!==""&&(
                      <div style={{fontSize:8,color:parseFloat(jornadaPesajes[item.id])<(item.quantity||0)?"#FF8060":"#7A9E7E",marginTop:2}}>
                        Dif: {((item.quantity||0)-parseFloat(jornadaPesajes[item.id]||0)).toFixed(3)} {item.unit}
                      </div>
                    )}
                  </div>
                );
              })}
              <div style={{display:"flex",gap:6,marginTop:12}}>
                <button onClick={function(){setJornadaModal(false);setJornadaPesajes({});}} style={{flex:1,padding:"10px",fontSize:11,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#C4B49A",cursor:"pointer",fontFamily:"inherit"}}>Cancelar</button>
                <button onClick={function(){doCierreJornada(); cerrarCaja();}} style={{flex:2,padding:"10px",fontSize:11,background:"linear-gradient(135deg,#6AB0A0,#3A7060)",border:"none",borderRadius:8,color:"#fff",cursor:"pointer",fontFamily:"Georgia,serif",fontWeight:"bold"}}>Aplicar y cerrar caja</button>
              </div>

        {!caja.abierta?(
          <div style={Object.assign({},C.card,{padding:"12px"})}>
            {Fl("Fondo inicial (EUR)",<input style={Object.assign({},C.inp,{fontSize:18,textAlign:"center"})} type="number" value={fondoInput} onChange={function(e){setFondoInput(e.target.value);}} />)}
            <button onClick={abrirCaja} style={{width:"100%",padding:"11px",background:"linear-gradient(135deg,#7A9E7E,#4A6E4E)",border:"none",borderRadius:7,color:"#fff",fontFamily:"Georgia,serif",fontSize:12,fontWeight:"bold",cursor:"pointer"}}>Abrir caja - {fmt(parseFloat(fondoInput)||0)}</button>

            </div>
            <button onClick={function(){setJornadaModal(true);}} style={{width:"100%",padding:"11px",background:"linear-gradient(135deg,#B07D62,#7A4530)",border:"none",borderRadius:7,color:"#fff",fontFamily:"Georgia,serif",fontSize:12,fontWeight:"bold",cursor:"pointer",marginBottom:6}}>Cerrar caja y guardar backup</button>
            <button onClick={function(){setJornadaModal(true);}} style={{width:"100%",padding:"9px",background:"rgba(106,176,160,0.1)",border:"1px solid rgba(106,176,160,0.3)",borderRadius:7,color:"#6AB0A0",fontFamily:"inherit",fontSize:11,cursor:"pointer"}}>Reajuste de jornada con pesaje</button>

              <KPI label="Efectivo" value={fmt(caja.cierre.efectivo)} color={C.gold} />
              <KPI label="Tarjeta" value={fmt(caja.cierre.tarjeta)} color={C.blue} />
              <KPI label="Bizum" value={fmt(caja.cierre.bizum)} color={C.blue} />
              <KPI label="Total" value={fmt(caja.cierre.total)} color={C.green} />
            </div>
          </div>
        )}
      </div>
    );
  };

  // RENDER: HISTORIAL
  var renderHistorial = function() {
    var hoyStr=new Date().toISOString().slice(0,10);
    var pMs={hoy:0,semana:7*864e5,mes:30*864e5,anio:365*864e5,todo:9999*864e5};
    var desdeStr=histPeriod==="hoy"?hoyStr:new Date(Date.now()-(pMs[histPeriod]||pMs.mes)).toISOString().slice(0,10);
    var filtered=[].concat(state.tickets||[]).filter(function(t){
      if (!t.date) return false;
      if (histPeriod==="hoy") return t.date.slice(0,10)===hoyStr;
      return t.date.slice(0,10)>=desdeStr;
    }).filter(function(t){
      if (!histSearch.trim()) return true;
      var q=histSearch.toLowerCase();
      return String(t.number||"").padStart(6,"0").includes(q)||(t.items||[]).some(function(i){return i.desc.toLowerCase().includes(q);});
    }).reverse();
    var totalV=filtered.reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0);

    if (histSel) {
      var t=histSel;
      var isAnulado=t.anulado||false;
      return (
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{display:"flex",gap:6,padding:"8px 10px",borderBottom:"1px solid rgba(201,169,110,0.1)",flexShrink:0,alignItems:"center"}}>
            <button onClick={function(){setHistSel(null);}} style={{padding:"5px 10px",fontSize:10,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,color:"#C4B49A",cursor:"pointer",fontFamily:"inherit"}}>Volver</button>
            <span style={{fontSize:11,color:isAnulado?"#FF8060":"#C9A96E",fontWeight:"bold",flex:1}}>Ticket #{String(t.number||0).padStart(6,"0")}{isAnulado?" [ANULADO]":""}</span>
            {!isAnulado&&<button onClick={function(){setLastTicket({ticket:t,business:state.business||INIT_BIZ});setTab("tpv");setTpvMode("print");setImgUrl(null);}} style={{padding:"5px 12px",fontSize:10,background:"linear-gradient(135deg,#C9A96E,#7A5530)",border:"none",borderRadius:6,color:"#1A0E04",cursor:"pointer",fontFamily:"inherit",fontWeight:"bold"}}>Reimprimir</button>}
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"10px"}}>
            {isAnulado&&<div style={{padding:"8px 11px",background:"rgba(255,100,60,0.08)",border:"1px solid rgba(255,100,60,0.25)",borderRadius:7,marginBottom:10,fontSize:10,color:"#FF8060"}}>Ticket anulado el {fmtDT(t.anuladoAt||"")} \u2014 devolucion registrada en transacciones.</div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:8}}>
              <KPI label="Fecha" value={fmtDT(t.date)} color="#C4B49A" />
              <KPI label="Total" value={fmt(t.totals&&t.totals.total||0)} color={isAnulado?"#FF8060":C.gold} />
              <KPI label="IVA" value={fmt(t.totals&&t.totals.totalVat||0)} color="#C4B49A" />
              <KPI label="Pago" value={(t.paymentMethod||"").toUpperCase()} />
            </div>
            {t.clientName&&<div style={{fontSize:10,color:"#C4B49A",marginBottom:4}}>Cliente: {t.clientName}</div>}
            {t.totals&&t.totals.discount>0&&<div style={{fontSize:10,color:"#7A9E7E",marginBottom:6}}>Descuento: -{fmt(t.totals.discount)}</div>}

          <div style={{display:"flex",marginBottom:6,borderRadius:6,overflow:"hidden",border:"1px solid rgba(201,169,110,0.15)"}}>
            {[["hoy","Hoy"],["semana","7d"],["mes","30d"],["anio","1a"],["todo","Todo"]].map(function(p){
              return <button key={p[0]} onClick={function(){setHistPeriod(p[0]);}} style={{flex:1,padding:"6px 0",fontSize:9,textTransform:"uppercase",textAlign:"center",cursor:"pointer",color:histPeriod===p[0]?"#130E07":"#5A4020",background:histPeriod===p[0]?"#C9A96E":"transparent",border:"none",fontFamily:"inherit"}}>{p[1]}</button>;

            return <div key={t.id} onClick={function(){setHistSel(t);}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",marginBottom:3,background:"rgba(255,255,255,0.025)",borderRadius:7,border:"1px solid rgba(255,255,255,0.05)",borderLeft:"3px solid "+(t.anulado?"#FF6050":"#C9A96E"),cursor:"pointer",opacity:t.anulado?0.6:1}}><div><div style={{fontSize:11,color:t.anulado?"#FF6050":"#C9A96E",fontWeight:"bold"}}>#{String(t.number||0).padStart(6,"0")}{t.anulado?" \u2715":""}</div><div style={{fontSize:9,color:"#5A4030"}}>{fmtDT(t.date)}{t.clientName?" - "+t.clientName:""}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:"bold",color:"#E8DCC8",textDecoration:t.anulado?"line-through":"none"}}>{fmt(t.totals&&t.totals.total||0)}</div>{t.totals&&t.totals.discount>0&&<div style={{fontSize:8,color:"#7A9E7E"}}>-{fmt(t.totals.discount)}</div>}</div></div>;
          })}
        </div>

  // RENDER: DASHBOARD
  var renderDash = function() {
    var hoy=new Date().toISOString().slice(0,10);
    var pMs={semana:7*864e5,mes:30*864e5,total:9999*864e5};
    var desde=new Date(Date.now()-(pMs[dashPeriod]||pMs.semana)).toISOString().slice(0,10);
    var tks=(state.tickets||[]).filter(function(t){return t.date&&t.date.slice(0,10)>=desde;});
    var txns=state.transactions.filter(function(t){return t.date&&t.date>=desde;});
    var ing=txns.filter(function(t){return t.type==="ingreso";}).reduce(function(s,t){return s+t.amount;},0);
    var gas=txns.filter(function(t){return t.type==="gasto";}).reduce(function(s,t){return s+t.amount;},0);
    var tkH=(state.tickets||[]).filter(function(t){return t.date&&t.date.slice(0,10)===hoy;});
    var ventaH=tkH.reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0);
    var ef=tks.filter(function(t){return t.paymentMethod==="efectivo";}).reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0);
    var ta=tks.filter(function(t){return t.paymentMethod==="tarjeta";}).reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0);
    var bi=tks.filter(function(t){return t.paymentMethod==="bizum";}).reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0);
    var payT=ef+ta+bi||1;
    var prodM={};
    tks.forEach(function(t){(t.items||[]).forEach(function(i){prodM[i.desc]=(prodM[i.desc]||0)+(i.qty||1);});});
    var topProds=Object.keys(prodM).map(function(k){return {name:k,qty:prodM[k]};}).sort(function(a,b){return b.qty-a.qty;}).slice(0,5);
    return (
      <div style={{flex:1,overflowY:"auto",padding:"10px"}}>
        <div style={{display:"flex",marginBottom:10,borderRadius:6,overflow:"hidden",border:"1px solid rgba(201,169,110,0.15)"}}>
          {[["semana","7 dias"],["mes","30 dias"],["total","Total"]].map(function(p){
            return <button key={p[0]} onClick={function(){setDashPeriod(p[0]);}} style={{flex:1,padding:"7px 0",fontSize:10,textTransform:"uppercase",textAlign:"center",cursor:"pointer",color:dashPeriod===p[0]?"#130E07":"#5A4020",background:dashPeriod===p[0]?"#C9A96E":"transparent",border:"none",fontFamily:"inherit"}}>{p[1]}</button>;
          })}
        </div>
        <div style={C.secT}>Hoy</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5,marginBottom:10}}>
          <KPI label="Ventas" value={fmt(ventaH)} color={C.green} />
          <KPI label="Tickets" value={tkH.length} />
          <KPI label="Medio" value={fmt(tkH.length?ventaH/tkH.length:0)} />
        </div>
        <div style={C.secT}>Periodo</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:10}}>
          <KPI label="Ingresos" value={fmt(ing)} color={C.green} />
          <KPI label="Gastos" value={fmt(gas)} color={C.red} />
          <KPI label="Resultado" value={fmt(ing-gas)} color={ing-gas>=0?C.gold:C.red} alert={ing-gas<0} />
          <KPI label="Tickets" value={tks.length} />
        </div>
        {tks.length>0&&(
          <div style={Object.assign({},C.card,{padding:"10px",marginBottom:8})}>
            <div style={{fontSize:8,letterSpacing:2,color:"#6A5535",textTransform:"uppercase",marginBottom:7}}>Metodos de pago</div>
            {[["Efectivo",ef,C.gold],["Tarjeta",ta,C.green],["Bizum",bi,C.blue]].map(function(row){
              return <div key={row[0]} style={{marginBottom:5}}><div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:2}}><span style={{color:"#C4B49A"}}>{row[0]}</span><span style={{color:row[2]}}>{fmt(row[1])} ({((row[1]/payT)*100).toFixed(0)}%)</span></div><Bar pct={(row[1]/payT)*100} color={row[2]} height={4} /></div>;
            })}
          </div>
        )}
        {topProds.length>0&&(
          <div style={Object.assign({},C.card,{padding:"10px"})}>
            <div style={{fontSize:8,letterSpacing:2,color:"#6A5535",textTransform:"uppercase",marginBottom:7}}>Top productos</div>
            {topProds.map(function(p,i){
              return <div key={p.name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}><span style={{fontSize:10,color:"#C4B49A"}}>{i+1}. {p.name}</span><span style={{fontSize:10,color:C.gold,fontWeight:"bold"}}>{p.qty} ud</span></div>;
            })}
          </div>
        )}
      </div>
    );
  };


  // RENDER: FACTURAS
  var renderFacturas = function() {
    var valid=factForm.items.filter(function(i){return i.desc&&i.unitPrice>0;});
    var prevTot=valid.length?calcTotals(valid):null;
    var setItem=function(idx,key,val){setFactForm(function(f){var items=f.items.map(function(x,j){if(j!==idx) return x; var n=Object.assign({},x); n[key]=val; return n;}); return Object.assign({},f,{items:items});});};
    return (
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{display:"flex",borderBottom:"1px solid rgba(201,169,110,0.1)",flexShrink:0}}>
          <button onClick={function(){setFactTab("nueva");}} style={{flex:1,padding:"9px 0",fontSize:10,textTransform:"uppercase",textAlign:"center",cursor:"pointer",color:factTab==="nueva"?"#C9A96E":"#5A4020",background:"none",border:"none",borderBottom:factTab==="nueva"?"2px solid #C9A96E":"2px solid transparent",fontFamily:"inherit"}}>+ Nueva</button>
          <button onClick={function(){setFactTab("lista");}} style={{flex:1,padding:"9px 0",fontSize:10,textTransform:"uppercase",textAlign:"center",cursor:"pointer",color:factTab==="lista"?"#C9A96E":"#5A4020",background:"none",border:"none",borderBottom:factTab==="lista"?"2px solid #C9A96E":"2px solid transparent",fontFamily:"inherit"}}>Emitidas ({(state.facturas||[]).length})</button>
        </div>
        {factTab==="nueva"?(
          <div style={{flex:1,overflowY:"auto",padding:"10px"}}>
            <div style={{display:"flex",gap:5,marginBottom:8}}>
              {[["simplificada","B2C"],["completa","B2B"]].map(function(p){
                return <button key={p[0]} onClick={function(){setFactForm(function(f){return Object.assign({},f,{tipo:p[0]});});}} style={{flex:1,padding:"7px",fontSize:10,borderRadius:6,border:"1px solid "+(factForm.tipo===p[0]?"#C9A96E":"rgba(201,169,110,0.2)"),background:factForm.tipo===p[0]?"rgba(201,169,110,0.15)":"transparent",color:factForm.tipo===p[0]?"#C9A96E":"#5A4030",cursor:"pointer",fontFamily:"inherit"}}>{p[1]}</button>;
              })}
            </div>
            {Fl("Fecha",<input style={C.inp} type="date" value={factForm.fecha} onChange={function(e){setFactForm(function(f){return Object.assign({},f,{fecha:e.target.value});});}} />)}
            {factForm.tipo==="completa"&&(
              <div style={{padding:"9px",background:"rgba(255,255,255,0.02)",borderRadius:7,marginBottom:8}}>
                <div style={{fontSize:8,color:"#C9A96E",textTransform:"uppercase",marginBottom:7}}>Datos cliente</div>
                {Fl("Nombre",<input style={C.inp} value={factForm.clienteNombre||""} onChange={function(e){setFactForm(function(f){return Object.assign({},f,{clienteNombre:e.target.value});});}} />)}
                {Fl("NIF",<input style={C.inp} value={factForm.clienteNif||""} onChange={function(e){setFactForm(function(f){return Object.assign({},f,{clienteNif:e.target.value});});}} />)}
                {Fl("Direccion",<input style={C.inp} value={factForm.clienteDireccion||""} onChange={function(e){setFactForm(function(f){return Object.assign({},f,{clienteDireccion:e.target.value});});}} />)}
              </div>
            )}
            <div style={C.secT}>Lineas</div>
            {factForm.items.map(function(item,i){
              return (
                <div key={i} style={Object.assign({},C.card,{padding:"8px"})}>
                  <input value={item.desc} onChange={function(e){setItem(i,"desc",e.target.value);}} placeholder="Descripcion" style={Object.assign({},C.inp,{marginBottom:5})} />
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4}}>
                    <div><div style={{fontSize:8,color:"#5A4030",marginBottom:2}}>Cant.</div><input type="number" min="1" value={item.qty} onChange={function(e){setItem(i,"qty",parseFloat(e.target.value)||1);}} style={C.inp} /></div>
                    <div><div style={{fontSize:8,color:"#5A4030",marginBottom:2}}>Precio</div><input type="number" min="0" step="0.01" value={item.unitPrice} onChange={function(e){setItem(i,"unitPrice",parseFloat(e.target.value)||0);}} style={C.inp} /></div>
                    <div><div style={{fontSize:8,color:"#5A4030",marginBottom:2}}>IVA</div><select value={item.vatType} onChange={function(e){setItem(i,"vatType",e.target.value);}} style={C.sel}><option value="reducido">10%</option><option value="superreducido">4%</option><option value="general">21%</option></select></div>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
                    <span style={{fontSize:10,color:"#C9A96E"}}>Subtotal: {fmt(item.qty*item.unitPrice)}</span>
                    {factForm.items.length>1&&<button onClick={function(){setFactForm(function(f){return Object.assign({},f,{items:f.items.filter(function(_,j){return j!==i;})});});}} style={{background:"none",border:"none",color:"#6A3020",cursor:"pointer",fontSize:13}}>x</button>}
                  </div>
                </div>
              );
            })}
            <button onClick={function(){setFactForm(function(f){return Object.assign({},f,{items:f.items.concat([{desc:"",qty:1,unitPrice:0,vatType:"reducido"}])});});}} style={{width:"100%",padding:"6px",fontSize:10,background:"rgba(201,169,110,0.07)",border:"1px dashed rgba(201,169,110,0.25)",borderRadius:6,color:"#C9A96E",cursor:"pointer",fontFamily:"inherit",marginBottom:8}}>+ Anadir linea</button>
            {prevTot&&prevTot.total>0&&<div style={{padding:"9px 11px",background:"rgba(201,169,110,0.08)",borderRadius:7,border:"1px solid rgba(201,169,110,0.2)",marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",fontSize:15,fontWeight:"bold"}}><span>TOTAL</span><span style={{color:"#C9A96E"}}>{fmt(prevTot.total)}</span></div><div style={{fontSize:9,color:"#8A7060"}}>IVA: {fmt(prevTot.totalVat)}</div></div>}
            <button onClick={emitirFactura} style={{width:"100%",padding:"11px",background:"linear-gradient(135deg,#C9A96E,#7A5530)",border:"none",borderRadius:8,color:"#1A0E04",fontFamily:"Georgia,serif",fontSize:11,fontWeight:"bold",cursor:"pointer"}}>Emitir factura #{String((state.business&&state.business.facturaCounter)||1).padStart(6,"0")}</button>
          </div>
        ):(
          <div style={{flex:1,overflowY:"auto",padding:"10px"}}>
            {!(state.facturas&&state.facturas.length)?<div style={{textAlign:"center",color:"#3A2810",padding:"30px 0",fontSize:11}}>Sin facturas emitidas.</div>:[].concat(state.facturas||[]).reverse().map(function(f){
              var t=f.totals||calcTotals(f.items||[]);
              return <div key={f.id} style={Object.assign({},C.card,{padding:"9px 11px",borderLeft:"3px solid "+(f.tipo==="completa"?"#C9A96E":"#7A9E7E")})}><div style={{display:"flex",justifyContent:"space-between"}}><div><div style={{fontSize:11,color:"#E8DCC8",fontWeight:"bold"}}>Factura #{String(f.number||0).padStart(6,"0")}</div><div style={{fontSize:9,color:"#5A4030"}}>{fmtD(f.date)} - {f.tipo==="completa"?"B2B":"B2C"}</div>{f.cliente&&f.cliente.nombre&&<div style={{fontSize:9,color:"#8A7060"}}>{f.cliente.nombre}</div>}</div><div style={{textAlign:"right"}}><div style={{fontSize:13,color:"#C9A96E",fontWeight:"bold"}}>{fmt(t.total)}</div><div style={{fontSize:8,color:"#5A4030"}}>IVA: {fmt(t.totalVat)}</div></div></div></div>;
            })}
          </div>
        )}
      </div>
    );
  };


  // RENDER: STOCK
  var renderValoracion = function() {
    var val=calcValoracion;
    var CMAP={tienda:"#7A9E7E",takeaway:"#C9A96E",b2b:"#8A9EAE",online:"#A08EBE",verde_dir:"#6AB0A0"};
    var OBJS=[["margen_unitario","Max margen unitario"],["margen_total","Max beneficio total"],["rotacion","Max rotacion"],["mermas","Min mermas"],["takeaway","Max Take Away"],["equilibrado","Equilibrado"]];
    return (
      <div style={{flex:1,overflowY:"auto",padding:"10px"}}>
        <div style={Object.assign({},C.card,{padding:"10px",marginBottom:10})}>
          <div style={{fontSize:8,letterSpacing:2,color:"#6A5535",textTransform:"uppercase",marginBottom:8}}>Parametros del modelo</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
            <div><div style={{fontSize:8,color:"#5A4030",marginBottom:2}}>Merma tueste</div><div style={{fontSize:13,color:"#C9A96E",fontWeight:"bold"}}>{val.mermaReal.toFixed(1)}%</div><div style={{fontSize:8,color:"#4A3020"}}>{(state.roasts||[]).length>0?"De "+(state.roasts||[]).length+" tuestes":"Default 18%"}</div></div>
            <div>{Fl("Gramos/servicio",<input type="number" min="5" max="25" step="0.5" value={valGrServ} onChange={function(e){setValGrServ(parseFloat(e.target.value)||8);}} style={Object.assign({},C.inp)} />)}</div>
          </div>
          <div style={{fontSize:8,color:"#5A4030",marginBottom:4}}>Perdidas operativas (%)</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5,marginBottom:8}}>
            {[["molinillo","Molinillo"],["accidental","Accidental"],["batch","Batch"]].map(function(f){

          <div style={{fontSize:8,color:"#5A4030",marginBottom:4}}>Precios de venta por canal</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:8}}>
            {[["tienda","Tienda EUR/kg"],["takeaway","Take Away EUR/srv"],["b2b","B2B EUR/kg"],["online","Online EUR/kg"]].map(function(f){
              var key=f[0];
              return <div key={key}><div style={{fontSize:8,color:"#4A3020",marginBottom:2}}>{f[1]}</div><input type="number" min="0" step="0.1" value={valPrecios[key]} onChange={function(e){var v=parseFloat(e.target.value)||0; setValPrecios(function(p){var n=Object.assign({},p); n[key]=v; return n;});}} style={Object.assign({},C.inp)} /></div>;
            })}

            {OBJS.map(function(obj){return <button key={obj[0]} onClick={function(){setValObjeto(obj[0]);}} style={{padding:"5px 9px",fontSize:9,borderRadius:12,border:"1px solid "+(valObjeto===obj[0]?"#C9A96E":"rgba(201,169,110,0.15)"),background:valObjeto===obj[0]?"rgba(201,169,110,0.2)":"transparent",color:valObjeto===obj[0]?"#C9A96E":"#5A4030",cursor:"pointer",fontFamily:"inherit"}}>{obj[1]}</button>;})}</div>

            <div key={cafe.id} style={Object.assign({},C.card,{marginBottom:12,padding:"12px"})}>

  var renderStock = function() {

                    {Fl("Unidad",<select style={C.sel} value={stockForm.unit||"kg"} onChange={function(e){setStockForm(function(f){return Object.assign({},f,{unit:e.target.value});});}}><option>kg</option><option>g</option><option>ud</option><option>l</option><option>ml</option></select>)}

                        {Fl("Peso verde (kg)",<input style={C.inp} type="number" min="0" step="0.1" value={stockForm.qtyVerde||""} onChange={function(e){setStockForm(function(f){return Object.assign({},f,{qtyVerde:e.target.value});});}} />)}

  // RENDER: FINANZAS
  var renderFin = function() {
    var FIN_TABS=[["pl","P&L"],["activos","Activos"],["deuda","Deuda"],["valor","Valor"],["informes","Informes"]];
    var mc=function(v){return v>=0?C.green:C.red;};
    var now=Date.now();
    var pMsMap={hoy:0,semana:7*864e5,mes:30*864e5,"3m":90*864e5,"1a":365*864e5,todo:9999*864e5};
    var hoyStr=new Date().toISOString().slice(0,10);
    var desdeStr=infPeriod==="hoy"?hoyStr:new Date(now-(pMsMap[infPeriod]||pMsMap.mes)).toISOString().slice(0,10);
    var tkF=(state.tickets||[]).filter(function(t){if(!t.date)return false; return infPeriod==="hoy"?t.date.slice(0,10)===hoyStr:t.date.slice(0,10)>=desdeStr;});
    var txF=(state.transactions||[]).filter(function(t){if(!t.date)return false; return infPeriod==="hoy"?t.date===hoyStr:t.date>=desdeStr;});
    var rev=txF.filter(function(t){return t.type==="ingreso";}).reduce(function(s,t){return s+t.amount;},0);
    var costs=txF.filter(function(t){return t.type==="gasto";}).reduce(function(s,t){return s+t.amount;},0);
    var cogs2=txF.filter(function(t){return t.category==="compra_insumos";}).reduce(function(s,t){return s+t.amount;},0);
    var opEx=costs-cogs2, gp=rev-cogs2, res=rev-costs;
    var gm=rev>0?(gp/rev)*100:0, ebt=gp-opEx, ebtM=rev>0?(ebt/rev)*100:0, nm=rev>0?(res/rev)*100:0;
    var tkTotal=tkF.length, tkMedio=tkTotal>0?tkF.reduce(function(s,t){return s+(t.totals&&t.totals.total||0);},0)/tkTotal:0;
    var prodMap={};
    tkF.forEach(function(t){(t.items||[]).forEach(function(i){if(!prodMap[i.desc])prodMap[i.desc]={qty:0,rev:0}; prodMap[i.desc].qty+=i.qty||1; prodMap[i.desc].rev+=(i.qty||1)*i.unitPrice;});});
    var prodList=Object.keys(prodMap).map(function(k){return {name:k,qty:prodMap[k].qty,rev:prodMap[k].rev};}).sort(function(a,b){return b.rev-a.rev;});
    var totalRevProd=prodList.reduce(function(s,p){return s+p.rev;},0)||1;
    var ingBC={}, gastBC={};
    txF.filter(function(t){return t.type==="ingreso";}).forEach(function(t){var c=ING_CATS[t.category]||t.category||"Otros"; ingBC[c]=(ingBC[c]||0)+t.amount;});
    txF.filter(function(t){return t.type==="gasto";}).forEach(function(t){var c=GASTO_CATS[t.category]||t.category||"Otros"; gastBC[c]=(gastBC[c]||0)+t.amount;});
    var totalIng=Object.keys(ingBC).reduce(function(s,k){return s+ingBC[k];},0)||1;
    var totalGast=Object.keys(gastBC).reduce(function(s,k){return s+gastBC[k];},0)||1;

    var exportCSV=function(){
      var rows=["Informe GRANO","Periodo:"+infPeriod,"","Ingresos:"+rev.toFixed(2),"COGS:"+cogs2.toFixed(2),"Margen bruto:"+gp.toFixed(2)+":"+gm.toFixed(1)+"%","Gastos op:"+opEx.toFixed(2),"EBITDA:"+ebt.toFixed(2)+":"+ebtM.toFixed(1)+"%","Resultado:"+res.toFixed(2)+":"+nm.toFixed(1)+"%","","PRODUCTOS","Producto;Uds;Rev;%"].concat(prodList.map(function(p){return p.name+";"+p.qty+";"+p.rev.toFixed(2)+";"+(p.rev/totalRevProd*100).toFixed(1)+"%";}));
      var blob=new Blob([rows.join("\n")],{type:"text/csv;charset=utf-8;"});
      var url=URL.createObjectURL(blob); var a=document.createElement("a"); a.href=url; a.download="grano_informe_"+hoyStr+".csv"; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    };

    var exportPDF=function(){
      var h="<!DOCTYPE html><html><head><meta charset='utf-8'><title>Informe GRANO</title><style>body{font-family:Georgia,serif;max-width:700px;margin:40px auto;color:#1a0e04;font-size:13px}h1{color:#7A5530;border-bottom:2px solid #C9A96E;padding-bottom:8px}h2{color:#5A3520;font-size:14px;margin-top:20px;border-bottom:1px solid #e0c080;padding-bottom:4px}table{width:100%;border-collapse:collapse;margin:10px 0}th{background:#f5e8c8;text-align:left;padding:6px 10px;font-size:11px}td{padding:6px 10px;border-bottom:1px solid #ede0c0;font-size:12px}.r{text-align:right}</style></head><body>";
      h+="<h1>Informe GRANO</h1><p>Periodo: <strong>"+infPeriod+"</strong> &mdash; "+new Date().toLocaleString("es-ES")+"</p>";
      h+="<h2>Resumen</h2><table><tr><th>Concepto</th><th class='r'>Importe</th><th class='r'>Margen</th></tr>";
      h+="<tr><td>Ingresos</td><td class='r'>"+fmt(rev)+"</td><td></td></tr><tr><td>COGS</td><td class='r'>-"+fmt(cogs2)+"</td><td></td></tr><tr><td><strong>Margen bruto</strong></td><td class='r'>"+fmt(gp)+"</td><td class='r'>"+gm.toFixed(1)+"%</td></tr><tr><td>Gastos op</td><td class='r'>-"+fmt(opEx)+"</td><td></td></tr><tr><td><strong>EBITDA</strong></td><td class='r'>"+fmt(ebt)+"</td><td class='r'>"+ebtM.toFixed(1)+"%</td></tr><tr><td><strong>Resultado</strong></td><td class='r'>"+fmt(res)+"</td><td class='r'>"+nm.toFixed(1)+"%</td></tr><tr><td>Tickets</td><td class='r'>"+tkTotal+"</td><td class='r'>Medio: "+fmt(tkMedio)+"</td></tr></table>";
      if (prodList.length) {
        h+="<h2>Ventas por producto</h2><table><tr><th>Producto</th><th class='r'>Uds</th><th class='r'>Rev</th><th class='r'>%</th></tr>";
        prodList.forEach(function(p){h+="<tr><td>"+p.name+"</td><td class='r'>"+p.qty+"</td><td class='r'>"+fmt(p.rev)+"</td><td class='r'>"+(p.rev/totalRevProd*100).toFixed(1)+"%</td></tr>";});
        h+="</table>";
      }
      h+="</body></html>";
      var w=window.open("","_blank"); w.document.write(h); w.document.close(); w.print();
    };

    var PLIST=[["hoy","Hoy"],["semana","7d"],["mes","30d"],["3m","3m"],["1a","1a"],["todo","Todo"]];
    var INF_TABS2=[["snapshot","Snapshot"],["margenes","Margenes"],["productos","Productos"],["coste","Coste/Art."]];
    var iColors=["#7A9E7E","#5A8E6E","#3A7E5E","#9ABE9E"];
    var gColors=["#C9A96E","#B08050","#A07040","#D0B080","#906030","#806020"];

    // Coste/beneficio por articulo TPV basado en recetas
    var recetas=state.recetas||{};
    var inv=state.inventory||[];
    var ALL_TPV_FOR_COST=[].concat(
      PRODUCTS.map(function(p){return [{id:p.id,name:p.name+" (Normal)",price:p.prices.normal,vatType:"reducido"},{id:p.id+"_d",name:p.name+" (Doble)",price:p.prices.doble,vatType:"reducido"}];}),
      [PRODUCTS_FIXED]
    ).reduce(function(acc,x){return acc.concat(x);},[]);
    var costePorArticulo=ALL_TPV_FOR_COST.map(function(prod){
      var receta=recetas[prod.id];
      if (!receta||!receta.ingredientes||!receta.ingredientes.length) return {id:prod.id,name:prod.name,price:prod.price,coste:null,margen:null,margenPct:null,sinReceta:true};
      var coste=receta.ingredientes.reduce(function(s,ing){
        var item=inv.find(function(i){return i.id===ing.itemId;});
        var costeUnitario=item?item.unitCost||0:0;
        var qty=ing.cantidad;
        var unidadFactor=1;
        if (ing.unit==="g"&&item&&item.unit==="kg") unidadFactor=0.001;
        else if (ing.unit==="ml"&&item&&item.unit==="l") unidadFactor=0.001;
        else if (ing.unit==="kg"&&item&&item.unit==="g") unidadFactor=1000;
        return s+qty*unidadFactor*costeUnitario;
      },0);
      var pctIva=IVA[prod.vatType]||10;
      var precioBase=prod.price/(1+pctIva/100);
      var margen=precioBase-coste;
      var margenPct=precioBase>0?(margen/precioBase)*100:0;
      return {id:prod.id,name:prod.name,price:prod.price,precioBase:precioBase,coste:coste,margen:margen,margenPct:margenPct,sinReceta:false,ingredientes:receta.ingredientes.map(function(ing){var item=inv.find(function(i){return i.id===ing.itemId;}); return Object.assign({},ing,{itemName:item?item.name:"?",itemUnit:item?item.unit:""});})};
    }).filter(function(x){return !x.sinReceta;}).sort(function(a,b){return b.margenPct-a.margenPct;});
    var sinReceta=ALL_TPV_FOR_COST.filter(function(p){return !(recetas[p.id]&&recetas[p.id].ingredientes&&recetas[p.id].ingredientes.length);});

    return (
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{display:"flex",borderRadius:6,overflow:"hidden",border:"1px solid rgba(201,169,110,0.15)",flexShrink:0,margin:"8px 10px 0"}}>
          {FIN_TABS.map(function(t){return <button key={t[0]} onClick={function(){setFinTab(t[0]);}} style={{flex:1,padding:"7px 0",fontSize:9,textTransform:"uppercase",textAlign:"center",cursor:"pointer",color:finTab===t[0]?"#130E07":"#5A4020",background:finTab===t[0]?"#C9A96E":"transparent",border:"none",fontFamily:"inherit"}}>{t[1]}</button>;})}
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"8px 10px"}}>
          {finTab==="pl"&&(
            <div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:7}}>
                <KPI label="Ingresos" value={fmt(fin.ingresos)} color={C.green} />
                <KPI label="Gastos" value={fmt(fin.gastos)} color={C.red} />
                <KPI label="Resultado" value={fmt(fin.netIncome)} color={netColor} alert={fin.netIncome<0} />
                <KPI label="Margen bruto" value={fin.grossMargin.toFixed(1)+"%"} alert={fin.grossMargin<40} />
                <KPI label="EBITDA/mes" value={fmt(fin.ebitdaM)} color={fin.ebitdaM>=0?C.gold:C.red} />
                <KPI label="Burn rate" value={fmt(fin.burnRate)} color={C.red} />
              </div>
              <div style={C.secT}>Ultimas transacciones</div>
              {[].concat(state.transactions).reverse().slice(0,10).map(function(t){
                return <div key={t.id} style={Object.assign({},C.card,{borderLeft:"2px solid "+(t.type==="ingreso"?C.green:C.red),padding:"5px 9px"})}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:10,color:"#C4B49A",flex:1,marginRight:3}}>{t.description}</span><span style={{fontSize:10,fontWeight:"bold",color:t.type==="ingreso"?C.green:C.red,whiteSpace:"nowrap"}}>{t.type==="ingreso"?"+":"-"}{fmt(t.amount)}</span></div><div style={{fontSize:8,color:"#4A3820"}}>{fmtD(t.date)}</div></div>;
              })}
            </div>
          )}
          {finTab==="activos"&&(
            <div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:7}}>
                <KPI label="Valor libro" value={fmt(fin.totalBook)} />
                <KPI label="Amort./ano" value={fmt(fin.annualDep)} sub={fmt(fin.annualDep/12)+"/mes"} />
              </div>
              {!fin.assetData.length?<div style={{fontSize:10,color:"#3A2810",textAlign:"center",padding:"8px 0"}}>Sin activos. Registra uno via el Chat de IA.</div>:fin.assetData.map(function(a){
                return <div key={a.id} style={Object.assign({},C.card,{borderLeft:"2px solid #C9A96E"})}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:11,color:"#E8DCC8"}}>{a.name}</span><span style={{fontSize:10,color:"#C9A96E",fontWeight:"bold"}}>{fmt(a.bookValue)}</span></div><div style={{fontSize:9,color:"#5A4030"}}>Coste {fmt(a.purchasePrice)} - {a.depreciationYears}a - Amort. {fmt(a.annualDep)}/a</div><Bar pct={100-(a.bookValue/a.purchasePrice)*100} color={C.gold} height={3} /></div>;
              })}
            </div>
          )}
          {finTab==="deuda"&&(
            <div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:7}}>
                <KPI label="Deuda total" value={fmt(fin.totalDebt)} color={C.red} />
                <KPI label="Activos netos" value={fmt(fin.netAssets)} color={fin.netAssets>=0?C.green:C.red} />
              </div>
              {!fin.loanData.length?<div style={{fontSize:10,color:"#3A2810",textAlign:"center",padding:"8px 0"}}>Sin prestamos. Registra uno via el Chat de IA.</div>:fin.loanData.map(function(l){
                return <div key={l.id} style={Object.assign({},C.card,{borderLeft:"2px solid #B07D62"})}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:11,color:"#E8DCC8"}}>{l.name}</span><span style={{fontSize:10,color:"#FF8060",fontWeight:"bold"}}>{fmt(l.remaining)}</span></div><div style={{fontSize:9,color:"#5A4030"}}>{l.interestRate}% - {fmt(l.monthly)}/mes - {l.monthsLeft}m restantes</div><Bar pct={((l.principal-l.remaining)/l.principal)*100} color={C.green} height={3} /></div>;
              })}
            </div>
          )}
          {finTab==="valor"&&(
            <div>
              <div style={{background:"rgba(201,169,110,0.06)",border:"1px solid rgba(201,169,110,0.2)",borderRadius:9,padding:"12px",marginBottom:8,textAlign:"center"}}>
                <div style={{fontSize:8,letterSpacing:2,color:"#6A5535",textTransform:"uppercase",marginBottom:3}}>Valoracion estimada</div>
                <div style={{fontSize:24,color:"#C9A96E",fontWeight:"bold"}}>{fmt(fin.valuation)}</div>
                <div style={{fontSize:9,color:"#6A5535",marginTop:2}}>Promedio de 4 metodos</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
                <KPI label="Activos netos" value={fmt(Math.max(0,fin.netAssets))} sub="Activos - Deuda" />
                <KPI label="x Revenue" value={fmt(Math.max(0,fin.annualRev*0.8))} sub="x 0.8 anual" />
                <KPI label="x EBITDA" value={fmt(fin.ebitdaA>0?fin.ebitdaA*4:0)} sub="x 4 EBITDA" />
                <KPI label="Mg. EBITDA" value={fin.ebitdaMargin.toFixed(1)+"%"} color={fin.ebitdaMargin>=10?C.green:C.red} />
              </div>
            </div>
          )}
          {finTab==="informes"&&(
            <div>
              <div style={{display:"flex",marginBottom:8,borderRadius:6,overflow:"hidden",border:"1px solid rgba(201,169,110,0.15)"}}>
                {PLIST.map(function(p){return <button key={p[0]} onClick={function(){setInfPeriod(p[0]);}} style={{flex:1,padding:"7px 0",fontSize:9,textTransform:"uppercase",textAlign:"center",cursor:"pointer",color:infPeriod===p[0]?"#130E07":"#5A4020",background:infPeriod===p[0]?"#C9A96E":"transparent",border:"none",fontFamily:"inherit"}}>{p[1]}</button>;})}
              </div>
              <div style={{display:"flex",marginBottom:8,borderRadius:6,overflow:"hidden",border:"1px solid rgba(201,169,110,0.1)"}}>
                {INF_TABS2.map(function(t){return <button key={t[0]} onClick={function(){setInfTab(t[0]);}} style={{flex:1,padding:"6px 0",fontSize:9,textTransform:"uppercase",textAlign:"center",cursor:"pointer",color:infTab===t[0]?"#130E07":"#5A4020",background:infTab===t[0]?"rgba(201,169,110,0.7)":"transparent",border:"none",fontFamily:"inherit"}}>{t[1]}</button>;})}
              </div>
              <div style={{display:"flex",gap:5,marginBottom:8}}>
                <button onClick={exportCSV} style={{flex:1,padding:"7px",fontSize:10,background:"rgba(122,158,126,0.1)",border:"1px solid rgba(122,158,126,0.25)",borderRadius:7,color:"#7A9E7E",cursor:"pointer",fontFamily:"inherit"}}>CSV</button>
                <button onClick={exportPDF} style={{flex:1,padding:"7px",fontSize:10,background:"rgba(201,169,110,0.1)",border:"1px solid rgba(201,169,110,0.25)",borderRadius:7,color:"#C9A96E",cursor:"pointer",fontFamily:"inherit"}}>PDF</button>
              </div>
              {infTab==="snapshot"&&(
                <div>
                  <div style={Object.assign({},C.card,{padding:"12px",marginBottom:8})}>
                    <div style={{fontSize:8,letterSpacing:2,color:"#6A5535",textTransform:"uppercase",marginBottom:10}}>Flujo del periodo</div>
                    <div style={{display:"flex",gap:8,alignItems:"flex-end",marginBottom:10,height:64}}>
                      {[["Ingresos",rev,"#7A9E7E"],["Gastos",costs,"#C9A96E"],["Resultado",res,mc(res)]].map(function(row){
                        var mBar=Math.max(rev,costs,1);
                        return <div key={row[0]} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><div style={{width:"100%",height:(Math.abs(row[1])/mBar*58)+"px",background:row[2],borderRadius:"3px 3px 0 0",minHeight:3}} /><div style={{fontSize:8,color:row[2]}}>{row[0]}</div><div style={{fontSize:10,fontWeight:"bold",color:row[2]}}>{fmt(row[1])}</div></div>;
                      })}
                    </div>
                    <div style={{display:"flex",gap:5}}>
                      {[["Mg. bruto",gm,gm>=40],["EBITDA",ebtM,ebtM>=10],["Mg. neto",nm,nm>=5]].map(function(row){
                        return <div key={row[0]} style={{flex:1,padding:"6px",background:"rgba(255,255,255,0.03)",borderRadius:6,textAlign:"center"}}><div style={{fontSize:8,color:"#5A4030",marginBottom:1}}>{row[0]}</div><div style={{fontSize:11,fontWeight:"bold",color:row[2]?C.green:C.red}}>{row[1].toFixed(1)}%</div></div>;
                      })}
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                    <div style={{padding:"10px",background:"rgba(122,158,126,0.05)",borderRadius:9,border:"1px solid rgba(122,158,126,0.15)"}}>
                      <div style={{fontSize:8,letterSpacing:2,color:"#4A7E5E",textTransform:"uppercase",marginBottom:8}}>Ingresos {fmt(rev)}</div>
                      {Object.keys(ingBC).sort(function(a,b){return ingBC[b]-ingBC[a];}).map(function(cat,ci){
                        var pct=ingBC[cat]/totalIng*100;
                        return <div key={cat} style={{marginBottom:6}}><div style={{display:"flex",justifyContent:"space-between",fontSize:9,marginBottom:2}}><span style={{color:"#C4B49A",flex:1}}>{cat}</span><span style={{color:iColors[ci%iColors.length]}}>{pct.toFixed(0)}%</span></div><Bar pct={pct} color={iColors[ci%iColors.length]} height={4} /><div style={{fontSize:9,color:"#5A4030",marginTop:1}}>{fmt(ingBC[cat])}</div></div>;
                      })}
                      {!Object.keys(ingBC).length&&<div style={{fontSize:9,color:"#3A2810"}}>Sin ingresos</div>}
                    </div>
                    <div style={{padding:"10px",background:"rgba(201,169,110,0.04)",borderRadius:9,border:"1px solid rgba(201,169,110,0.12)"}}>
                      <div style={{fontSize:8,letterSpacing:2,color:"#7A5530",textTransform:"uppercase",marginBottom:8}}>Gastos {fmt(costs)}</div>
                      {Object.keys(gastBC).sort(function(a,b){return gastBC[b]-gastBC[a];}).map(function(cat,ci){
                        var pct=gastBC[cat]/totalGast*100;
                        return <div key={cat} style={{marginBottom:6}}><div style={{display:"flex",justifyContent:"space-between",fontSize:9,marginBottom:2}}><span style={{color:"#C4B49A",flex:1}}>{cat}</span><span style={{color:gColors[ci%gColors.length]}}>{pct.toFixed(0)}%</span></div><Bar pct={pct} color={gColors[ci%gColors.length]} height={4} /><div style={{fontSize:9,color:"#5A4030",marginTop:1}}>{fmt(gastBC[cat])}</div></div>;
                      })}
                      {!Object.keys(gastBC).length&&<div style={{fontSize:9,color:"#3A2810"}}>Sin gastos</div>}
                    </div>
                  </div>
                  {prodList.length>0&&<div style={Object.assign({},C.card,{padding:"10px"})}><div style={{fontSize:8,letterSpacing:2,color:"#6A5535",textTransform:"uppercase",marginBottom:7}}>Top 5 productos</div>{prodList.slice(0,5).map(function(p,i){return <div key={p.name} style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}><span style={{fontSize:9,color:"#5A4030",minWidth:12}}>{i+1}</span><div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between",fontSize:9,marginBottom:1}}><span style={{color:"#C4B49A",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"70%"}}>{p.name}</span><span style={{color:"#C9A96E",flexShrink:0}}>{fmt(p.rev)}</span></div><Bar pct={p.rev/totalRevProd*100} color={i===0?"#C9A96E":"rgba(201,169,110,0.4)"} height={3} /></div><span style={{fontSize:8,color:"#5A4030",flexShrink:0}}>{p.qty}ud</span></div>;})} </div>}
                  {rev===0&&costs===0&&<div style={{textAlign:"center",color:"#3A2810",padding:"20px 0",fontSize:11}}>Sin datos en este periodo.</div>}
                </div>
              )}
              {infTab==="margenes"&&(
                <div style={Object.assign({},C.card,{padding:"12px"})}>
                  {[["Ingresos",rev,null],["- COGS",-cogs2,null],["= Margen bruto",gp,gm],["- Gastos op.",-opEx,null],["= EBITDA",ebt,ebtM],["= Resultado",res,nm]].map(function(row,i){
                    var isT=row[0].startsWith("=");
                    return <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}><span style={{fontSize:10,color:isT?"#E8DCC8":"#8A7060"}}>{row[0]}</span><div style={{textAlign:"right"}}><span style={{fontSize:11,fontWeight:isT?"bold":"normal",color:row[1]>=0?"#E8DCC8":"#FF8060"}}>{row[1]>=0?"+":""}{fmt(row[1])}</span>{row[2]!==null&&<span style={{fontSize:9,color:mc(row[2]),marginLeft:5}}>{row[2].toFixed(1)}%</span>}</div></div>;
                  })}
                </div>
              )}
              {infTab==="productos"&&(
                <div>
                  {!prodList.length?<div style={{textAlign:"center",color:"#3A2810",padding:"20px 0",fontSize:11}}>Sin ventas en el periodo.</div>:prodList.map(function(p,i){
                    return <div key={p.name} style={{marginBottom:7}}><div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:2}}><span style={{color:i===0?"#C9A96E":"#C4B49A",flex:1}}>{i===0?"#1 ":""}{p.name}</span><span style={{color:"#C9A96E",flexShrink:0}}>{fmt(p.rev)}</span><span style={{color:"#6A5535",marginLeft:6,flexShrink:0}}>{p.qty}ud</span></div><Bar pct={p.rev/totalRevProd*100} color={i===0?"#C9A96E":"rgba(201,169,110,0.35)"} height={4} /><div style={{fontSize:8,color:"#5A4030",marginTop:1}}>{(p.rev/totalRevProd*100).toFixed(1)}%</div></div>;
                  })}
                </div>
              )}
              {infTab==="coste"&&(
                <div>
                  <div style={{fontSize:9,color:"#5A4030",marginBottom:10,lineHeight:1.5}}>Margen por articulo calculado a partir de las recetas TPV y el coste actual de los insumos. El precio base excluye IVA.</div>
                  {costePorArticulo.length===0&&(
                    <div style={{textAlign:"center",padding:"20px 10px",background:"rgba(255,255,255,0.02)",borderRadius:8,border:"1px dashed rgba(201,169,110,0.2)"}}>
                      <div style={{fontSize:13,marginBottom:6}}>{"?"}</div>
                      <div style={{fontSize:11,color:"#5A4030",marginBottom:4}}>Sin recetas configuradas</div>
                      <div style={{fontSize:9,color:"#3A2810"}}>Define recetas en Stock para ver el coste por articulo.</div>
                    </div>
                  )}
                  {costePorArticulo.map(function(prod){
                    var barColor=prod.margenPct>=70?"#7A9E7E":prod.margenPct>=40?"#C9A96E":"#FF8060";
                    return (
                      <div key={prod.id} style={Object.assign({},C.card,{marginBottom:8,padding:"10px"})}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                          <div style={{flex:1}}>
                            <div style={{fontSize:12,color:"#E8DCC8",fontWeight:"bold"}}>{prod.name}</div>
                            <div style={{fontSize:9,color:"#5A4030"}}>PVP: {fmt(prod.price)} (base s/IVA: {fmt(prod.precioBase)})</div>
                          </div>
                          <div style={{textAlign:"right",flexShrink:0,marginLeft:8}}>
                            <div style={{fontSize:14,fontWeight:"bold",color:barColor}}>{prod.margenPct.toFixed(1)}%</div>
                            <div style={{fontSize:9,color:barColor}}>{fmt(prod.margen)}/ud</div>
                          </div>
                        </div>
                        <div style={{marginBottom:5}}>
                          <div style={{display:"flex",justifyContent:"space-between",fontSize:9,marginBottom:2}}>

  // RENDER: CRM
  var renderCRM = function() {
    var clients=state.clients||[], coupons=state.coupons||[];
    var filtered=crmSearch.trim()?clients.filter(function(c){return c.name.toLowerCase().includes(crmSearch.toLowerCase());}):clients;

    var saveClient=async function(c){var upd=clients.findIndex(function(x){return x.id===c.id;})>=0?clients.map(function(x){return x.id===c.id?c:x;}):[].concat(clients,[c]);var ns=Object.assign({},state,{clients:upd});setState(ns);await save(ns);};
    var delClient=async function(id){var ns=Object.assign({},state,{clients:clients.filter(function(c){return c.id!==id;})});setState(ns);await save(ns);};
    var saveCoupon=async function(c){var upd=coupons.findIndex(function(x){return x.id===c.id;})>=0?coupons.map(function(x){return x.id===c.id?c:x;}):[].concat(coupons,[c]);var ns=Object.assign({},state,{coupons:upd});setState(ns);await save(ns);};
    var delCoupon=async function(id){var ns=Object.assign({},state,{coupons:coupons.filter(function(c){return c.id!==id;})});setState(ns);await save(ns);};

    if (crmView==="client"&&crmSel) {

            <span style={{fontSize:12,color:"#C9A96E",fontWeight:"bold",flex:1}}>{cli.name}</span>
            <span style={{padding:"3px 8px",borderRadius:10,background:"rgba(255,255,255,0.06)",fontSize:9,color:tier.color,fontWeight:"bold"}}>{tier.label}</span>
            <button onClick={function(){setCrmView("editclient");setCrmForm(Object.assign({},cli));}} style={{padding:"5px 10px",fontSize:10,background:"rgba(201,169,110,0.1)",border:"1px solid rgba(201,169,110,0.2)",borderRadius:6,color:"#C9A96E",cursor:"pointer",fontFamily:"inherit"}}>Editar</button>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"10px"}}>

              <KPI label="Visitas" value={cli.visits||0} />

            {cli.phone&&<div style={{fontSize:10,color:"#C4B49A",marginBottom:3}}>Tel: {cli.phone}</div>}
            {cli.email&&<div style={{fontSize:10,color:"#C4B49A",marginBottom:3}}>Email: {cli.email}</div>}
            {cli.category&&<div style={{display:"inline-block",fontSize:9,padding:"2px 8px",background:"rgba(201,169,110,0.1)",borderRadius:8,color:"#C9A96E",marginBottom:6}}>{cli.category}</div>}
            {cli.notes&&<div style={{fontSize:10,color:"#8A7060",fontStyle:"italic",padding:"7px",background:"rgba(255,255,255,0.02)",borderRadius:6,border:"1px solid rgba(255,255,255,0.05)",marginBottom:8}}>{cli.notes}</div>}
            <div style={{marginBottom:8}}>
              <div style={{fontSize:8,letterSpacing:1,color:"#6A5535",textTransform:"uppercase",marginBottom:3}}>Tier override</div>
              <div style={{display:"flex",gap:4}}>
                <button onClick={async function(){var u=Object.assign({},cli,{tierOverride:null});await saveClient(u);setCrmSel(u);}} style={{flex:1,padding:"5px",fontSize:9,border:"1px solid "+(cli.tierOverride===null?"#C9A96E":"rgba(201,169,110,0.15)"),background:cli.tierOverride===null?"rgba(201,169,110,0.15)":"transparent",color:cli.tierOverride===null?"#C9A96E":"#5A4030",cursor:"pointer",borderRadius:5,fontFamily:"inherit"}}>Auto</button>

            </div>
            {cliTickets.length>0&&<div><div style={C.secT}>Historial ({cliTickets.length})</div>{cliTickets.slice(0,8).map(function(t){return <div key={t.id} style={Object.assign({},C.card,{display:"flex",justifyContent:"space-between",padding:"5px 8px"})}><div style={{fontSize:9,color:"#C4B49A"}}>#{String(t.number||0).padStart(6,"0")} <span style={{color:"#5A4030"}}>{t.date&&t.date.slice(0,10)}</span></div><div style={{fontSize:10,color:"#C9A96E",fontWeight:"bold"}}>{fmt(t.totals&&t.totals.total||0)}</div></div>;})} </div>}

    if (crmView==="editclient") {

    if (crmView==="editcoupon") {

        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{display:"flex",gap:6,padding:"8px 10px",borderBottom:"1px solid rgba(201,169,110,0.1)",flexShrink:0,alignItems:"center"}}>
            <button onClick={function(){setCrmView("list");}} style={{padding:"5px 10px",fontSize:10,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,color:"#C4B49A",cursor:"pointer",fontFamily:"inherit"}}>Cancelar</button>
            <span style={{fontSize:12,color:"#C9A96E",fontWeight:"bold"}}>{isNewCup?"Nuevo cupon":"Editar cupon"}</span>

            {Fl("Codigo *",<input style={Object.assign({},C.inp,{letterSpacing:2,textTransform:"uppercase"})} value={couponForm.code||""} onChange={function(e){setCF("code",e.target.value.toUpperCase().replace(/\s/g,""));}} placeholder="VERANO10" />)}

              <div>{Fl("Tipo",<select style={C.sel} value={couponForm.type||"percent"} onChange={function(e){setCF("type",e.target.value);}}><option value="percent">% porcentaje</option><option value="fixed">EUR fijo</option></select>)}</div>
              <div>{Fl("Valor",<input style={C.inp} type="number" min="0" step="0.5" value={couponForm.value||""} onChange={function(e){setCF("value",parseFloat(e.target.value)||0);}} placeholder="10" />)}</div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>

            {couponForm.applyTo==="products"&&(

                </div>
                <div style={{fontSize:8,color:"#5A4030",marginBottom:4}}>Acceso rapido:</div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {[].concat(PRODUCTS.map(function(p){return p.name;}),PRODUCTS_FIXED.map(function(p){return p.name;})).map(function(pn){

                    return <button key={pn} onClick={function(){if(!already) setCF("productNames",[].concat(couponForm.productNames||[],[pn]));}} style={{padding:"3px 7px",fontSize:8,borderRadius:10,border:"1px solid "+(already?"rgba(201,169,110,0.5)":"rgba(201,169,110,0.15)"),background:already?"rgba(201,169,110,0.15)":"transparent",color:already?"#C9A96E":"#5A4030",cursor:already?"default":"pointer",fontFamily:"inherit"}}>{pn}</button>;

            {!isNewCup&&<button onClick={async function(){if(window.confirm("Eliminar cupon?")){await delCoupon(couponForm.id);setCrmView("list");setCouponForm({});}}} style={{width:"100%",marginTop:8,padding:"9px",fontSize:11,background:"rgba(200,40,20,0.08)",border:"1px solid rgba(200,40,20,0.2)",borderRadius:8,color:"#FF6050",cursor:"pointer",fontFamily:"inherit"}}>Eliminar cupon</button>}
          </div>

    var tierCounts={};

            return <button key={t[0]} onClick={function(){setCrmTab(t[0]);}} style={{flex:1,padding:"9px 0",fontSize:9,textTransform:"uppercase",textAlign:"center",cursor:"pointer",color:crmTab===t[0]?"#C9A96E":"#5A4020",background:"none",border:"none",borderBottom:crmTab===t[0]?"2px solid #C9A96E":"2px solid transparent",fontFamily:"inherit"}}>{t[1]}</button>;

              })}
            </div>
          </div>
        )}
        {crmTab==="cupones"&&(
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"8px 10px",flexShrink:0,textAlign:"right"}}>
              <button onClick={function(){setCrmView("editcoupon");setCouponForm({type:"percent",applyTo:"total"});}} style={{padding:"7px 11px",background:"linear-gradient(135deg,#C9A96E,#7A5530)",border:"none",borderRadius:7,color:"#1A0E04",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:10,fontWeight:"bold"}}>+ Nuevo cupon</button>

          <div style={{flex:1,overflowY:"auto",padding:"10px"}}>
            {TIERS.map(function(t){return <div key={t.id} style={Object.assign({},C.card,{padding:"12px",marginBottom:8,borderLeft:"4px solid "+t.color})}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}><span style={{fontSize:13,color:t.color,fontWeight:"bold"}}>{t.label}</span><span style={{fontSize:20,padding:"4px 12px",background:"rgba(255,255,255,0.05)",borderRadius:16,color:t.color,fontWeight:"bold"}}>{tierCounts[t.id]||0}</span></div><div style={{fontSize:10,color:"#8A7060",marginBottom:2}}>{fmt(t.minSpend)} - {t.maxSpend>=9e8?"sin limite":fmt(t.maxSpend)}</div><div style={{fontSize:11,color:"#C4B49A"}}>Descuento: <strong style={{color:t.color}}>{t.discount}%</strong></div></div>;})}
          </div>

  // RENDER: CHAT
  var renderChat = function() {
    return (
      <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
