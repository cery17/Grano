        <div style={{padding:"8px 10px",borderTop:"1px solid rgba(201,169,110,0.1)",background:C.dark,display:"flex",gap:6,alignItems:"flex-end",flexShrink:0}}>
          <textarea value={chatInput} onChange={function(e){setChatInput(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}}} placeholder="Registra compras, activos, prestamos, pide analisis..." style={C.ta} rows={1} disabled={chatLoading} />
          <button onClick={sendMsg} disabled={chatLoading||!chatInput.trim()} style={{width:40,height:40,background:chatLoading||!chatInput.trim()?"rgba(201,169,110,0.1)":"linear-gradient(135deg,#C9A96E,#7A5530)",border:"none",borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0,color:"#1A0E04"}}>{chatLoading?"...":">"}</button>
        </div>
      </div>
    );
  };

  // RENDER: CONFIG
  var renderConfig = function() {
    var fields=[["name","Nombre comercial"],["legalName","Razon social"],["nif","NIF/CIF"],["address","Direccion"],["cp","CP"],["city","Ciudad"],["phone","Telefono"],["email","Email"],["web","Web"],["ticketFooter","Pie de ticket"]];
    return (
      <div>
        <div style={C.secT}>Datos del comercio</div>
        {fields.map(function(f){
          var key=f[0];
          return <div key={key} style={{marginBottom:7}}><div style={{fontSize:8,letterSpacing:1,color:"#6A5535",textTransform:"uppercase",marginBottom:2}}>{f[1]}</div><input value={(state.business||INIT_BIZ)[key]||""} onChange={function(e){var v=e.target.value; var nb=Object.assign({},state.business||INIT_BIZ); nb[key]=v; var ns=Object.assign({},state,{business:nb}); setState(ns); save(ns);}} style={C.inp} /></div>;
        })}
        <div style={C.secT}>Copia de seguridad</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
          <button onClick={exportData} style={{padding:"9px",fontSize:10,background:"rgba(201,169,110,0.08)",border:"1px solid rgba(201,169,110,0.2)",borderRadius:7,color:"#C9A96E",cursor:"pointer",fontFamily:"inherit"}}>Exportar JSON</button>
          <button onClick={function(){importRef.current&&importRef.current.click();}} style={{padding:"9px",fontSize:10,background:"rgba(122,158,126,0.08)",border:"1px solid rgba(122,158,126,0.2)",borderRadius:7,color:"#7A9E7E",cursor:"pointer",fontFamily:"inherit"}}>Importar JSON</button>
        </div>
        <input ref={importRef} type="file" accept=".json" onChange={importData} style={{display:"none"}} />
        <div style={C.secT}>Zona peligrosa</div>
        <button onClick={resetGrano} style={{width:"100%",padding:"10px",fontSize:11,background:"rgba(200,40,20,0.08)",border:"1px solid rgba(200,40,20,0.25)",borderRadius:7,color:"#FF6050",cursor:"pointer",fontFamily:"inherit"}}>Resetear GRANO a cero</button>
      </div>
    );
  };


  // MAIN RETURN
  var TABS=[["tpv","\uD83E\uDDFE","TPV"],["caja","\uD83D\uDCB5","Caja"],["hist","\uD83D\uDCDC","Hist"],["dash","\uD83D\uDCC8","Dash"],["fact","\uD83D\uDCCB","Fact"],["stock","\uD83D\uDCE6","Stock"],["fin","\uD83D\uDCCA","P&L"],["crm","\uD83D\uDC65","CRM"],["chat","\uD83D\uDCAC","Chat"],["config","\u2699","Cfg"]];
  var low=(state.inventory||[]).filter(function(i){return i.minStock&&i.quantity<=i.minStock;}).length;

  var renderTab=function(){
    if (tab==="tpv") return renderTPV();
    if (tab==="caja") return renderCaja();
    if (tab==="hist") return renderHistorial();
    if (tab==="dash") return renderDash();
    if (tab==="fact") return renderFacturas();
    if (tab==="stock") return renderStock();
    if (tab==="fin") return renderFin();
    if (tab==="crm") return renderCRM();
    if (tab==="chat") return renderChat();
    if (tab==="config") return (
      <div style={{flex:1,overflowY:"auto",padding:"10px"}}>
        {renderConfig()}
      </div>
    );
    return null;
  };

  return (
    <div style={{fontFamily:"Georgia,serif",background:C.bg,color:"#E8DCC8",minHeight:"100vh",display:"flex",flexDirection:"column",maxWidth:430,margin:"0 auto",position:"relative",overflow:"hidden",height:"100vh"}}>
      <div style={{display:"flex",alignItems:"center",padding:"7px 12px",background:"rgba(0,0,0,0.35)",borderBottom:"1px solid rgba(201,169,110,0.15)",flexShrink:0,gap:8}}>
        <div style={{flex:1}}><span style={{fontSize:13,color:"#C9A96E",fontWeight:"bold",letterSpacing:1}}>GRANO</span><span style={{fontSize:8,color:"#5A4030",letterSpacing:2,marginLeft:6,textTransform:"uppercase"}}>Tostadora</span></div>
        <div style={{display:"flex",gap:5,alignItems:"center"}}>
          {low>0&&<div style={{fontSize:8,padding:"2px 7px",background:"rgba(255,100,60,0.15)",border:"1px solid rgba(255,100,60,0.3)",borderRadius:10,color:"#FF8060"}}>Stock {low}</div>}
          {saveStatus==="saving"&&<div style={{fontSize:8,color:"#5A4030"}}>...</div>}
          {saveStatus==="saved"&&<div style={{fontSize:8,color:"#7A9E7E"}}>OK</div>}
          {saveStatus==="error"&&<div style={{fontSize:8,color:"#FF8060"}}>ERR</div>}
          <button onClick={exportData} style={{padding:"5px 8px",fontSize:9,background:"rgba(201,169,110,0.08)",border:"1px solid rgba(201,169,110,0.15)",borderRadius:6,color:"#C9A96E",cursor:"pointer",fontFamily:"inherit"}}>JSON</button>
        </div>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {renderTab()}
      </div>
      <div style={{display:"flex",background:"rgba(0,0,0,0.5)",borderTop:"1px solid rgba(201,169,110,0.12)",flexShrink:0}}>
        {TABS.map(function(t){
          var active=tab===t[0];
          return <button key={t[0]} onClick={function(){setTab(t[0]);if(t[0]==="hist"&&histSel)setHistSel(null);if(t[0]==="crm"&&crmView!=="list")setCrmView("list");}} style={{flex:1,padding:"7px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:1,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}><div style={{fontSize:14,lineHeight:1,filter:active?"none":"grayscale(0.5)",opacity:active?1:0.5}}>{t[1]}</div><div style={{fontSize:7,letterSpacing:0.5,color:active?"#C9A96E":"#3A2810",textTransform:"uppercase"}}>{t[2]}</div>{active&&<div style={{width:16,height:1,background:"#C9A96E",borderRadius:1}} />}</div>;
        })}
      </div>
    </div>
  );
}
window.__GranoApp = GranoApp;

</script>
<script>
window.addEventListener("load", function() {
  try {
    var src = document.getElementById("app-source").textContent;
    var transformed = Babel.transform(src, { presets: ["react"] }).code;
    eval(transformed);
    var root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(window.__GranoApp || GranoApp));
    document.getElementById("loading").style.display = "none";
  } catch(e) {
    document.getElementById("loading").innerHTML = "<div style='color:#FF8060;padding:20px;font-size:12px'>Error: " + e.message + "</div>";
    console.error(e);
  }
});
</script>
<script>
if ("serviceWorker" in navigator && location.hostname === "cery17.github.io") {
  navigator.serviceWorker.register("/Grano/sw.js");
}
</script>
</body>
</html>
