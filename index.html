const STORAGE_KEY = "grano_local_v1";

const IVA_LABELS = { general:"IVA 21%", reducido:"IVA 10%", superreducido:"IVA 4%" };

const SYSTEM_PROMPT = `Eres GRANO, asistente de gestión financiera de una micro-tostadora de café especialidad en León, España. Tostado artesanal + tienda + take away. Responde siempre en español. Cuando debas modificar datos incluye el bloque de acción AL FINAL.

4. <GRANO_ACTION>{"type":"UPSERT_LOAN","loan":{"id":"l1","name":"Préstamo","principal":30000,"interestRate":4.5,"startDate":"2026-01-01","termMonths":60,"lender":"Banco"}}</GRANO_ACTION>
5. <GRANO_ACTION>{"type":"ADJUST_STOCK","adjustments":[{"id":"id","delta":-1,"reason":"venta"}]}</GRANO_ACTION>`;

const TPV_PROMPT = `Eres el módulo TPV de GRANO. Interpreta ventas en lenguaje natural y devuelve JSON con IVA español correcto.
IVA: reducido(10%)=bebidas/take away/bollería; superreducido(4%)=café grano/molido envasado; general(21%)=accesorios/merchandising.
Precios ref: espresso 1.50€, cortado 1.70€, café con leche 2.50€, filtro 3.00€, croissant 1.50€, tostada 2.00€, café 250g 12€, café 1kg 38€.
RESPONDE SOLO con este JSON sin texto extra:
<TPV_SALE>{"items":[{"qty":1,"desc":"Descripción","unitPrice":1.50,"vatType":"reducido"}],"paymentMethod":"efectivo|tarjeta|bizum","notes":""}</TPV_SALE>`;

// ── HELPERS ───────────────────────────────────────────────────────────────────
const fmt = n => new Intl.NumberFormat("es-ES",{style:"currency",currency:"EUR"}).format(n||0);
const fmtPct = n => `${(n||0).toFixed(1)}%`;
const fmtDate = iso => new Date(iso+"T12:00:00").toLocaleDateString("es-ES",{day:"2-digit",month:"short",year:"numeric"});
const fmtDT = iso => new Date(iso).toLocaleString("es-ES",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
const genId = (p="id") => `${p}_${Date.now()}_${Math.random().toString(36).slice(2,5)}`;

function calcTotals(items) {
  const byVat={};let tBase=0,tVat=0,total=0;
  for(const i of items){
    const pct=IVA[i.vatType]||10, lt=i.qty*i.unitPrice, base=lt/(1+pct/100), vat=lt-base;
    if(!byVat[i.vatType])byVat[i.vatType]={base:0,vat:0,pct};
    byVat[i.vatType].base+=base; byVat[i.vatType].vat+=vat;
    tBase+=base; tVat+=vat; total+=lt;
  }
  return{byVat,totalBase:tBase,totalVat:tVat,total};
}

function calcLoan(l) {
  const r=l.interestRate/100/12, n=l.termMonths;
  const monthly=r>0?l.principal*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1):l.principal/n;
  const k=Math.min(n,Math.max(0,Math.floor((Date.now()-new Date(l.startDate).getTime())/(1000*60*60*24*30.44))));
  const remaining=r>0?l.principal*(Math.pow(1+r,n)-Math.pow(1+r,k))/(Math.pow(1+r,n)-1):Math.max(0,l.principal-(l.principal/n)*k);
  return{monthly,remaining:Math.max(0,remaining),monthsLeft:n-k};
}

function calcAsset(a) {
  const age=(Date.now()-new Date(a.purchaseDate).getTime())/(1000*60*60*24*365.25);
  return{bookValue:a.purchasePrice*Math.max(0,1-age/a.depreciationYears),annualDep:a.purchasePrice/a.depreciationYears,ageYears:age};
}

function applyAction(state,action){
  if(!action?.type)return state;
  const s={...state,inventory:[...state.inventory],transactions:[...state.transactions],assets:[...state.assets],loans:[...state.loans],tickets:[...state.tickets]};
  if(action.type==="UPSERT_INVENTORY"&&action.items)for(const item of action.items){const i=s.inventory.findIndex(x=>x.id===item.id);i>=0?(s.inventory[i]={...s.inventory[i],...item}):s.inventory.push({...item,id:item.id||genId("inv")});}
  if(action.type==="ADD_TRANSACTION"&&action.transaction)s.transactions.push({...action.transaction,id:action.transaction.id||genId("txn")});
  if(action.type==="UPSERT_ASSET"&&action.asset){const i=s.assets.findIndex(x=>x.id===action.asset.id);i>=0?(s.assets[i]={...s.assets[i],...action.asset}):s.assets.push({...action.asset,id:action.asset.id||genId("asset")});}
  if(action.type==="UPSERT_LOAN"&&action.loan){const i=s.loans.findIndex(x=>x.id===action.loan.id);i>=0?(s.loans[i]={...s.loans[i],...action.loan}):s.loans.push({...action.loan,id:action.loan.id||genId("loan"),payments:[]});}
  if(action.type==="ADJUST_STOCK"&&action.adjustments)for(const adj of action.adjustments){const i=s.inventory.findIndex(x=>x.id===adj.id);if(i>=0)s.inventory[i]={...s.inventory[i],quantity:Math.max(0,(s.inventory[i].quantity||0)+adj.delta)};}
  return s;
}

function parseAction(text){
  const m=text.match(/<GRANO_ACTION>([\s\S]*?)<\/GRANO_ACTION>/);
  const clean=text.replace(/<GRANO_ACTION>[\s\S]*?<\/GRANO_ACTION>/,"").trim();
  let action=null;if(m)try{action=JSON.parse(m[1].trim())}catch(e){}
  return{clean,action};
}
function parseSale(text){
  const m=text.match(/<TPV_SALE>([\s\S]*?)<\/TPV_SALE>/);
  if(m)try{return JSON.parse(m[1].trim())}catch(e){}return null;
}

// ── API CALL ──────────────────────────────────────────────────────────────────
async function callAPI(system, messages, apiKey) {
  const key = apiKey || ANTHROPIC_API_KEY;
  if (!key) throw new Error("API_KEY_MISSING");
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system,messages})
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  return data.content?.[0]?.text || "";
}

// ── MARKDOWN ──────────────────────────────────────────────────────────────────
function MD({text}){
  if(!text)return null;
  const lines=text.split("\n"),els=[];let i=0,tBuf=[],inT=false;
  const inl=t=>t.split(/(\*\*[^*]+\*\*|`[^`]+`)/g).map((p,j)=>{
    if(p.startsWith("**")&&p.endsWith("**"))return React.createElement("strong",{key:j,style:{color:"#C9A96E"}},p.slice(2,-2));
    if(p.startsWith("`")&&p.endsWith("`"))return React.createElement("code",{key:j,style:{background:"rgba(201,169,110,0.15)",padding:"1px 5px",borderRadius:3,fontFamily:"monospace",fontSize:11}},p.slice(1,-1));
    return p;
  });
  const flushT=()=>{
    const rows=tBuf.map(r=>r.split("|").map(c=>c.trim()).filter(c=>c!==""));
    if(rows.length>=2){const hdr=rows[0],body=rows.slice(2);
      els.push(React.createElement("div",{key:els.length,style:{overflowX:"auto",margin:"10px 0"}},
        React.createElement("table",{style:{borderCollapse:"collapse",width:"100%",fontSize:12}},
          React.createElement("thead",null,React.createElement("tr",null,...hdr.map((h,j)=>React.createElement("th",{key:j,style:{padding:"6px 10px",borderBottom:"2px solid #C9A96E",color:"#C9A96E",textAlign:"left",whiteSpace:"nowrap"}},h)))),
          React.createElement("tbody",null,...body.map((row,ri)=>React.createElement("tr",{key:ri,style:{background:ri%2===0?"rgba(255,255,255,0.03)":"transparent"}},...row.map((c,ci)=>React.createElement("td",{key:ci,style:{padding:"5px 10px",borderBottom:"1px solid rgba(255,255,255,0.07)",color:"#E8DCC8",whiteSpace:"nowrap"}},c)))))
        )
      ));
    }
    tBuf=[];inT=false;
  };
  while(i<lines.length){const l=lines[i];
    if(l.includes("|")){if(!inT)inT=true;tBuf.push(l);i++;continue;}
    if(inT)flushT();
    if(l.startsWith("### "))els.push(React.createElement("h4",{key:i,style:{color:"#C9A96E",margin:"14px 0 4px",fontSize:12,letterSpacing:1,textTransform:"uppercase"}},l.slice(4)));
    else if(l.startsWith("## "))els.push(React.createElement("h3",{key:i,style:{color:"#E8DCC8",margin:"16px 0 6px",fontSize:14}},l.slice(3)));
    else if(l.match(/^[-•] /))els.push(React.createElement("div",{key:i,style:{display:"flex",gap:6,margin:"3px 0",fontSize:13,color:"#C4B49A"}},React.createElement("span",{style:{color:"#C9A96E",flexShrink:0}},"›"),React.createElement("span",null,...inl(l.slice(2)))));
    else if(l.trim()==="")els.push(React.createElement("div",{key:i,style:{height:6}}));
    else if(l.startsWith("---"))els.push(React.createElement("hr",{key:i,style:{border:"none",borderTop:"1px solid rgba(201,169,110,0.2)",margin:"10px 0"}}));
    else els.push(React.createElement("p",{key:i,style:{margin:"3px 0",fontSize:13,color:"#C4B49A",lineHeight:1.6}},...inl(l)));
    i++;
  }
  if(inT)flushT();
  return React.createElement(React.Fragment,null,...els);
}

  const PM={efectivo:"Efectivo",tarjeta:"Tarjeta",bizum:"Bizum",otro:"Otro"};

    <div id="ticket-print" style={s}>

        <span>Ticket nº {String(ticket.number).padStart(6,"0")}</span>
        <span>{fmtDT(ticket.date)}</span>
      </div>
      <div style={{fontSize:11,marginBottom:6}}>Serie A / Factura Simplificada</div>
      <div style={{borderTop:"1px dashed #000",margin:"6px 0"}}/>
      <div style={{marginBottom:6}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:4,borderBottom:"1px solid #ccc",paddingBottom:2}}>
          <span style={{flex:3}}>ARTÍCULO</span><span style={{flex:1,textAlign:"center"}}>UDS</span><span style={{flex:1,textAlign:"right"}}>P.U.</span><span style={{flex:1,textAlign:"right"}}>TOTAL</span>
        </div>
        {(ticket.items||[]).map((item,i)=>(
          <div key={i} style={{marginBottom:2}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}>
              <span style={{flex:3,paddingRight:4}}>{item.desc}</span>

      <div style={{marginBottom:6}}>

          <div key={vt} style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#333"}}>
            <span>Base {IVA_LABELS[vt]}</span><span>{data.base.toFixed(2)} € + {data.vat.toFixed(2)} €</span>
          </div>
        ))}
      </div>
      <div style={{borderTop:"1px solid #000",margin:"6px 0"}}/>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:13,fontWeight:"bold",marginBottom:2}}><span>TOTAL</span><span>{totals.total.toFixed(2)} €</span></div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:6}}><span>IVA incluido</span><span>{totals.totalVat.toFixed(2)} €</span></div>
      <div style={{fontSize:11,marginBottom:6}}>Forma de pago: <strong>{PM[ticket.paymentMethod]||ticket.paymentMethod}</strong></div>
      <div style={{borderTop:"1px dashed #000",margin:"6px 0"}}/>
      <div style={{textAlign:"center",fontSize:10,color:"#333",marginBottom:4}}>{biz.ticketFooter||"¡Gracias por su visita!"}</div>
      {biz.web&&<div style={{textAlign:"center",fontSize:9,color:"#888"}}>{biz.web}</div>}
      <div style={{textAlign:"center",fontSize:9,color:"#888",marginTop:4}}>
        <div>Conserve este ticket como justificante de compra</div>

}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function GranoApp() {
  const [state, setState] = useState(INITIAL_STATE);
  const [apiKey, setApiKey] = useState(ANTHROPIC_API_KEY);
  const [showKeyInput, setShowKeyInput] = useState(false);
  const [messages, setMessages] = useState([{role:"assistant",text:"☕ **Hola, soy GRANO** — versión local instalable.\n\nTodas las funciones disponibles sin restricciones de sandbox.\n\n⚠️ Para activar el asistente IA introduce tu API key de Anthropic en ⚙️ Ajustes."}]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [mainTab, setMainTab] = useState("tpv");
  const [finTab, setFinTab] = useState("pl");
  const [saveStatus, setSaveStatus] = useState("idle");

  // TPV
  const [tpvInput, setTpvInput] = useState("");
  const [tpvLoading, setTpvLoading] = useState(false);
  const [tpvMode, setTpvMode] = useState("input");
  const [pendingSale, setPendingSale] = useState(null);
  const [lastTicket, setLastTicket] = useState(null);
  const [ticketImgUrl, setTicketImgUrl] = useState(null);
  const [pdfLoading, setPdfLoading] = useState(false);
  const [clipStatus, setClipStatus] = useState("idle");
  const [fullscreen, setFullscreen] = useState(false);

  // Fast POS
  const [fastSize, setFastSize] = useState("normal");
  const [fastAddons, setFastAddons] = useState([]);
  const [fastQty, setFastQty] = useState(1);
  const [fastCart, setFastCart] = useState([]);
  const [fastCookies, setFastCookies] = useState(0);
  const [fastBolsa, setFastBolsa] = useState(false);
  const [fastPayment, setFastPayment] = useState("efectivo");

  const endRef = useRef(null);
  const importRef = useRef(null);

  // ── STORAGE (localStorage — no sandbox restrictions) ──────────────────────
  useEffect(() => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if(saved) setState(JSON.parse(saved));
    } catch(_){}
    const savedKey = localStorage.getItem("grano_api_key");
    if(savedKey) setApiKey(savedKey);
  }, []);

  const save = useCallback((s) => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); setSaveStatus("saved"); setTimeout(()=>setSaveStatus("idle"),2000); }
    catch(_) { setSaveStatus("error"); }
  }, []);

  useEffect(()=>{ endRef.current?.scrollIntoView({behavior:"smooth"}); },[messages]);

  // ── EXPORT / IMPORT ───────────────────────────────────────────────────────
  const exportData = () => {
    const blob=new Blob([JSON.stringify({...state,exportedAt:new Date().toISOString()},null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=`grano_backup_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const importData = (e) => {
    const file=e.target.files?.[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const{exportedAt,version,...ns}=JSON.parse(ev.target.result);
        const merged={...INITIAL_STATE,...ns}; setState(merged); save(merged);
        setMessages(prev=>[...prev,{role:"assistant",text:`✅ Datos restaurados: ${merged.inventory?.length||0} artículos, ${merged.assets?.length||0} activos, ${merged.tickets?.length||0} tickets.`}]);
      }catch(_){setMessages(prev=>[...prev,{role:"assistant",text:"❌ Archivo no válido."}]);}
    };
    reader.readAsText(file); e.target.value="";
  };

  // ── GENERATE TICKET IMAGE (DOM capture via SVG foreignObject) ────────────
  const generateTicketImage = useCallback(() => {
    if (!lastTicket) return;
    const el = document.getElementById("ticket-print");
    if (!el) return;

    const rect   = el.getBoundingClientRect();
    const width  = Math.ceil(rect.width)  || 302;
    const height = Math.ceil(rect.height) || 600;
    const scale  = 3;

    const svg = `<svg xmlns="http://www.w3.org/2000/svg"
      width="${width * scale}" height="${height * scale}">
      <foreignObject x="0" y="0" width="${width}" height="${height}"
        transform="scale(${scale})">
        <div xmlns="http://www.w3.org/1999/xhtml"
          style="width:${width}px;background:#fff;overflow:hidden;">
          ${el.outerHTML}
        </div>
      </foreignObject>
    </svg>`;

    const svgUrl = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width  = width  * scale;
      canvas.height = height * scale;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#ffffff";

  const renderTPV=()=>{

            <button onClick={()=>setFullscreen(true)} style={{padding:"5px 10px",fontSize:10,background:"rgba(201,169,110,0.08)",border:"1px solid rgba(201,169,110,0.2)",borderRadius:6,color:"#C9A96E",cursor:"pointer",fontFamily:"inherit"}}>📸 Pantalla</button>

        <div style={{padding:"8px 12px",background:"rgba(122,158,126,0.08)",border:"1px solid rgba(122,158,126,0.2)",borderRadius:8,fontSize:11,color:"#7A9E7E"}}>

    if(tpvMode==="preview"&&pendingSale){

            <div key={i} style={{...S.card,display:"flex",justifyContent:"space-between"}}>
              <div><div style={{fontSize:12,color:"#E8DCC8"}}>{item.desc}</div><div style={{fontSize:10,color:"#5A4030"}}>{IVA_LABELS[item.vatType]} · {fmt(item.unitPrice)}/ud</div></div>
              <div style={{textAlign:"right"}}><div style={{fontSize:12,color:"#C9A96E",fontWeight:"bold"}}>{fmt(item.qty*item.unitPrice)}</div><div style={{fontSize:10,color:"#5A4030"}}>{item.qty}×</div></div>
            </div>
          ))}
          <div style={{padding:"10px 12px",background:"rgba(201,169,110,0.08)",borderRadius:8,border:"1px solid rgba(201,169,110,0.2)",marginBottom:10,marginTop:6}}>

            <div style={{display:"flex",justifyContent:"space-between",fontSize:16,fontWeight:"bold"}}><span>TOTAL</span><span style={{color:"#C9A96E"}}>{fmt(totals.total)}</span></div>

          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{setPendingSale(null);setTpvMode(fastCart.length>0?"fast":"input");}} style={{flex:1,padding:"9px",fontSize:11,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#C4B49A",cursor:"pointer",fontFamily:"inherit"}}>✕ Cancelar</button>
            <button onClick={confirmSale} style={{flex:2,padding:"9px",fontSize:11,background:"linear-gradient(135deg,#C9A96E,#7A5530)",border:"none",borderRadius:8,color:"#1A0E04",cursor:"pointer",fontFamily:"inherit",fontWeight:"bold"}}>✓ Confirmar y emitir</button>
          </div>
        </div>
      );
    }

    if(tpvMode==="history"){
      const tickets=[...(state.tickets||[])].reverse();
      return(
        <div style={{padding:"12px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:10,color:"#C9A96E",letterSpacing:2,textTransform:"uppercase"}}>Historial</div>
            <button onClick={()=>setTpvMode("input")} style={{padding:"4px 10px",fontSize:10,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,color:"#C4B49A",cursor:"pointer",fontFamily:"inherit"}}>← Volver</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}}>
            <KPI label="Tickets hoy" value={(state.tickets||[]).filter(t=>t.date?.slice(0,10)===new Date().toISOString().slice(0,10)).length}/>
            <KPI label="Ventas hoy" value={fmt(fin.todaySales)} color="#7A9E7E"/>
          </div>
          {tickets.length===0?<div style={{textAlign:"center",color:"#3A2810",padding:"20px 0",fontSize:12}}>Sin tickets.</div>
            :tickets.map(t=>(
              <div key={t.id} style={{...S.card,cursor:"pointer"}} onClick={()=>{setLastTicket({ticket:t,business:state.business||INITIAL_BIZ});setTicketImgUrl(null);setTpvMode("print");}}>
                <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:11,color:"#C9A96E"}}>#{String(t.number).padStart(6,"0")}</span><span style={{fontSize:12,fontWeight:"bold"}}>{fmt(t.totals?.total||0)}</span></div>
                <div style={{fontSize:10,color:"#5A4030",marginTop:2}}>{fmtDT(t.date)} · {t.paymentMethod}</div>
              </div>
            ))
          }
        </div>
      );
    }

    // INPUT MODE
    const QUICK=["Un espresso","Cortado + croissant","2 flat white","250g café etiopía","3 espressos tarjeta"];
    return(
      <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
        <div style={{flex:1,padding:"12px",overflowY:"auto"}}>
          <button onClick={()=>setTpvMode("fast")} style={{width:"100%",marginBottom:12,padding:"14px",background:"linear-gradient(135deg,rgba(201,169,110,0.12),rgba(201,169,110,0.06))",border:"1px solid rgba(201,169,110,0.3)",borderRadius:12,cursor:"pointer",fontFamily:"Georgia,serif",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{textAlign:"left"}}><div style={{fontSize:13,color:"#C9A96E",fontWeight:"bold",marginBottom:2}}>⚡ Modo TPV Táctil</div><div style={{fontSize:10,color:"#6A5535"}}>Botones de producto, tallas, añadidos, cookie y bolsa</div></div>
            <span style={{fontSize:22,color:"#C9A96E"}}>→</span>
          </button>
          <div style={{fontSize:9,color:"#6A5535",letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>O describe con texto</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
            {QUICK.map(q=><button key={q} onClick={()=>setTpvInput(q)} style={{padding:"5px 10px",fontSize:10,background:"rgba(201,169,110,0.07)",border:"1px solid rgba(201,169,110,0.18)",borderRadius:16,color:"#C9A96E",cursor:"pointer",fontFamily:"inherit"}}>{q}</button>)}
          </div>
          <div style={{...S.card,padding:"12px"}}>
            <div style={{fontSize:9,color:"#6A5535",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Resumen hoy</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              <KPI label="Tickets" value={(state.tickets||[]).filter(t=>t.date?.slice(0,10)===new Date().toISOString().slice(0,10)).length}/>
              <KPI label="Ventas hoy" value={fmt(fin.todaySales)} color="#7A9E7E"/>
            </div>
          </div>
        </div>
        <div style={{padding:"10px 12px",borderTop:"1px solid rgba(201,169,110,0.1)",background:"#0A0600",display:"flex",gap:8,alignItems:"flex-end"}}>
          <textarea value={tpvInput} onChange={e=>setTpvInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();parseTpvSale();}}}
            placeholder="Ej: 2 cortados y un croissant, paga con tarjeta..." style={{...S.ta,fontSize:12}} rows={2} disabled={tpvLoading}/>
          <button onClick={parseTpvSale} disabled={tpvLoading||!tpvInput.trim()} style={{width:40,height:40,background:tpvLoading||!tpvInput.trim()?"rgba(201,169,110,0.1)":"linear-gradient(135deg,#C9A96E,#7A5530)",border:"none",borderRadius:9,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>
            {tpvLoading?"⏳":"→"}
          </button>
        </div>
      </div>
    );
  };

  const renderStock=()=>{
    const byC=state.inventory.reduce((acc,i)=>{const c=i.category||"otros";if(!acc[c])acc[c]=[];acc[c].push(i);return acc;},{});
    const CAT={cafe_verde:"Café Verde",cafe_tostado:"Tostado",lacteos:"Lácteos",envases:"Envases",consumibles:"Consumibles",otros:"Otros"};
    return Object.entries(byC).length===0
      ?<div style={{textAlign:"center",color:"#3A2810",padding:"20px 0",fontSize:12}}>📦 Sin artículos. Usa el Chat para registrar compras.</div>
      :Object.entries(byC).map(([cat,items])=>(
        <div key={cat}>
          <div style={S.secTitle}>{CAT[cat]||cat}</div>
          {items.map(item=>{const isLow=item.minStock&&item.quantity<=item.minStock;return(
            <div key={item.id} style={{...S.card,borderLeft:`2px solid ${isLow?"#FF8060":"rgba(201,169,110,0.2)"}`}}>
              <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:12,color:"#E8DCC8",flex:1}}>{item.name}</span>{isLow&&<span style={{fontSize:9,padding:"1px 5px",background:"rgba(255,100,60,0.15)",borderRadius:3,color:"#FF8060"}}>⚠️</span>}</div>
              <div style={{fontSize:11,color:"#C9A96E",marginTop:2}}>{item.quantity} {item.unit} <span style={{color:"#4A3820"}}>· {fmt(item.unitCost)}/{item.unit}</span></div>
              {item.minStock&&<Bar pct={(item.quantity/item.minStock/2)*100} color={isLow?"#FF8060":"#7A9E7E"} height={3}/>}
            </div>
          );})}
        </div>
      ));

  const renderFin=()=>{

          <KPI label="EBITDA/mes" value={fmt(fin.ebitdaM)} color={fin.ebitdaM>=0?"#C9A96E":"#FF8060"}/>
          <KPI label="Burn rate" value={fmt(fin.burnRate)} color="#FF8060"/>
        </div>
        <div style={S.secTitle}>Últimas transacciones</div>
        {[...state.transactions].reverse().slice(0,10).map(t=>(
          <div key={t.id} style={{...S.card,borderLeft:`2px solid ${t.type==="ingreso"?"#7A9E7E":"#FF8060"}`,padding:"6px 10px"}}>
            <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:11,color:"#C4B49A",flex:1,marginRight:4}}>{t.description}</span><span style={{fontSize:11,fontWeight:"bold",color:t.type==="ingreso"?"#7A9E7E":"#FF8060",whiteSpace:"nowrap"}}>{t.type==="ingreso"?"+":"-"}{fmt(t.amount)}</span></div>
            <div style={{fontSize:9,color:"#4A3820",marginTop:1}}>{fmtDate(t.date)}</div>
          </div>
        ))}
      </>);
      case "activos":return(<>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
          <KPI label="Valor libro" value={fmt(fin.totalAssetBook)}/><KPI label="Amort./año" value={fmt(fin.annualDep)} sub={`${fmt(fin.monthlyDep)}/mes`}/>
        </div>
        {fin.assetData.map(a=>{const dp=100-(a.bookValue/a.purchasePrice)*100;return(
          <div key={a.id} style={{...S.card,borderLeft:"2px solid #C9A96E"}}>
            <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:12,color:"#E8DCC8"}}>{a.name}</span><span style={{fontSize:11,color:"#C9A96E",fontWeight:"bold"}}>{fmt(a.bookValue)}</span></div>
            <div style={{fontSize:10,color:"#5A4030",margin:"2px 0"}}>Coste {fmt(a.purchasePrice)} · {a.depreciationYears}a</div>
            <Bar pct={dp} color="#C9A96E" height={3}/>
          </div>
        );})}
      </>);
      case "prestamos":return(<>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
          <KPI label="Deuda" value={fmt(fin.totalDebt)} color="#FF8060"/><KPI label="Activos netos" value={fmt(fin.netAssets)} color={fin.netAssets>=0?"#7A9E7E":"#FF8060"}/><KPI label="Cuota/mes" value={fmt(fin.monthlyLoan)} color="#FF8060"/>
        </div>
        {fin.loanData.map(l=>{const pp=((l.principal-l.remaining)/l.principal)*100;return(
          <div key={l.id} style={{...S.card,borderLeft:"2px solid #B07D62"}}>
            <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:12,color:"#E8DCC8"}}>{l.name}</span><span style={{fontSize:11,color:"#FF8060",fontWeight:"bold"}}>{fmt(l.remaining)}</span></div>
            <div style={{fontSize:10,color:"#5A4030",margin:"2px 0"}}>{l.interestRate}% · {fmt(l.monthly)}/mes · {l.monthsLeft}m</div>
            <Bar pct={pp} color="#7A9E7E" height={3}/>
          </div>
        );})}
      </>);
      case "valor":return(<>
        <div style={{background:"rgba(201,169,110,0.06)",border:"1px solid rgba(201,169,110,0.2)",borderRadius:10,padding:"12px",marginBottom:10,textAlign:"center"}}>
          <div style={{fontSize:9,letterSpacing:3,color:"#6A5535",textTransform:"uppercase",marginBottom:4}}>Valoración estimada</div>
          <div style={{fontSize:24,color:"#C9A96E",fontWeight:"bold"}}>{fmt(fin.valBlended)}</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          <KPI label="Activos netos" value={fmt(Math.max(0,fin.netAssets))} sub="Activos − Deuda"/>
          <KPI label="× Revenue" value={fmt(Math.max(0,fin.annualRev*0.8))} sub="× 0.8 anual"/>
          <KPI label="× EBITDA" value={fmt(fin.ebitdaA>0?fin.ebitdaA*4:0)} sub="× 4 EBITDA"/>
          <KPI label="Mg. EBITDA" value={`${fin.ebitdaMargin.toFixed(1)}%`} color={fin.ebitdaMargin>=10?"#7A9E7E":"#FF8060"}/>
        </div>
      </>);
      default:return null;
    }
  };

    <div>
      {/* API KEY */}
      <div style={S.secTitle}>API Key Anthropic</div>
      <div style={{...S.card,marginBottom:10}}>

        </div>
      ))}
      {/* EXPORT / IMPORT */}
      <div style={S.secTitle}>Copia de seguridad</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
        <button onClick={exportData} style={{padding:"10px",fontSize:11,background:"rgba(201,169,110,0.08)",border:"1px solid rgba(201,169,110,0.2)",borderRadius:8,color:"#C9A96E",cursor:"pointer",fontFamily:"inherit"}}>↓ Exportar JSON</button>
        <button onClick={()=>importRef.current?.click()} style={{padding:"10px",fontSize:11,background:"rgba(122,158,126,0.08)",border:"1px solid rgba(122,158,126,0.2)",borderRadius:8,color:"#7A9E7E",cursor:"pointer",fontFamily:"inherit"}}>↑ Importar JSON</button>

      <input ref={importRef} type="file" accept=".json" onChange={importData} style={{display:"none"}}/>

    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>

        {messages.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",gap:8}}>
            {m.role==="assistant"&&<div style={{width:26,height:26,background:"linear-gradient(135deg,#C9A96E,#6B4E2A)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0,marginTop:4}}>☕</div>}
            <div style={S.bubble(m.role)}>
              {m.role==="assistant"?<MD text={m.text}/>:<span style={{color:"#E8DCC8"}}>{m.text}</span>}
              {m.action&&<div style={{marginTop:7,padding:"3px 9px",fontSize:10,background:"rgba(122,158,126,0.12)",border:"1px solid rgba(122,158,126,0.25)",borderRadius:4,color:"#7A9E7E",display:"inline-block"}}>✓ Guardado</div>}
            </div>
          </div>
        ))}
        {loading&&<div style={{display:"flex",gap:8}}><div style={{width:26,height:26,background:"linear-gradient(135deg,#C9A96E,#6B4E2A)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>☕</div><div style={{...S.bubble("assistant"),display:"flex",gap:5,alignItems:"center"}}>{[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:"#C9A96E",animation:`dot 1.2s ease-in-out infinite`,animationDelay:`${i*0.2}s`}}/>)}</div></div>}
        <div ref={endRef}/>
      </div>
      <div style={{padding:"10px 12px",borderTop:"1px solid rgba(201,169,110,0.1)",background:"#0A0600",display:"flex",gap:8,alignItems:"flex-end"}}>
        <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}}}
          placeholder={apiKey?"Registra compras, activos, préstamos, pide análisis...":"⚠️ Configura tu API key en ⚙️ para activar el asistente IA"}
          style={S.ta} rows={1} disabled={loading}/>
        <button onClick={sendMessage} disabled={loading||!input.trim()} style={{width:40,height:40,background:loading||!input.trim()?"rgba(201,169,110,0.1)":"linear-gradient(135deg,#C9A96E,#7A5530)",border:"none",borderRadius:9,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>
          {loading?"⏳":"↑"}
        </button>
      </div>
    </div>
  );

  const NAV=[["tpv","🧾","TPV"],["stock","📦","Stock"],["fin","📊","P&L"],["chat","💬","Chat"],["config","⚙️","Config"]];

  return(
    <div style={S.root}>
      {/* HEADER */}
      <div style={S.header}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:30,height:30,background:"linear-gradient(135deg,#C9A96E,#7A5530)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>☕</div>
          <div>
            <div style={{fontSize:16,letterSpacing:4,color:"#C9A96E",fontStyle:"italic"}}>GRANO</div>
            <div style={{fontSize:7,color:"#6A5030",letterSpacing:3,textTransform:"uppercase"}}>App Local · León</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div style={{fontSize:9,color:saveStatus==="saved"?"#7A9E7E":"transparent",letterSpacing:1}}>{saveStatus==="saved"?"✓ guardado":""}</div>
          <div style={{padding:"2px 10px",background:"rgba(201,169,110,0.07)",border:"1px solid rgba(201,169,110,0.15)",borderRadius:16,textAlign:"center"}}>
            <div style={{fontSize:12,color:netColor,fontWeight:"bold"}}>{fmt(fin.netIncome)}</div>
            <div style={{fontSize:7,color:"#5A4030",letterSpacing:1,textTransform:"uppercase"}}>Neto</div>
          </div>
          <div style={{padding:"2px 10px",background:"rgba(201,169,110,0.07)",border:"1px solid rgba(201,169,110,0.15)",borderRadius:16,textAlign:"center"}}>
            <div style={{fontSize:12,color:"#C9A96E",fontWeight:"bold"}}>{fmt(fin.valBlended)}</div>
            <div style={{fontSize:7,color:"#5A4030",letterSpacing:1,textTransform:"uppercase"}}>Valor</div>
          </div>
        </div>
      </div>
      {/* MAIN */}
      <div style={S.main}>
        <div style={S.sidebar}>
          {NAV.map(([k,icon,label])=>(
            <button key={k} style={S.nb(mainTab===k)} onClick={()=>setMainTab(k)}>
              <span style={{fontSize:17,opacity:mainTab===k?1:0.4}}>{icon}</span>
              <span style={{fontSize:7,color:mainTab===k?"#C9A96E":"#4A3820",letterSpacing:1,textTransform:"uppercase"}}>{label}</span>
            </button>
          ))}
        </div>
        <div style={S.content}>
          {mainTab==="tpv"&&renderTPV()}
          {mainTab==="stock"&&<div style={S.panel}>{renderStock()}</div>}
          {mainTab==="fin"&&<div style={S.panel}><div style={S.finTabs}>{[["pl","P&L"],["activos","Activos"],["prestamos","Deuda"],["valor","Valor"]].map(([k,l])=><button key={k} style={S.finTab(finTab===k)} onClick={()=>setFinTab(k)}>{l}</button>)}</div>{renderFin()}</div>}
          {mainTab==="chat"&&renderChat()}
          {mainTab==="config"&&<div style={S.panel}>{renderConfig()}</div>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(GranoApp));
</script>
</body>
</html>
